<!-- 网络设置页面 -->
<div id="network-page" class="page page-layout-flat">
    <div class="fb-card">
        <div class="fb-card-header">
            <h2 class="fb-card-title" id="network-title" data-i18n="network-title">网络设置</h2>
        </div>
        <div class="fb-card-body">
            <div class="config-tabs">
                <div class="config-tab active" data-tab="base" data-i18n="net-tab-basic">基本配置</div>
                <div class="config-tab" data-tab="ap-config" data-i18n="net-tab-ap">热点配置</div>
                <div class="config-tab" data-tab="advance" data-i18n="net-tab-advance">高级配置</div>
            </div>

            <!-- 基本配置 -->
            <div id="base" class="config-content active">
                <!-- WiFi选择按钮 -->
                <div class="wifi-config fb-mb-3">
                    <button id="wifi-scan-btn" class="fb-btn fb-btn-refresh"
                        data-i18n="wifi-scan-btn">
                        选择Wifi网络
                    </button>
                </div>

                <form id="wifi-form" class="fb-form">
                    <div class="config-form-grid">
                        <div class="config-form-column">
                            <div class="fb-form-group">
                                <label for="wifi-mode" data-i18n="wifi-mode-label">网络模式</label>
                                <select id="wifi-mode" class="">
                                    <option value="0" data-i18n="wifi-mode-sta">仅客户端模式 (STA)
                                    </option>
                                    <option value="1" data-i18n="wifi-mode-ap">仅热点模式 (AP)</option>
                                    <option value="2" selected data-i18n="wifi-mode-apsta">客户端+热点模式
                                        (AP+STA)</option>
                                </select>
                            </div>

                            <div class="fb-form-group">
                                <label for="wifi-ssid" data-i18n="wifi-ssid-label">WiFi名称</label>
                                <input type="text" id="wifi-ssid" class=""
                                    placeholder="输入WiFi名称" data-i18n-placeholder="wifi-ssid-label">
                            </div>
                        </div>

                        <div class="config-form-column">
                            <div class="fb-form-group">
                                <label for="wifi-security"
                                    data-i18n="wifi-security-label">安全类型</label>
                                <select id="wifi-security" class="">
                                    <option value="none" data-i18n="wifi-security-none">无</option>
                                    <option value="wpa" selected data-i18n="wifi-security-wpa">
                                        WPA/WPA2</option>
                                    <option value="wpa3" data-i18n="wifi-security-wpa3">WPA3
                                    </option>
                                </select>
                            </div>

                            <div class="fb-form-group">
                                <label for="wifi-password"
                                    data-i18n="wifi-password-label">密码</label>
                                <input type="password" id="wifi-password" class=""
                                    placeholder="输入WiFi密码"
                                    data-i18n-placeholder="wifi-password-label">
                            </div>
                        </div>
                    </div>

                    <div class="message message-success fb-hidden fb-mt-3" id="wifi-success"
                        data-i18n="wifi-save-ok">
                        Wifi配置保存成功！</div>
                    <div class="message message-error fb-hidden fb-mt-3" id="wifi-error"
                        data-i18n="wifi-save-fail">
                        Wifi配置保存失败！</div>
                    <!-- 网络模式切换提醒区域 -->
                    <div class="message message-info fb-hidden fb-mt-3" id="wifi-mode-notice">
                        <i class="fas fa-info-circle"></i> <span id="wifi-mode-notice-text"></span>
                    </div>

                    <div class="fb-mt-4">
                        <button type="submit" id="wifi-save-btn" class="fb-btn fb-btn-primary">
                            <i class="fas fa-save"></i> <span id="wifi-save-btn-text"
                                data-i18n="save-config-btn">保存配置</span>
                        </button>
                    </div>
                </form>
            </div>

            <!-- 热点配置 -->
            <div id="ap-config" class="config-content">
                <!-- AP配网状态卡片 -->
                <div class="fb-panel">
                    <div class="fb-card-header fb-panel-header u-header-between">
                        <h4 class="fb-m-0 fb-text-sm"><i class="fas fa-wifi"></i> <span
                                data-i18n="ap-provision-status-title">AP配网状态</span></h4>
                        <button id="ap-provision-refresh-btn" type="button"
                            class="fb-btn fb-btn-sm fb-btn-refresh">
                            <span data-i18n="refresh-btn">刷新</span>
                        </button>
                    </div>
                    <div class="fb-card-body fb-panel-body">
                        <table class="fb-table fb-w-full fb-fs-13">
                            <tbody>
                                <tr>
                                    <td class="fb-text-gray fb-w-120"
                                        data-i18n="ap-provision-status-label">配网状态</td>
                                    <td><span id="ap-provision-status" class="badge badge-info"
                                            data-i18n="ap-provision-not-started">未启动</span></td>
                                </tr>
                                <tr>
                                    <td class="fb-text-gray" data-i18n="ap-provision-ap-name-label">
                                        热点名称</td>
                                    <td id="ap-provision-ap-name">--</td>
                                </tr>
                                <tr>
                                    <td class="fb-text-gray" data-i18n="ap-provision-clients-label">
                                        已连接设备</td>
                                    <td id="ap-provision-clients">0</td>
                                </tr>
                            </tbody>
                        </table>
                        <div class="fb-mt-3 fb-flex fb-gap-2">
                            <button id="ap-provision-start-btn" type="button"
                                class="fb-btn fb-btn-success">
                                <i class="fas fa-play"></i> <span
                                    data-i18n="ap-provision-start-btn">启动配网</span>
                            </button>
                            <button id="ap-provision-stop-btn" type="button" class="fb-btn fb-btn-danger">
                                <i class="fas fa-stop"></i> <span
                                    data-i18n="ap-provision-stop-btn">停止配网</span>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- 热点参数配置表单 -->
                <form id="ap-form" class="fb-form">
                    <div class="config-form-grid">
                        <div class="config-form-column">
                            <div class="fb-form-group">
                                <label for="ap-ssid" data-i18n="ap-ssid-label">热点名称</label>
                                <input type="text" id="ap-ssid" class=""
                                    placeholder="输入热点名称" data-i18n-placeholder="ap-ssid-label">
                            </div>

                            <div class="fb-form-group">
                                <label for="ap-password" data-i18n="ap-password-label">热点密码</label>
                                <input type="password" id="ap-password" class=""
                                    placeholder="输入热点密码（至少8位）">
                            </div>

                            <div class="fb-form-group">
                                <label for="ap-channel" data-i18n="ap-channel-label">信道</label>
                                <select id="ap-channel" class="">
                                    <option value="1" selected>1</option>
                                    <option value="2">2</option>
                                    <option value="3">3</option>
                                    <option value="4">4</option>
                                    <option value="5">5</option>
                                    <option value="6">6</option>
                                    <option value="7">7</option>
                                    <option value="8">8</option>
                                    <option value="9">9</option>
                                    <option value="10">10</option>
                                    <option value="11">11</option>
                                    <option value="12">12</option>
                                    <option value="13">13</option>
                                </select>
                            </div>
                        </div>

                        <div class="config-form-column">
                            <div class="fb-form-group">
                                <label for="ap-hidden" data-i18n="ap-hidden-label">隐藏热点</label>
                                <select id="ap-hidden" class="">
                                    <option value="0" selected data-i18n="ap-hidden-no">否</option>
                                    <option value="1" data-i18n="ap-hidden-yes">是</option>
                                </select>
                            </div>

                            <div class="fb-form-group">
                                <label for="ap-max-connections"
                                    data-i18n="ap-max-connections-label">最大连接数</label>
                                <select id="ap-max-connections" class="">
                                    <option value="1">1</option>
                                    <option value="2">2</option>
                                    <option value="3">3</option>
                                    <option value="4" selected>4</option>
                                    <option value="5">5</option>
                                    <option value="6">6</option>
                                    <option value="7">7</option>
                                    <option value="8">8</option>
                                </select>
                            </div>

                            <div class="fb-form-group">
                                <label for="ap-provision-timeout"
                                    data-i18n="ap-provision-timeout-label">配网超时 (秒)</label>
                                <input type="number" id="ap-provision-timeout" class=""
                                    value="300" min="60" max="3600">
                            </div>
                        </div>
                    </div>

                    <div class="message message-success fb-hidden fb-mt-3" id="ap-success"
                        data-i18n="ap-save-ok">热点配置保存成功！
                    </div>

                    <div class="fb-mt-4">
                        <button type="submit" class="fb-btn fb-btn-primary">
                            <i class="fas fa-save"></i> <span
                                data-i18n="save-config-btn">保存配置</span>
                        </button>
                    </div>
                </form>

                <!-- 配网说明 -->
                <div class="fb-panel fb-panel-info fb-mt-4 fb-border-info">
                    <div class="fb-card-header fb-p-2 fb-bg-info-light">
                        <h4 class="fb-m-0 fb-text-sm fb-text-info-dark"><i
                                class="fas fa-info-circle"></i> <span
                                data-i18n="ap-provision-guide-title">配网说明</span></h4>
                    </div>
                    <div class="fb-card-body fb-p-3 fb-fs-13 fb-text-info-dark">
                        <ol class="fb-m-0 fb-pl-4">
                            <li data-i18n="ap-provision-guide-1">点击"启动配网"开启AP热点模式</li>
                            <li data-i18n="ap-provision-guide-2">手机连接设备热点</li>
                            <li data-i18n="ap-provision-guide-3">打开配网APP或访问 http://192.168.4.1</li>
                            <li data-i18n="ap-provision-guide-4">输入WiFi名称和密码完成配网</li>
                            <li data-i18n="ap-provision-guide-5">配网成功后设备自动连接目标WiFi</li>
                        </ol>
                    </div>
                </div>
            </div>

            <!-- 高级配置 -->
            <div id="advance" class="config-content">
                <form id="advanced-form" class="fb-form">
                    <!-- IP配置 -->
                    <h4 class="fb-section-title"
                        data-i18n="static-ip-title">静态IP配置</h4>
                    <div class="config-form-grid">
                        <div class="config-form-column">
                            <div class="fb-form-group">
                                <label for="wifi-dhcp" data-i18n="wifi-dhcp-label">IP获取方式</label>
                                <select id="wifi-dhcp" class="">
                                    <option value="0" selected data-i18n="wifi-dhcp-auto">DHCP
                                        (自动获取)</option>
                                    <option value="1" data-i18n="wifi-dhcp-static">静态IP (手动配置)
                                    </option>
                                </select>
                            </div>

                            <div class="fb-form-group">
                                <label for="static-ip" data-i18n="static-ip-label">IP地址</label>
                                <input type="text" id="static-ip" class=""
                                    placeholder="192.168.1.100">
                            </div>

                            <div class="fb-form-group">
                                <label for="subnet" data-i18n="subnet-label">子网掩码</label>
                                <input type="text" id="subnet" class=""
                                    placeholder="255.255.255.0">
                            </div>
                        </div>

                        <div class="config-form-column">
                            <div class="fb-form-group">
                                <label for="gateway" data-i18n="gateway-label">网关</label>
                                <input type="text" id="gateway" class=""
                                    placeholder="192.168.1.1">
                            </div>

                            <div class="fb-form-group">
                                <label for="dns1" data-i18n="dns1-label">首选DNS</label>
                                <input type="text" id="dns1" class=""
                                    placeholder="8.8.8.8">
                            </div>

                            <div class="fb-form-group">
                                <label for="dns2" data-i18n="dns2-label">备用DNS</label>
                                <input type="text" id="dns2" class=""
                                    placeholder="8.8.4.4">
                            </div>
                        </div>
                    </div>

                    <!-- 域名配置 -->
                    <h4 class="fb-section-title-mt"
                        data-i18n="domain-config-title">域名配置</h4>
                    <div class="config-form-grid">
                        <div class="config-form-column">
                            <div class="fb-form-group">
                                <label for="enable-mdns" data-i18n="wifi-mdns-label">mDNS</label>
                                <select id="enable-mdns" class="">
                                    <option value="1" selected data-i18n="wifi-enable">启用</option>
                                    <option value="0" data-i18n="wifi-disable">禁用</option>
                                </select>
                            </div>
                        </div>

                        <div class="config-form-column">
                            <div class="fb-form-group">
                                <label for="custom-domain"
                                    data-i18n="custom-domain-label">自定义域名</label>
                                <input type="text" id="custom-domain" class=""
                                    placeholder="fastbee">
                                <small class="fb-text-muted">访问地址：fastbee.local</small>
                            </div>
                        </div>
                    </div>

                    <!-- 连接设置 -->
                    <h4 class="fb-section-title-mt"
                        data-i18n="connection-settings-title">连接设置</h4>
                    <div class="config-form-grid">
                        <div class="config-form-column">
                            <div class="fb-form-group">
                                <label for="connect-timeout" data-i18n="connect-timeout-label">连接超时
                                    (毫秒)</label>
                                <input type="number" id="connect-timeout" class=""
                                    value="10000" min="1000" max="60000">
                            </div>

                            <div class="fb-form-group">
                                <label for="reconnect-interval"
                                    data-i18n="reconnect-interval-label">重连间隔 (毫秒)</label>
                                <input type="number" id="reconnect-interval" class=""
                                    value="5000" min="1000" max="60000">
                            </div>
                        </div>

                        <div class="config-form-column">
                            <div class="fb-form-group">
                                <label for="max-reconnect-attempts"
                                    data-i18n="max-reconnect-label">最大重连次数</label>
                                <input type="number" id="max-reconnect-attempts"
                                    class="" value="5" min="0" max="20">
                            </div>

                            <div class="fb-form-group">
                                <label for="conflict-detection"
                                    data-i18n="conflict-detection-label">IP冲突检测</label>
                                <select id="conflict-detection" class="">
                                    <option value="0" data-i18n="conflict-detect-none">不检测</option>
                                    <option value="1" data-i18n="conflict-detect-ping">Ping检测
                                    </option>
                                    <option value="2" data-i18n="conflict-detect-arp">ARP检测</option>
                                    <option value="3" selected data-i18n="conflict-detect-auto">自动检测
                                    </option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="message message-success fb-hidden fb-mt-3" id="advanced-success"
                        data-i18n="advanced-save-ok">
                        高级配置保存成功！</div>

                    <div class="fb-mt-4">
                        <button type="submit" class="fb-btn fb-btn-primary">
                            <i class="fas fa-save"></i> <span
                                data-i18n="save-config-btn">保存配置</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
