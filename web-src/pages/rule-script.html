<!-- 规则脚本页面 -->
<div id="rule-script-page" class="page page-layout-flat">
    <div class="fb-card">
        <div class="fb-card-header u-header-between-wrap">
            <h2 class="fb-card-title" data-i18n="rule-script-page-title">规则脚本</h2>
            <div class="u-toolbar-sm">
                <button class="fb-btn fb-btn-refresh" id="rule-script-refresh-btn">&#x21bb; 刷新</button>
                <button class="fb-btn fb-btn-primary" data-action="openRuleScriptModal">
                    <i class="fas fa-plus"></i> <span data-i18n="rule-script-add-btn">新增规则</span>
                </button>
            </div>
        </div>
        <div class="fb-card-body">
            <div class="u-table-wrap">
                <table class="fb-table fb-table-bordered u-table-fill">
                    <thead>
                        <tr>
                            <th data-i18n="rule-script-col-name">名称</th>
                            <th data-i18n="rule-script-col-status">状态</th>
                            <th data-i18n="rule-script-col-trigger">触发方式</th>
                            <th data-i18n="rule-script-col-protocol">协议类型</th>
                            <th data-i18n="rule-script-col-stats">统计</th>
                            <th data-i18n="rule-script-col-ops">操作</th>
                        </tr>
                    </thead>
                    <tbody id="rule-script-table-body">
                        <tr>
                            <td colspan="6" class="u-empty-cell"
                                data-i18n="rule-script-loading">加载中...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
