<!-- 设备配置页面 -->
<div id="device-page" class="page page-layout-flat">
    <div class="fb-card">
        <div class="fb-card-header">
            <h2 class="fb-card-title" data-i18n="device-config-title">设备配置</h2>
        </div>
        <div class="fb-card-body">
            <div class="config-tabs">
                <div class="config-tab active" data-tab="dev-basic" data-i18n="dev-tab-basic">基本信息
                </div>
                <div class="config-tab" data-tab="dev-ntp" data-i18n="dev-tab-ntp">NTP时间</div>
                <div class="config-tab" data-tab="dev-ble" data-i18n="dev-tab-ble">蓝牙配网</div>
                <div class="config-tab" data-tab="dev-ota" data-i18n="dev-tab-ota">OTA升级</div>
                <div class="config-tab" data-tab="dev-advanced" data-i18n="dev-tab-advanced">高级配置</div>
            </div>

            <!-- 基本信息 tab -->
            <div id="dev-basic" class="config-content active">
                <form id="device-basic-form" class="fb-form">
                    <!-- 硬件信息卡片 - 页面顶部整行展示（两列布局） -->
                    <div class="fb-panel fb-border-default fb-mb-3">
                        <div class="fb-card-header fb-p-2 fb-bg-gray">
                            <h4 class="fb-m-0 fb-text-sm"><i class="fas fa-microchip"></i>
                                <span data-i18n="dev-sys-hw-title">硬件信息</span>
                            </h4>
                        </div>
                        <div class="fb-card-body fb-panel-body">
                            <div class="fb-flex-wrap-off">
                                <div class="u-flex-1-min-280">
                                    <table class="fb-table fb-w-full fb-fs-13">
                                        <tbody>
                                            <tr>
                                                <td class="u-table-label-cell"
                                                    data-i18n="dev-sys-chip-label">芯片型号</td>
                                                <td id="dev-sys-chip">--</td>
                                            </tr>
                                            <tr>
                                                <td class="u-text-secondary"
                                                    data-i18n="dev-sys-cpu-label">CPU频率</td>
                                                <td id="dev-sys-cpu">--</td>
                                            </tr>
                                            <tr>
                                                <td class="u-text-secondary"
                                                    data-i18n="dev-sys-heap-label">空闲堆栈</td>
                                                <td id="dev-sys-heap">--</td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                                <div class="u-flex-1-min-280">
                                    <table class="fb-table fb-w-full fb-fs-13">
                                        <tbody>
                                            <tr>
                                                <td class="u-table-label-cell"
                                                    data-i18n="dev-sys-flash-label">Flash大小</td>
                                                <td id="dev-sys-flash">--</td>
                                            </tr>
                                            <tr>
                                                <td class="u-text-secondary"
                                                    data-i18n="dev-sys-sdk-label">SDK版本</td>
                                                <td id="dev-sys-sdk">--</td>
                                            </tr>
                                            <tr>
                                                <td class="u-text-secondary"
                                                    data-i18n="dev-sys-fw-label">固件版本</td>
                                                <td id="dev-sys-fw">--</td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="config-form-grid">
                        <div class="config-form-column">
                            <div class="fb-form-group">
                                <label for="dev-name" data-i18n="dev-name-label">设备名称</label>
                                <input type="text" id="dev-name" class=""
                                    placeholder="输入设备名称" data-i18n-placeholder="dev-name-label">
                            </div>
                            <div class="fb-form-group">
                                <label for="dev-description"
                                    data-i18n="dev-description-label">设备描述</label>
                                <textarea id="dev-description" class="" rows="3"
                                    placeholder="输入设备描述"
                                    data-i18n-placeholder="dev-description-label"></textarea>
                            </div>
                        </div>

                        <div class="config-form-column">
                            <div class="fb-form-group">
                                <label for="dev-id" data-i18n="dev-id-label">设备编号</label>
                                <input type="text" id="dev-id" class=""
                                    placeholder="留空则使用系统默认值(FBE+MAC)"
                                    data-i18n-placeholder="dev-id-placeholder" maxlength="32">
                            </div>
                            <div class="fb-form-group">
                                <label for="dev-product-number"
                                    data-i18n="dev-product-number-label">产品编号</label>
                                <input type="number" id="dev-product-number" class=""
                                    placeholder="输入产品编号"
                                    data-i18n-placeholder="dev-product-number-label" min="0">
                            </div>
                        </div>
                    </div>
                    <div class="dev-basic-footer-row">
                        <div class="fb-form-group dev-user-id-bottom-left">
                            <label for="dev-user-id" data-i18n="dev-user-id-label">用户ID</label>
                            <input type="text" id="dev-user-id" class=""
                                placeholder="输入用户ID" data-i18n-placeholder="dev-user-id-label">
                        </div>
                    </div>
                    <div class="message message-success is-hidden u-mt-15" id="dev-basic-success"
                        data-i18n="dev-basic-save-ok">
                        设备信息保存成功！</div>
                    <div class="u-mt-20 u-mb-20">
                        <button type="submit" class="fb-btn fb-btn-primary">
                            <i class="fas fa-save"></i> <span
                                data-i18n="dev-basic-save-btn">保存信息</span>
                        </button>
                    </div>

                </form>
            </div>

            <!-- NTP时间 tab -->
            <div id="dev-ntp" class="config-content">
                <!-- 当前时间显示 -->
                <div class="fb-panel">
                    <div class="fb-card-header fb-panel-header u-header-between-wrap">
                        <h4 class="fb-panel-title"><i class="fas fa-clock"></i> <span
                                data-i18n="dev-time-title">当前时间</span></h4>
                        <button id="dev-time-refresh-btn" class="fb-btn fb-btn-sm">
                            <i class="fas fa-sync-alt"></i> <span
                                data-i18n="dev-time-refresh">刷新</span>
                        </button>
                    </div>
                    <div class="fb-card-body fb-panel-body">
                        <table class="fb-table fb-w-full fb-fs-13">
                            <tbody>
                                <tr>
                                    <td class="fb-text-gray fb-w-120"
                                        data-i18n="dev-time-datetime-label">日期时间</td>
                                    <td><strong id="dev-time-datetime" class="u-value-lg">--</strong></td>
                                </tr>
                                <tr>
                                    <td class="u-text-secondary" data-i18n="dev-time-synced-label">
                                        NTP同步状态</td>
                                    <td id="dev-time-synced">--</td>
                                </tr>
                                <tr>
                                    <td class="u-text-secondary" data-i18n="dev-time-uptime-label">
                                        设备运行时间</td>
                                    <td id="dev-time-uptime">--</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- NTP配置表单 -->
                <form id="device-ntp-form" class="fb-form">
                    <div class="config-form-grid">
                        <div class="config-form-column">
                            <div class="fb-form-group">
                                <label for="dev-ntp-enable"
                                    data-i18n="dev-ntp-enable-label">NTP同步</label>
                                <select id="dev-ntp-enable" class="">
                                    <option value="1" selected data-i18n="wifi-enable">启用</option>
                                    <option value="0" data-i18n="wifi-disable">禁用</option>
                                </select>
                            </div>
                            <div class="fb-form-group">
                                <label for="dev-ntp-server1"
                                    data-i18n="dev-ntp-server1-label">NTP服务器1</label>
                                <input type="text" id="dev-ntp-server1" class=""
                                    placeholder="pool.ntp.org">
                            </div>
                            <div class="fb-form-group">
                                <label for="dev-ntp-server2"
                                    data-i18n="dev-ntp-server2-label">NTP服务器2</label>
                                <input type="text" id="dev-ntp-server2" class=""
                                    placeholder="time.nist.gov">
                            </div>
                        </div>
                        <div class="config-form-column">
                            <div class="fb-form-group">
                                <label for="dev-timezone" data-i18n="dev-timezone-label">时区</label>
                                <select id="dev-timezone" class="">
                                    <option value="CST-8" selected data-i18n="tz-china">中国标准时间
                                        (UTC+8)</option>
                                    <option value="UTC0" data-i18n="tz-utc">UTC (UTC+0)</option>
                                    <option value="JST-9" data-i18n="tz-japan">日本标准时间 (UTC+9)
                                    </option>
                                    <option value="EST5EDT" data-i18n="tz-us-east">美国东部时间 (UTC-5)
                                    </option>
                                    <option value="PST8PDT" data-i18n="tz-us-west">美国西部时间 (UTC-8)
                                    </option>
                                    <option value="CET-1CEST" data-i18n="tz-europe">中欧时间 (UTC+1)
                                    </option>
                                </select>
                            </div>
                            <div class="fb-form-group">
                                <label for="dev-sync-interval"
                                    data-i18n="dev-sync-interval-label">同步间隔 (秒)</label>
                                <input type="number" id="dev-sync-interval" class=""
                                    value="3600" min="60" max="86400">
                            </div>
                        </div>
                    </div>
                    <div class="message message-success is-hidden u-mt-15" id="dev-ntp-success"
                        data-i18n="dev-ntp-save-ok">
                        NTP配置保存成功！</div>
                    <div class="u-mt-20">
                        <button type="submit" class="fb-btn fb-btn-primary">
                            <i class="fas fa-save"></i> <span
                                data-i18n="dev-ntp-save-btn">保存NTP配置</span>
                        </button>
                    </div>
                </form>
            </div>

            <!-- 蓝牙配网 tab - 按需分片加载 -->
            <div id="dev-ble" class="config-content">
                <div id="dev-ble-fragment-container">
                    <!-- Fragment: device-ble.html loaded on demand -->
                </div>
            </div>

            <!-- OTA升级 tab - 按需分片加载 -->
            <div id="dev-ota" class="config-content">
                <div id="dev-ota-fragment-container">
                    <!-- Fragment: device-ota.html loaded on demand -->
                </div>
            </div>

            <!-- 高级配置 tab -->
            <div id="dev-advanced" class="config-content">
                <!-- 系统操作区域 - 左右并列布局 -->
                <div class="u-flex-wrap-gap-20">
                    <!-- 设备重启卡片 -->
                    <div class="fb-panel fb-panel u-flex-1-min-300">
                        <div class="fb-card-header fb-panel-header-warning">
                            <h4 class="fb-panel-title"><i class="fas fa-redo"></i>
                                <span data-i18n="dev-sys-restart-title">重启设备</span>
                            </h4>
                        </div>
                        <div class="fb-card-body fb-panel-body-lg">
                            <p class="u-mb-15 u-fs-13 u-text-secondary"
                                data-i18n="dev-sys-restart-hint">重启设备将会断开所有连接，配置数据将保留。</p>
                            <div class="u-form-inline-wrap">
                                <label class="u-fs-13"
                                    data-i18n="dev-sys-restart-delay">延迟（秒）：</label>
                                <select id="dev-restart-delay" class="u-select-w-80">
                                    <option value="1">1</option>
                                    <option value="3" selected>3</option>
                                    <option value="5">5</option>
                                    <option value="10">10</option>
                                </select>
                                <button id="dev-restart-btn" type="button"
                                    class="fb-btn fb-btn-warning">
                                    <i class="fas fa-power-off"></i> <span
                                        data-i18n="dev-sys-restart-btn">立即重启</span>
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- 恢复出厂设置卡片 -->
                    <div class="fb-panel fb-panel u-flex-1-min-300">
                        <div class="fb-card-header fb-panel-header-warning">
                            <h4 class="fb-panel-title"><i
                                    class="fas fa-exclamation-triangle"></i> <span
                                    data-i18n="dev-sys-factory-title">恢复出厂设置</span></h4>
                        </div>
                        <div class="fb-card-body fb-panel-body-lg">
                            <p class="u-mb-10 u-fs-13 u-text-danger u-fw-700"
                                data-i18n="dev-sys-factory-warning">
                                警告：此操作将清除所有用户配置和数据，恢复到出厂默认状态！</p>
                            <p class="u-mb-15 u-fs-13 u-text-secondary"
                                data-i18n="dev-sys-factory-hint">设备将自动重启，所有配置将丢失，请谨慎操作。</p>
                            <div class="u-form-inline-wrap">
                                <label class="u-fs-13"
                                    data-i18n="dev-sys-factory-confirm-label">输入"RESET"确认：</label>
                                <input type="text" id="dev-factory-confirm"
                                    class="u-input-w-100" placeholder="RESET">
                                <button id="dev-factory-btn" type="button"
                                    class="fb-btn fb-btn-danger">
                                    <i class="fas fa-undo"></i> <span
                                        data-i18n="dev-sys-factory-btn">恢复出厂设置</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 缓存管理卡片 -->
                <div class="u-flex-wrap-gap-20 u-mt-20">
                    <div class="fb-panel fb-panel u-flex-1-min-300">
                        <div class="fb-card-header fb-panel-header-info">
                            <h4 class="fb-panel-title"><i class="fas fa-database"></i>
                                <span data-i18n="dev-cache-title">缓存管理</span>
                            </h4>
                        </div>
                        <div class="fb-card-body fb-panel-body-lg">
                            <div class="u-form-inline-wrap u-mb-15">
                                <label class="u-fs-13 u-label-nowrap"
                                    data-i18n="dev-cache-duration-label">缓存时间设置：</label>
                                <select id="dev-cache-duration" class="u-select-w-120">
                                    <option value="3600" data-i18n="dev-cache-1h">1小时</option>
                                    <option value="21600" data-i18n="dev-cache-6h">6小时</option>
                                    <option value="43200" data-i18n="dev-cache-12h">12小时</option>
                                    <option value="86400" selected data-i18n="dev-cache-24h">24小时</option>
                                    <option value="172800" data-i18n="dev-cache-48h">48小时</option>
                                    <option value="259200" data-i18n="dev-cache-72h">72小时</option>
                                </select>
                                <button type="button"
                                    class="fb-btn fb-btn-sm fb-btn-primary u-btn-font-12"
                                    data-action="saveCacheDuration">
                                    <i class="fas fa-save"></i> <span data-i18n="dev-cache-save-btn">保存</span>
                                </button>
                            </div>
                            <p class="u-mb-15 u-fs-13 u-text-secondary"
                                data-i18n="dev-cache-hint">设置浏览器缓存JS/CSS资源的有效期，修改后新请求生效。</p>
                            <button type="button" class="fb-btn fb-btn-danger"
                                data-action="clearBrowserCache">
                                <i class="fas fa-trash-alt"></i> <span
                                    data-i18n="dev-cache-clear-btn">清除浏览器缓存</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
