<!-- 蓝牙配网状态卡片 -->
<div class="fb-panel">
    <div class="fb-card-header fb-panel-header u-header-between-wrap">
        <h4 class="fb-panel-title"><i class="fab fa-bluetooth-b"></i>
            <span data-i18n="dev-ble-status-title">蓝牙配网状态</span>
        </h4>
        <button id="ble-provision-refresh-btn"
            class="fb-btn fb-btn-sm">
            <i class="fas fa-sync-alt"></i> <span
                data-i18n="dev-time-refresh">刷新</span>
        </button>
    </div>
    <div class="fb-card-body fb-panel-body">
        <div class="u-meta-wrap">
            <div class="u-meta-item">
                <span class="u-text-secondary"
                    data-i18n="dev-ble-status-label">状态：</span>
                <span id="ble-provision-status-badge"
                    class="status-badge status-offline"
                    data-i18n="dev-ble-not-started">未启动</span>
            </div>
            <div class="u-meta-item">
                <span class="u-text-secondary"
                    data-i18n="dev-ble-device-name-prefix">设备名：</span>
                <span id="ble-provision-device-name" class="u-text-mono">--</span>
            </div>
            <div id="ble-provision-remaining-wrap" class="u-meta-item is-hidden">
                <span class="u-text-secondary"
                    data-i18n="dev-ble-remaining-prefix">剩余时间：</span>
                <span id="ble-provision-remaining" class="u-value-lg u-text-warning">--</span>
            </div>
        </div>
        <div class="fb-mt-3 fb-flex fb-gap-2">
            <button id="ble-provision-start-btn"
                class="fb-btn fb-btn-primary">
                <i class="fas fa-play"></i> <span
                    data-i18n="dev-ble-start-btn">启动蓝牙配网</span>
            </button>
            <button id="ble-provision-stop-btn" class="fb-btn fb-btn-danger is-hidden">
                <i class="fas fa-stop"></i> <span
                    data-i18n="dev-ble-stop-btn">停止蓝牙配网</span>
            </button>
        </div>
    </div>
</div>

<!-- 蓝牙配网参数配置 -->
<form id="device-ble-provision-form" class="fb-form">
    <div class="config-form-grid ble-config-grid">
        <div class="config-form-column">
            <div class="fb-form-group">
                <label for="ble-device-name"
                    data-i18n="dev-ble-name-label">蓝牙设备名称</label>
                <input type="text" id="ble-device-name" class=""
                    data-i18n-placeholder="dev-ble-name-hint" placeholder="蓝牙广播名称"
                    value="FBDevice">
            </div>
            <div class="fb-form-group">
                <label for="ble-service-uuid"
                    data-i18n="dev-ble-service-uuid-label">服务UUID</label>
                <input type="text" id="ble-service-uuid" class=""
                    value="6E400001-B5A3-F393-E0A9-E50E24DCCA9F">
            </div>
            <div class="fb-form-group">
                <label for="ble-tx-uuid"
                    data-i18n="dev-ble-tx-uuid-label">发送UUID</label>
                <input type="text" id="ble-tx-uuid" class=""
                    value="6E400003-B5A3-F393-E0A9-E50E24DCCA9F">
            </div>
        </div>
        <div class="config-form-column">
            <div class="fb-form-group">
                <label for="ble-timeout"
                    data-i18n="dev-ble-timeout-label">配网超时(秒)</label>
                <input type="number" id="ble-timeout" class=""
                    value="300" min="60" max="1800">
            </div>
            <div class="fb-form-group">
                <label for="ble-rx-uuid"
                    data-i18n="dev-ble-rx-uuid-label">接收UUID</label>
                <input type="text" id="ble-rx-uuid" class=""
                    value="6E400002-B5A3-F393-E0A9-E50E24DCCA9F">
            </div>
            <div class="fb-form-group ble-autostart-switch-row">
                <label for="ble-auto-start"
                    data-i18n="dev-ble-autostart-label">启动时自动开启蓝牙配网</label>
                <label class="toggle-switch">
                    <input type="checkbox" id="ble-auto-start">
                    <span class="toggle-slider"></span>
                </label>
            </div>
        </div>
    </div>
    <div class="message message-success is-hidden fb-mt-15"
        id="ble-provision-success" data-i18n="dev-ble-save-ok">
        蓝牙配网配置保存成功！</div>
    <div class="u-mt-20">
        <button type="submit" class="fb-btn fb-btn-primary">
            <i class="fas fa-save"></i> <span
                data-i18n="dev-ble-save-btn">保存蓝牙配网配置</span>
        </button>
    </div>
</form>

<!-- 蓝牙配网说明 -->
<div class="u-note-card u-mt-20">
    <h4 class="u-note-title u-note-title-info"><i
            class="fas fa-info-circle"></i> <span
            data-i18n="dev-ble-guide-title">蓝牙配网说明</span></h4>
    <ol class="u-note-list">
        <li data-i18n="dev-ble-guide-1">点击"启动蓝牙配网"按钮，设备将开始蓝牙广播</li>
        <li data-i18n="dev-ble-guide-2">使用手机APP搜索并连接到蓝牙设备</li>
        <li data-i18n="dev-ble-guide-3">在APP中输入要连接的WiFi名称和密码</li>
        <li data-i18n="dev-ble-guide-4">设备收到配置后自动连接WiFi，配网成功后蓝牙连接断开</li>
    </ol>
    <p class="u-note-tip">
        <i class="fas fa-lightbulb"></i> <span
            data-i18n="dev-ble-guide-tip">提示：蓝牙配网适用于无法使用AP配网的场景，需要配合支持蓝牙的手机APP使用。</span>
    </p>
</div>
