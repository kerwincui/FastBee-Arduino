<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastBee WiFi Setup</title>
    <link rel="stylesheet" href="./css/main.css">
</head>
<body class="setup-page">
    <div class="setup-shell">
        <div class="login-card setup-card">
            <div class="setup-card-body">
                <h1 class="fb-m-0 fb-text-xl fb-text-primary fb-text-center" id="pageTitle">FastBee WiFi 配网</h1>
                <p class="setup-subtitle" id="pageSubtitle">配置设备的 WiFi 连接</p>
                <div class="setup-status-panel">
                    <div class="setup-status-row">
                        <span class="setup-status-label" id="lblStatus">Status:</span>
                        <span id="connStatus" class="setup-status-value is-disconnected">Checking...</span>
                    </div>
                    <div class="setup-status-row">
                        <span class="setup-status-label" id="lblIp">IP Address:</span>
                        <span id="ipAddr" class="setup-status-value">-</span>
                    </div>
                </div>
                <div id="message" class="message message-info fb-hidden"></div>
                <button class="fb-btn fb-btn-success fb-w-full fb-mb-3" onclick="scanNetworks()" id="scanBtn">Scan WiFi Networks</button>
                <div id="networkList" class="wifi-list fb-hidden"></div>
                <form id="wifiForm" class="fb-form">
                    <div class="fb-form-group">
                        <label for="ssid" id="lblSsid">WiFi Name (SSID)</label>
                        <input type="text" id="ssid" name="ssid" required placeholder="Enter or select WiFi name">
                    </div>
                    <div class="fb-form-group">
                        <label for="password" id="lblPwd">Password</label>
                        <input type="password" id="password" name="password" placeholder="Enter WiFi password">
                    </div>
                    <button class="fb-btn fb-btn-primary fb-w-full" type="submit" id="connectBtn">Connect</button>
                </form>
                <div class="setup-link-row">
                    <a href="/login" class="setup-link" id="loginLink">Go to Login Page</a>
                </div>
            </div>
        </div>
    </div>
    <script>
        var T={zh:{pageTitle:'FastBee WiFi 配网',pageSubtitle:'配置设备的 WiFi 连接',lblStatus:'状态：',lblIp:'IP 地址：',lblSsid:'WiFi 名称 (SSID)',lblPwd:'密码',scanBtn:'扫描 WiFi 网络',connectBtn:'连接',loginLink:'进入登录页',phSsid:'输入或选择 WiFi 名称',phPwd:'输入 WiFi 密码',scanning:'扫描中...',noNet:'未发现 WiFi 网络',scanFail:'扫描失败：',connecting:'正在连接 WiFi...',waitMsg:'正在连接，请等待 10 秒后刷新。',connOk:'已连接，可访问：http://',connYes:'已连接',connNo:'未连接',checking:'检测中...'}};
        var lang='zh';
        function applyLang(){var t=T.zh;['pageTitle','pageSubtitle','lblStatus','lblIp','lblSsid','lblPwd','scanBtn','connectBtn','loginLink'].forEach(function(k){var e=document.getElementById(k);if(e)e.textContent=t[k];});document.getElementById('ssid').placeholder=t.phSsid;document.getElementById('password').placeholder=t.phPwd;}
        applyLang();
        function showMessage(text, type) {
            var msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = 'message message-' + type;
            msg.classList.remove('fb-hidden');
        }
        function getSignalClass(rssi) {
            if (rssi >= -50) return 'strong';
            if (rssi >= -70) return 'medium';
            return 'weak';
        }
        function getSignalBars(rssi) {
            if (rssi >= -50) return '\u2582\u2584\u2586\u2588';
            if (rssi >= -70) return '\u2582\u2584\u2586';
            if (rssi >= -80) return '\u2582\u2584';
            return '\u2582';
        }
        function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
        async function scanNetworks() {
            var btn = document.getElementById('scanBtn');
            var list = document.getElementById('networkList');
            btn.disabled = true;
            btn.textContent = T[lang].scanning;
            try {
                var resp = await fetch('/api/wifi/scan');
                var data = await resp.json();
                if (data.networks && data.networks.length > 0) {
                    list.innerHTML = data.networks.map(function(n){ return '<div class="wifi-item" data-ssid="' + esc(n.ssid) + '"><span class="wifi-ssid">' + esc(n.ssid) + (n.encrypted ? '<span class="wifi-lock-icon-secure"> \uD83D\uDD12</span>' : '') + '</span><span class="wifi-signal ' + getSignalClass(n.rssi) + '">' + getSignalBars(n.rssi) + ' ' + n.rssi + 'dBm</span></div>'; }).join('');
                    list.classList.remove('fb-hidden');
                } else {
                    list.innerHTML = '';
                    list.classList.add('fb-hidden');
                    showMessage(T[lang].noNet, 'info');
                }
            } catch (e) {
                list.innerHTML = '';
                list.classList.add('fb-hidden');
                showMessage(T[lang].scanFail + e.message, 'error');
            }
            btn.disabled = false;
            btn.textContent = T[lang].scanBtn;
        }
        document.getElementById('networkList').addEventListener('click', function(e) {
            var item = e.target.closest('.wifi-item');
            if (item && item.dataset.ssid) { selectNetwork(item.dataset.ssid); }
        });
        function selectNetwork(ssid) {
            document.getElementById('ssid').value = ssid;
            document.getElementById('password').focus();
        }
        document.getElementById('wifiForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            var btn = document.getElementById('connectBtn');
            btn.disabled = true;
            btn.textContent = T[lang].connecting;
            showMessage(T[lang].connecting, 'info');
            var formData = new FormData(this);
            try {
                await fetch('/api/wifi/connect', { method: 'POST', body: formData });
                showMessage(T[lang].waitMsg, 'success');
                setTimeout(checkStatus, 10000);
            } catch (e) {
                showMessage(T[lang].waitMsg, 'info');
                setTimeout(checkStatus, 10000);
            }
            btn.disabled = false;
            btn.textContent = T[lang].connectBtn;
        });
        async function checkStatus() {
            try {
                var resp = await fetch('/api/network/config');
                var data = await resp.json();
                var status = document.getElementById('connStatus');
                var ip = document.getElementById('ipAddr');
                if (data.connected) {
                    status.textContent = T[lang].connYes;
                    status.className = 'setup-status-value is-connected';
                    ip.textContent = data.ipAddress || '-';
                    showMessage(T[lang].connOk + data.ipAddress, 'success');
                } else {
                    status.textContent = T[lang].connNo;
                    status.className = 'setup-status-value is-disconnected';
                    ip.textContent = '-';
                }
            } catch (e) { console.error('Status check failed:', e); }
        }
        document.getElementById('connStatus').textContent = T[lang].checking;
        checkStatus();
    </script>
</body>
</html>
