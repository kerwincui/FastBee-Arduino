    <!-- Critical CSS: 登录页骨架 + 基础变量（避免 FOUC） -->
    <style>
    :root{--primary:#1677ff;--primary-hover:#4096ff;--bg-body-fallback:#f5f5f5;--bg-body:linear-gradient(135deg,#f5f5f5 0%,#fafafa 50%,#f0f0f0 100%);--text-primary:rgba(0,0,0,.88);--border:#d9d9d9;--space-2:8px;--space-4:16px;--space-5:20px;--space-8:32px;--rounded-md:6px;--rounded-2xl:16px;--glass-shadow:0 6px 16px 0 rgba(0,0,0,.08),0 3px 6px -4px rgba(0,0,0,.12),0 9px 28px 8px rgba(0,0,0,.05)}
    body{margin:0;min-height:100vh;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;line-height:1.6;color:var(--text-primary);background:var(--bg-body-fallback);background-image:var(--bg-body);background-attachment:fixed}
    .login-page{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:var(--space-5);background:linear-gradient(135deg,#f5f5f5 0%,#fafafa 30%,#f0f0f0 70%,#e6f4ff 100%)}
    .app-container.fb-hidden{display:none}
    .login-card{width:100%;max-width:400px;background:rgba(255,255,255,.75);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:0;border-radius:var(--rounded-2xl);box-shadow:var(--glass-shadow)}
    .login-lang-switch{display:flex;justify-content:flex-end;padding:8px 12px 0}.login-lang-switch select,.header-actions select{padding:3px 6px;font-size:12px;border:1px solid var(--border);border-radius:var(--rounded-md);background:#fff;color:var(--text-secondary);max-width:80px}
    .login-header{text-align:center;padding:var(--space-4) var(--space-5) 0}.login-logo-img{display:inline-block;width:48px;height:48px;object-fit:contain;filter:drop-shadow(0 10px 24px rgba(22,119,255,.22))}.login-body{padding:var(--space-4) var(--space-8) var(--space-6)}.login-body fieldset{border:0;margin:0;padding:0;min-width:0}
    .fb-form input[type=text],.fb-form input[type=password],.fb-btn{box-sizing:border-box}
    .fb-form input[type=text],.fb-form input[type=password]{width:100%;padding:8px 12px;font-size:14px;border:1px solid var(--border);border-radius:var(--rounded-md)}
    .fb-btn{display:inline-flex;align-items:center;justify-content:center;gap:var(--space-2);padding:8px var(--space-4);font-size:13px;font-weight:500;border:1px solid var(--border);border-radius:var(--rounded-md);cursor:pointer;white-space:nowrap}
    .fb-btn-primary{width:100%;color:#fff;background:var(--primary);border-color:var(--primary)}
    .fb-m-0{margin:0}.fb-text-xl{font-size:1.25rem}.fb-text-primary{color:var(--primary)}.fb-mt-3{margin-top:12px}.fb-my-3{margin:12px 0}
    </style>
    <script>
    window.__fastbeeAssetVersion = '20260519-1822';
    window.__fastbeeResolveAssetUrl = function(path) {
        var separator = path.indexOf('?') === -1 ? '?' : '&';
        return path + separator + 'v=' + window.__fastbeeAssetVersion;
    };
    </script>
    <noscript>
        <link rel="stylesheet" href="./css/main.css">
    </noscript>
</head>

<body>

                            data-i18n-placeholder="username-placeholder" required>

                        <label for="password" class="fb-mt-3" id="password-label" data-i18n="password-label">密码</label>

                            登录系统

    </div>

                    </a>

                    <a href="#" class="menu-item" data-page="network">

                            <div class="user-dropdown-menu" id="user-dropdown-menu">

                            <div class="skeleton-header"></div>

    <!-- 串行加载 9 个 chunk：ESP32 站 lwIP socket pool 仅 4-5 个，并发请求会造成 RST。
         依靠 async=false + 顺序 appendChild 保证按顺序执行，与 defer 语义等价但严格单连接。 -->
    <script>
    (function() {
        var bootChunks = [
            './js/chunk-1-core-a.js',
            './js/chunk-2-core-b.js',
            './js/chunk-3-i18n-engine.js',
            './js/chunk-8-state-1.js',
            './js/chunk-9-state-2.js'
        ];
        var started = false;
        function loadSequence(files, delayMs, onDone) {
            var i = 0;
            function loadNext() {
                if (i >= files.length) {
                    if (typeof onDone === 'function') onDone(true);
                    return;
                }
                var s = document.createElement('script');
                s.src = window.__fastbeeResolveAssetUrl(files[i++]);
                s.async = false;
                s.onload = function() { setTimeout(loadNext, delayMs || 80); };
                s.onerror = function() {
                    console.error('[FastBee] chunk failed:', this.src);
                    setTimeout(loadNext, 300);
                };
                document.head.appendChild(s);
            }
            setTimeout(loadNext, 100);
        }
        function startChunkLoad() {
            if (started) return;
            started = true;
            loadSequence(bootChunks, 80);
        }
        window.__fastbeeStartChunks = startChunkLoad;
        window.__fastbeeLoadZhChunks = function(cb) { if (cb) cb(true); };
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', startChunkLoad, { once: true });
        } else {
            startChunkLoad();
        }
    })();
    </script>
    <script>
    (function() {
        function setSubmitState(submitBtn, isLoading, text) {
            if (!submitBtn) return;
            submitBtn.disabled = !!isLoading;
            if (typeof text === 'string') submitBtn.innerHTML = text;
        }

        function inlineLoginFallback(originalText, submitBtn) {
            var usernameEl = document.getElementById('username');
            var passwordEl = document.getElementById('password');
            var rememberEl = document.getElementById('remember');
            var username = usernameEl ? usernameEl.value : '';
            var password = passwordEl ? passwordEl.value : '';
            var remember = rememberEl ? !!rememberEl.checked : false;

            if (!username || !password) {
                setSubmitState(submitBtn, false, originalText);
                return;
            }

            setSubmitState(submitBtn, true, '登录中...');
            fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                credentials: 'include',
                cache: 'no-store',
                body: 'username=' + encodeURIComponent(username) + '&password=' + encodeURIComponent(password)
            }).then(function(resp) {
                return resp.json().catch(function() { return {}; }).then(function(data) {
                    if (!resp.ok || !data || !data.success || !data.sessionId) {
                        throw new Error((data && data.error) || 'login failed');
                    }
                    localStorage.setItem('auth_token', data.sessionId);
                    localStorage.setItem('sessionId', data.sessionId);
                    if (remember) {
                        localStorage.setItem('remember', 'true');
                        localStorage.setItem('username', username);
                        localStorage.setItem('password', password);
                    } else {
                        ['remember', 'username', 'password'].forEach(function(key) {
                            localStorage.removeItem(key);
                        });
                    }
                    location.replace(window.__fastbeeResolveAssetUrl('/'));
                });
            }).catch(function(err) {
                console.error('[FastBee] inline login fallback failed:', err);
                setSubmitState(submitBtn, false, originalText);
            });
        }

        function waitForBootAndLogin(deadline, originalText, submitBtn) {
            if (window.__fastbeeBootReady && window.AppState && typeof window.AppState.handleLogin === 'function') {
                setSubmitState(submitBtn, false, originalText);
                window.AppState.handleLogin();
                return;
            }
            if (Date.now() >= deadline) {
                console.warn('[FastBee] boot not ready before login submit timeout');
                inlineLoginFallback(originalText, submitBtn);
                return;
            }
            setTimeout(function() {
                waitForBootAndLogin(deadline, originalText, submitBtn);
            }, 150);
        }

        var bootLoginWaitMs = 2500;

        function installLoginBootGuard() {
            var loginForm = document.getElementById('login-form');
            if (!loginForm) return;
            loginForm.addEventListener('submit', function(e) {
                if (window.__fastbeeBootReady && window.AppState && typeof window.AppState.handleLogin === 'function') {
                    return;
                }
                e.preventDefault();
                if (typeof window.__fastbeeStartChunks === 'function') {
                    window.__fastbeeStartChunks();
                }
                var submitBtn = loginForm.querySelector('button[type="submit"]');
                var originalText = submitBtn ? submitBtn.innerHTML : '';
                setSubmitState(submitBtn, true, '页面初始化中...');
                waitForBootAndLogin(Date.now() + bootLoginWaitMs, originalText, submitBtn);
            }, true);
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', installLoginBootGuard, { once: true });
        } else {
            installLoginBootGuard();
        }
    })();
    </script>
    <!-- Service Worker 注册：延迟到页面完全加载后5秒，避免与初始API请求叠加压床ESP32 -->
    <script>
    (function() {
        if (!('serviceWorker' in navigator)) return;
        setTimeout(function() {
            var version = window.__fastbeeAssetVersion || 'dev';
            try {
                var key = 'fastbeeAssetVersion';
                var previous = localStorage.getItem(key) || '';
                localStorage.setItem(key, version);
                if (previous && previous !== version && window.caches) {
                    caches.keys().then(function(names) {
                        return Promise.all(names.filter(function(name) {
                            return name.indexOf('fastbee-') === 0;
                        }).map(function(name) {
                            return caches.delete(name).catch(function() { return false; });
                        }));
                    }).catch(function() {});
                }
            } catch (_) {}
            navigator.serviceWorker.register(window.__fastbeeResolveAssetUrl('/sw.js'))
                .catch(function(err) { console.warn('[FastBee] service worker register failed:', err); });
        }, 5000);
    })();
    </script>
</body>
