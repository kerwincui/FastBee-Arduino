; PlatformIO Project Configuration File
; https://docs.platformio.org/page/projectconf.html

; ============================================
; 全局 ESP32 共享配置
; ============================================
[env]
platform   = espressif32
framework  = arduino
build_type = release

; 文件系统 & 分区
board_build.filesystem = littlefs
board_build.partitions = fastbee.csv

; 库依赖
lib_deps =
    bblanchon/ArduinoJson @ 7.4.2
    knolleary/PubSubClient@^2.8
    h2zero/NimBLE-Arduino@^1.4.1
    olikraus/U8g2@^2.35.9

build_flags =
    -Wno-deprecated-declarations
    -DFASTBEE_USE_PSRAM=0
    -DFASTBEE_ENABLE_MQTT=1
    -DFASTBEE_ENABLE_MODBUS=1
    -DFASTBEE_ENABLE_TCP=1
    -DFASTBEE_ENABLE_HTTP=1
    -DFASTBEE_ENABLE_COAP=0
    -DFASTBEE_ENABLE_MDNS=1
    -DFASTBEE_ENABLE_AP_MODE=1
    -DFASTBEE_ENABLE_WEB_SERVER=1
    -DFASTBEE_ENABLE_WEB_STATIC=1
    -DFASTBEE_ENABLE_WEB_API=1
    -DFASTBEE_ENABLE_AUTH=1
    -DFASTBEE_ENABLE_SESSION=1
    -DFASTBEE_ENABLE_OTA=1
    -DFASTBEE_ENABLE_OTA_FS=1
    -DFASTBEE_ENABLE_TASK_MANAGER=1
    -DFASTBEE_ENABLE_HEALTH_MONITOR=1
    -DFASTBEE_ENABLE_LOGGER=1
    -DFASTBEE_ENABLE_PERIPH_EXEC=1
    -DFASTBEE_ENABLE_RULE_SCRIPT=1
    -DFASTBEE_ENABLE_GPIO=1
    -DFASTBEE_ENABLE_LED_SCREEN=0
    -DFASTBEE_ENABLE_LCD=0
    -DFASTBEE_ENABLE_DNS=1
    -DFASTBEE_MODBUS_SLAVE_ENABLE=1
    -DFASTBEE_WEB_START_EARLY=1
    -DFASTBEE_ENABLE_STORAGE_CACHE=1
    -DFASTBEE_ENABLE_BLE=0
    -DFASTBEE_LOG_BUFFER_SIZE=256
    -DFASTBEE_JSON_DOC_SIZE=8192
    -DASYNCWEBSERVER_REGEX=1
    ; AsyncTCP 连接参数在各 [env:xxx] 中单独设置
    ; 生产版本：禁用调试输出以减少Flash占用
    ; -DDEBUG
    ; -DFASTBEE_DEBUG_LOG=1
    ; -DFASTBEE_VERBOSE_ERROR=1
    -DCORE_DEBUG_LEVEL=1  ; 只输出ERROR级别
    -DNDEBUG              ; Release模式：禁用assert()节省Flash
    -DFASTBEE_STRIP_INFO_LOGS=0  ; 默认保留INFO日志；minimal可设为1剥离INFO字符串

; ============================================
; ESP32 经典版 (ESP32-WROOM/ESP32-WROVER)
; ============================================
[env:esp32dev]
board      = esp32dev

; 移除未使用的库（BLE=0/LCD=0），节省 ~30-50KB RAM + ~80-100KB Flash
lib_ignore = NimBLE-Arduino, U8g2

; ESP32 经典版连接参数
build_flags =
    ${env.build_flags}
    -DCONFIG_ASYNC_TCP_MAX_CONNECTIONS=8
    -DCONFIG_ASYNC_TCP_QUEUE_SIZE=16
    -DARDUINO_LOOP_STACK_SIZE=16384
    ; async_tcp WDT 超时设为 10 秒，防止大型 JSON 序列化/文件 I/O 触发看门狗
    -DCONFIG_ASYNC_TCP_TASK_WDT_TIMEOUT=10
    ; 异步任务栈优化（参照 C3 配置降级，HWM 显示仅需 ~4KB）
    -DSCRIPT_TASK_STACK=8192
    -DSIMPLE_TASK_STACK=6144

; 串口
upload_port     = COM6
monitor_port    = COM6
upload_speed    = 921600
monitor_speed   = 115200
monitor_filters = direct

; ============================================
; ESP32-S3 (支持 USB-CDC)
; ============================================
[env:esp32s3]
board      = esp32-s3-devkitc-1

; 串口（请连接设备后取消注释并修改）
;upload_port     = COM7
;monitor_port    = COM7
upload_speed    = 921600
monitor_speed   = 115200
monitor_filters = direct

; ESP32-S3 额外构建标志
build_flags =
    ${env.build_flags}
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCONFIG_ASYNC_TCP_MAX_CONNECTIONS=8
    -DCONFIG_ASYNC_TCP_QUEUE_SIZE=16
    ; loop task 栈扩容：防止 ProtocolManager+PeripheralManager 深嵌套时栈溢出
    -DARDUINO_LOOP_STACK_SIZE=16384
    ; async_tcp WDT 超时设为 10 秒，防止大型 JSON 序列化/文件 I/O 触发看门狗
    -DCONFIG_ASYNC_TCP_TASK_WDT_TIMEOUT=10
    -DSCRIPT_TASK_STACK=8192
    -DSIMPLE_TASK_STACK=6144

; ============================================
; ESP32-C3 (单核低成本)
; ============================================
[env:esp32c3]
board      = esp32-c3-devkitm-1

; 串口（请连接设备后取消注释并修改）
;upload_port     = COM8
;monitor_port    = COM8
upload_speed    = 921600
monitor_speed   = 115200
monitor_filters = direct

; ESP32-C3 资源受限专用构建标志
build_flags =
    ${env.build_flags}
    -DCONFIG_ASYNC_TCP_MAX_CONNECTIONS=4
    -DCONFIG_ASYNC_TCP_QUEUE_SIZE=16
    -DMAX_ASYNC_TASKS=2
    -DSCRIPT_TASK_STACK=10240
    -DSIMPLE_TASK_STACK=4096
    -DMIN_HEAP_FOR_ASYNC=20000
    -DFASTBEE_MODBUS_SLAVE_ENABLE=0

; ============================================
; 编译预设：minimal（最小资源占用）
; ============================================
; 禁用非核心协议和外设模块（TCP/CoAP/LED/LCD/PeriphExec/RuleScript/Modbus）
; 预计节省 ~60-80KB Flash，适合只需 MQTT+Web+Auth 的设备
; 注意：启用 PERIPH_EXEC/RULE_SCRIPT/MODBUS 需要使用 standard 环境（esp32s3 而非 esp32s3-minimal），
; 否则 esp32s3-minimal + 这三者同时启用会在 ESP32-S3 上启动崩溃（USB-CDC 掉线无日志）

; --- 公共 minimal 编译标志 ---
[minimal_flags]
build_flags =
    -DFASTBEE_ENABLE_MODBUS=0
    -DFASTBEE_MODBUS_SLAVE_ENABLE=0
    -DFASTBEE_ENABLE_COAP=0
    -DFASTBEE_ENABLE_TCP=0
    -DFASTBEE_ENABLE_LED_SCREEN=0
    -DFASTBEE_ENABLE_LCD=0
    -DFASTBEE_ENABLE_PERIPH_EXEC=0
    -DFASTBEE_ENABLE_RULE_SCRIPT=0
    -DFASTBEE_ENABLE_OTA_FS=0
    -DFASTBEE_WEB_START_EARLY=0
    -DFASTBEE_ENABLE_STORAGE_CACHE=0
    -DFASTBEE_STRIP_INFO_LOGS=1  ; minimal模式：剥离INFO级别日志字符串节省Flash

[env:esp32dev-minimal]
extends = env:esp32dev
build_flags =
    ${env:esp32dev.build_flags}
    ${minimal_flags.build_flags}

[env:esp32s3-minimal]
extends = env:esp32s3
build_flags =
    ${env:esp32s3.build_flags}
    ${minimal_flags.build_flags}

[env:esp32c3-minimal]
extends = env:esp32c3
build_flags =
    ${env:esp32c3.build_flags}
    ${minimal_flags.build_flags}

; ============================================
; 编译预设：full（全功能启用）
; ============================================
; 启用所有模块，包括默认禁用的 LCD/LED/CoAP 及调试输出
; 预计额外占用 ~50KB Flash（LCD ~20KB + LED ~15KB + CoAP ~12KB + 调试信息）
; 适合：开发调试、全功能设备、接有 OLED/NeoPixel 硬件的场景

; --- 公共 full 编译标志 ---
[full_flags]
build_flags =
    -DFASTBEE_ENABLE_COAP=1
    -DFASTBEE_ENABLE_LED_SCREEN=1
    -DFASTBEE_ENABLE_LCD=1
    -DFASTBEE_ENABLE_BLE=1
    -DFASTBEE_DEBUG_LOG=1
    -DFASTBEE_VERBOSE_ERROR=1
    -DCORE_DEBUG_LEVEL=3

[env:esp32dev-full]
extends = env:esp32dev
build_flags =
    ${env:esp32dev.build_flags}
    ${full_flags.build_flags}

[env:esp32s3-full]
extends = env:esp32s3
build_flags =
    ${env:esp32s3.build_flags}
    ${full_flags.build_flags}

[env:esp32c3-full]
extends = env:esp32c3
build_flags =
    ${env:esp32c3.build_flags}
    ${full_flags.build_flags}

; ============================================
; 编译预设说明（standard = 现有默认配置）
; ============================================
; esp32dev / esp32s3 / esp32c3 即为 standard 预设
; 启用主要功能模块，禁用 CoAP/LED/LCD，适合大多数使用场景
;
; 预设对照表：
;   minimal  — 核心功能，最省资源   (~850KB Flash)
;   standard — 默认均衡配置         (~920KB Flash)
;   full     — 全部功能 + 调试输出  (~970KB Flash)
;
; 切换方式：PlatformIO 底栏选择环境，或命令行：
;   pio run -e esp32dev-minimal
;   pio run -e esp32dev
;   pio run -e esp32dev-full

; ============================================
; 测试环境配置 (Native)
; ============================================
[env:native]
platform = native
test_framework = unity

; 测试构建标志
build_flags =
    -std=c++17
    -DUNIT_TEST
    -DARDUINOJSON_ENABLE_STD_STRING=1
    -DARDUINOJSON_ENABLE_ARDUINO_STRING=0
    -DFASTBEE_ENABLE_MQTT=1
    -DFASTBEE_ENABLE_MODBUS=1
    -DFASTBEE_ENABLE_TCP=1
    -DFASTBEE_ENABLE_HTTP=1
    -DFASTBEE_ENABLE_COAP=0
    -DFASTBEE_ENABLE_MDNS=0
    -DFASTBEE_ENABLE_DNS=0
    -DFACILITY="user"
    -DLEVEL="info"
    ; 使用标准库替代 Arduino 特定功能
    -DUSE_NATIVE_STDLIB=1

; 测试依赖库
lib_deps =
    bblanchon/ArduinoJson @ 7.4.2
    throwtheswitch/Unity @ ^2.6.0

; 测试目录配置
test_build_src = yes
test_ignore = test_embedded

; 包含路径
build_src_flags =
    -I include
    -I test/mocks
    -I test/helpers
