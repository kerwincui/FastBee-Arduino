; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = esp32-F4R0

[esp32_base]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38/platform-espressif32.zip
framework = arduino
build_type = release
board_build.filesystem = littlefs
board_build.partitions = partitions/fastbee.csv
extra_scripts = 
	pre:scripts/kill-stale-processes.py
	pre:scripts/fastbee-artifacts.py
	post:scripts/fastbee-artifacts.py
lib_deps = 
	bblanchon/ArduinoJson @ 7.4.2
	knolleary/PubSubClient@^2.8
	olikraus/U8g2@^2.35.9
	adafruit/DHT sensor library@^1.4.6
	adafruit/Adafruit Unified Sensor@^1.1.14
	paulstoffregen/OneWire@^2.3.8
	milesburton/DallasTemperature@^3.9.0
	ESP32Async/ESPAsyncWebServer @ ^3.6.0
	ESP32Async/AsyncTCP @ ^3.3.2
	adafruit/Adafruit NeoPixel @ ^1.12.0
build_flags = 
	-Wno-deprecated-declarations
	-DFASTBEE_ENABLE_MQTT=1
	-DFASTBEE_ENABLE_MDNS=1
	-DFASTBEE_ENABLE_AP_MODE=1
	-DFASTBEE_ENABLE_WEB_SERVER=1
	-DFASTBEE_ENABLE_WEB_STATIC=1
	-DFASTBEE_ENABLE_WEB_API=1
	-DFASTBEE_ENABLE_AUTH=1
	-DFASTBEE_ENABLE_SESSION=1
	-DFASTBEE_ENABLE_TASK_MANAGER=1
	-DFASTBEE_ENABLE_HEALTH_MONITOR=1
	-DFASTBEE_ENABLE_LOGGER=1
	-DFASTBEE_ENABLE_PERIPH_EXEC=1
	-DFASTBEE_ENABLE_GPIO=1
	-DFASTBEE_ENABLE_SENSOR_DRIVER=1
	-DFASTBEE_ENABLE_LCD=1
	-DFASTBEE_ENABLE_SEVEN_SEGMENT=1
	-DFASTBEE_ENABLE_DNS=1
	-DFASTBEE_LOG_BUFFER_SIZE=256
	-DFASTBEE_JSON_DOC_SIZE=8192
	-DASYNCWEBSERVER_REGEX=1
	-DNDEBUG

[lite_flags]
build_flags = 
	-DFASTBEE_PROFILE_LITE=1
	-DFASTBEE_USE_PSRAM=0
	-DFASTBEE_ENABLE_TCP=0
	-DFASTBEE_ENABLE_HTTP=0
	-DFASTBEE_ENABLE_COAP=0
	-DFASTBEE_ENABLE_MODBUS=0
	-DFASTBEE_MODBUS_SLAVE_ENABLE=0
	-DFASTBEE_ENABLE_OTA=0
	-DFASTBEE_ENABLE_OTA_FS=0
	-DFASTBEE_ENABLE_RULE_SCRIPT=0
	-DFASTBEE_ENABLE_COMMAND_SCRIPT=0
	-DFASTBEE_ENABLE_USER_ADMIN=0
	-DFASTBEE_SINGLE_ADMIN_MODE=1
	-DFASTBEE_ENABLE_FILE_MANAGER=0
	-DFASTBEE_ENABLE_CONFIG_TRANSFER=1
	-DFASTBEE_ENABLE_LCD=1
	-DFASTBEE_ENABLE_LED_SCREEN=0
	-DFASTBEE_ENABLE_BLE=0
	-DFASTBEE_WEB_START_EARLY=0
	-DFASTBEE_ENABLE_STORAGE_CACHE=0
	-DFASTBEE_STRIP_INFO_LOGS=1
	-DFASTBEE_DEBUG_LOG=0
	-DFASTBEE_VERBOSE_ERROR=0
	-DFASTBEE_ENABLE_I2C_SENSORS=0
	-DFASTBEE_ENABLE_RFID=0
	-DFASTBEE_ENABLE_IR_REMOTE=0
	-DFASTBEE_ENABLE_ETHERNET=0
	-DFASTBEE_ENABLE_CELLULAR=0
	-DFASTBEE_ENABLE_NEOPIXEL=1
	-DCORE_DEBUG_LEVEL=1

[standard_flags]
build_flags = 
	-DFASTBEE_PROFILE_STANDARD=1
	-DFASTBEE_USE_PSRAM=0
	-DFASTBEE_ENABLE_TCP=0
	-DFASTBEE_ENABLE_HTTP=0
	-DFASTBEE_ENABLE_COAP=0
	-DFASTBEE_ENABLE_MODBUS=1
	-DFASTBEE_MODBUS_SLAVE_ENABLE=0
	-DFASTBEE_ENABLE_RULE_SCRIPT=1
	-DFASTBEE_ENABLE_COMMAND_SCRIPT=1
	-DFASTBEE_ENABLE_USER_ADMIN=0
	-DFASTBEE_SINGLE_ADMIN_MODE=1
	-DFASTBEE_ENABLE_FILE_MANAGER=0
	-DFASTBEE_ENABLE_CONFIG_TRANSFER=1
	-DFASTBEE_ENABLE_LED_SCREEN=1
	-DFASTBEE_ENABLE_BLE=0
	-DFASTBEE_WEB_START_EARLY=0
	-DFASTBEE_ENABLE_STORAGE_CACHE=0
	-DFASTBEE_STRIP_INFO_LOGS=1
	-DFASTBEE_DEBUG_LOG=0
	-DFASTBEE_VERBOSE_ERROR=0
	-DFASTBEE_ENABLE_I2C_SENSORS=1
	-DFASTBEE_ENABLE_RFID=1
	-DFASTBEE_ENABLE_IR_REMOTE=1
	-DFASTBEE_ENABLE_ETHERNET=0
	-DFASTBEE_ENABLE_CELLULAR=0
	-DCORE_DEBUG_LEVEL=1

[full_flags]
build_flags = 
	-DFASTBEE_PROFILE_FULL=1
	-DFASTBEE_USE_PSRAM=1
	-DBOARD_HAS_PSRAM
	-DFASTBEE_ENABLE_TCP=1
	-DFASTBEE_ENABLE_HTTP=1
	-DFASTBEE_ENABLE_COAP=1
	-DFASTBEE_ENABLE_MODBUS=1
	-DFASTBEE_MODBUS_SLAVE_ENABLE=1
	-DFASTBEE_ENABLE_OTA=1
	-DFASTBEE_ENABLE_OTA_FS=1
	-DFASTBEE_ENABLE_RULE_SCRIPT=1
	-DFASTBEE_ENABLE_COMMAND_SCRIPT=1
	-DFASTBEE_ENABLE_USER_ADMIN=1
	-DFASTBEE_ENABLE_LOG_VIEWER=1
	-DFASTBEE_ENABLE_FILE_LOGGING=1
	-DFASTBEE_SINGLE_ADMIN_MODE=0
	-DFASTBEE_ENABLE_FILE_MANAGER=1
	-DFASTBEE_ENABLE_CONFIG_TRANSFER=1
	-DFASTBEE_ENABLE_LED_SCREEN=1
	-DFASTBEE_ENABLE_BLE=1
	-DFASTBEE_WEB_START_EARLY=0
	-DFASTBEE_ENABLE_STORAGE_CACHE=0
	-DFASTBEE_STRIP_INFO_LOGS=1
	-DFASTBEE_DEBUG_LOG=0
	-DFASTBEE_VERBOSE_ERROR=0
	-DCORE_DEBUG_LEVEL=1
	-DFASTBEE_ENABLE_I2C_SENSORS=1
	-DFASTBEE_ENABLE_RFID=1
	-DFASTBEE_ENABLE_ETHERNET=1
	-DFASTBEE_ENABLE_CELLULAR=1
	-DFASTBEE_ENABLE_NEOPIXEL=1
	-DFASTBEE_ENABLE_I18N=1

[lite_src_filter]
build_src_filter = 
	+<*>
	-<core/RuleScriptManager.cpp>
	-<network/CellularAdapter.cpp>
	-<network/EthernetAdapter.cpp>
	-<network/OTAManager.cpp>
	-<network/handlers/OTARouteHandler.cpp>
	-<network/handlers/UserRouteHandler.cpp>
	-<network/handlers/LogRouteHandler.cpp>
	-<network/handlers/RuleScriptRouteHandler.cpp>
	-<protocols/TCPHandler.cpp>
	-<protocols/HTTPClientWrapper.cpp>
	-<protocols/CoAPHandler.cpp>

[standard_ota_src_filter]
build_src_filter = 
	+<*>
	-<network/CellularAdapter.cpp>
	-<network/EthernetAdapter.cpp>
	-<network/handlers/UserRouteHandler.cpp>
	-<network/handlers/LogRouteHandler.cpp>
	-<protocols/TCPHandler.cpp>
	-<protocols/HTTPClientWrapper.cpp>
	-<protocols/CoAPHandler.cpp>

[standard_src_filter]
build_src_filter = 
	+<*>
	-<network/CellularAdapter.cpp>
	-<network/EthernetAdapter.cpp>
	-<network/OTAManager.cpp>
	-<network/handlers/OTARouteHandler.cpp>
	-<network/handlers/UserRouteHandler.cpp>
	-<network/handlers/LogRouteHandler.cpp>
	-<protocols/TCPHandler.cpp>
	-<protocols/HTTPClientWrapper.cpp>
	-<protocols/CoAPHandler.cpp>

[esp32_runtime_flags]
build_flags = 
	-DCONFIG_ASYNC_TCP_MAX_CONNECTIONS=6
	-DCONFIG_ASYNC_TCP_QUEUE_SIZE=8
	-DARDUINO_LOOP_STACK_SIZE=16384
	-DCONFIG_ASYNC_TCP_TASK_WDT_TIMEOUT=10
	-DSCRIPT_TASK_STACK=8192
	-DSIMPLE_TASK_STACK=6144

[esp32c3_runtime_flags]
build_flags = 
	-DARDUINO_USB_MODE=1
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DCONFIG_ASYNC_TCP_MAX_CONNECTIONS=4
	-DCONFIG_ASYNC_TCP_QUEUE_SIZE=4
	-DARDUINO_LOOP_STACK_SIZE=12288
	-DCONFIG_ASYNC_TCP_TASK_WDT_TIMEOUT=10
	-DSCRIPT_TASK_STACK=6144
	-DSIMPLE_TASK_STACK=4096

[esp32c6_runtime_flags]
build_flags = 
	-DARDUINO_USB_MODE=1
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DCONFIG_ASYNC_TCP_MAX_CONNECTIONS=6
	-DCONFIG_ASYNC_TCP_QUEUE_SIZE=8
	-DARDUINO_LOOP_STACK_SIZE=12288
	-DCONFIG_ASYNC_TCP_TASK_WDT_TIMEOUT=10
	-DSCRIPT_TASK_STACK=6144
	-DSIMPLE_TASK_STACK=4096

[esp32s3_runtime_flags]
build_flags = 
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DCONFIG_ASYNC_TCP_MAX_CONNECTIONS=14
	-DCONFIG_ASYNC_TCP_QUEUE_SIZE=24
	-DARDUINO_LOOP_STACK_SIZE=16384
	-DCONFIG_ASYNC_TCP_TASK_WDT_TIMEOUT=10
	-DSCRIPT_TASK_STACK=8192
	-DSIMPLE_TASK_STACK=6144

[env:esp32-F4R0]
platform = ${esp32_base.platform}
framework = ${esp32_base.framework}
board = esp32dev
board_build.mcu = esp32
build_type = ${esp32_base.build_type}
board_build.filesystem = ${esp32_base.board_build.filesystem}
board_build.partitions = ${esp32_base.board_build.partitions}
extra_scripts = ${esp32_base.extra_scripts}
lib_deps = 
	${esp32_base.lib_deps}
	adafruit/Adafruit BMP280 Library@^2.6.8
	adafruit/Adafruit MPU6050@^2.2.6
	miguelbalboa/MFRC522@^1.4.11
	crankyoldgit/IRremoteESP8266@^2.8.6
lib_ignore = NimBLE-Arduino
upload_speed = 921600
monitor_speed = 115200
monitor_filters = direct
build_flags = 
	${esp32_base.build_flags}
	${esp32_runtime_flags.build_flags}
	${standard_flags.build_flags}
	-DFASTBEE_ENABLE_OTA=0
	-DFASTBEE_ENABLE_OTA_FS=0
build_src_filter = ${standard_src_filter.build_src_filter}

[env:esp32-F8R4]
platform = ${esp32_base.platform}
framework = ${esp32_base.framework}
board = esp32dev
board_build.mcu = esp32
build_type = ${esp32_base.build_type}
board_build.filesystem = ${esp32_base.board_build.filesystem}
board_build.partitions = partitions/fastbee-8MB.csv
board_build.flash_size = 8MB
board_build.psram = enabled
extra_scripts = ${esp32_base.extra_scripts}
lib_deps = 
	${esp32_base.lib_deps}
	adafruit/Adafruit BMP280 Library@^2.6.8
	adafruit/Adafruit MPU6050@^2.2.6
	miguelbalboa/MFRC522@^1.4.11
	crankyoldgit/IRremoteESP8266@^2.8.6
	vshymanskyy/TinyGSM@^0.11.7
	digitaldragon/SSLClient@1.3.2
upload_speed = 921600
monitor_speed = 115200
monitor_filters = direct
build_flags = 
	${esp32_base.build_flags}
	${esp32_runtime_flags.build_flags}
	${full_flags.build_flags}
	-DFASTBEE_ENABLE_IR_REMOTE=1

[env:esp32c3-F4R0]
platform = ${esp32_base.platform}
framework = ${esp32_base.framework}
board = esp32-c3-devkitm-1
build_type = ${esp32_base.build_type}
board_build.filesystem = ${esp32_base.board_build.filesystem}
board_build.partitions = ${esp32_base.board_build.partitions}
extra_scripts = ${esp32_base.extra_scripts}
lib_deps = ${esp32_base.lib_deps}
lib_ignore = NimBLE-Arduino
upload_speed = 921600
monitor_speed = 115200
monitor_filters = direct
build_flags = 
	${esp32_base.build_flags}
	${esp32c3_runtime_flags.build_flags}
	${lite_flags.build_flags}
build_src_filter = ${lite_src_filter.build_src_filter}

[env:esp32s3-F8R0]
platform = ${esp32_base.platform}
framework = ${esp32_base.framework}
board = esp32-s3-devkitc-1
build_type = ${esp32_base.build_type}
board_build.filesystem = ${esp32_base.board_build.filesystem}
board_build.partitions = partitions/fastbee-8MB.csv
board_build.flash_size = 8MB
extra_scripts = ${esp32_base.extra_scripts}
upload_port = COM6
monitor_port = COM6
lib_deps = 
	${esp32_base.lib_deps}
	adafruit/Adafruit BMP280 Library@^2.6.8
	adafruit/Adafruit MPU6050@^2.2.6
	miguelbalboa/MFRC522@^1.4.11
	crankyoldgit/IRremoteESP8266@^2.8.6
upload_speed = 921600
monitor_speed = 115200
monitor_filters = direct
build_flags = 
	${esp32_base.build_flags}
	${esp32s3_runtime_flags.build_flags}
	${standard_flags.build_flags}
	-DFASTBEE_ENABLE_OTA=1
	-DFASTBEE_ENABLE_OTA_FS=1
build_src_filter = ${standard_ota_src_filter.build_src_filter}

[env:esp32c6-F4R0]
platform = ${esp32_base.platform}
framework = ${esp32_base.framework}
board = esp32-c6-devkitc-1
build_type = ${esp32_base.build_type}
board_build.filesystem = ${esp32_base.board_build.filesystem}
board_build.partitions = ${esp32_base.board_build.partitions}
extra_scripts = ${esp32_base.extra_scripts}
lib_deps = ${esp32_base.lib_deps}
lib_ignore = NimBLE-Arduino, OneWire, DallasTemperature
upload_speed = 921600
monitor_speed = 115200
monitor_filters = direct
build_flags = 
	${esp32_base.build_flags}
	${esp32c6_runtime_flags.build_flags}
	${lite_flags.build_flags}
	-DFASTBEE_ENABLE_DS18B20=0
build_src_filter = ${lite_src_filter.build_src_filter}

[env:esp32s3-F8R4]
platform = ${esp32_base.platform}
framework = ${esp32_base.framework}
board = esp32-s3-devkitc-1
build_type = ${esp32_base.build_type}
board_build.filesystem = ${esp32_base.board_build.filesystem}
board_build.partitions = partitions/fastbee-8MB.csv
board_build.flash_size = 8MB
board_build.psram = enabled
extra_scripts = ${esp32_base.extra_scripts}
lib_deps = 
	${esp32_base.lib_deps}
	adafruit/Adafruit BMP280 Library@^2.6.8
	adafruit/Adafruit MPU6050@^2.2.6
	miguelbalboa/MFRC522@^1.4.11
	vshymanskyy/TinyGSM@^0.11.7
	digitaldragon/SSLClient@1.3.2
upload_speed = 921600
monitor_speed = 115200
monitor_filters = direct
build_flags = 
	${esp32_base.build_flags}
	${esp32s3_runtime_flags.build_flags}
	${full_flags.build_flags}
	-DFASTBEE_ENABLE_IR_REMOTE=0

[env:esp32s3-F16R8]
platform = ${esp32_base.platform}
framework = ${esp32_base.framework}
board = esp32-s3-devkitc1-n16r8
build_type = ${esp32_base.build_type}
board_build.filesystem = ${esp32_base.board_build.filesystem}
board_build.partitions = partitions/fastbee-16MB.csv
board_build.flash_size = 16MB
board_build.psram = enabled
extra_scripts = ${esp32_base.extra_scripts}
lib_deps = 
	${esp32_base.lib_deps}
	adafruit/Adafruit BMP280 Library@^2.6.8
	adafruit/Adafruit MPU6050@^2.2.6
	miguelbalboa/MFRC522@^1.4.11
	vshymanskyy/TinyGSM@^0.11.7
	digitaldragon/SSLClient@1.3.2
upload_speed = 921600
upload_port = COM6
monitor_port = COM6
monitor_speed = 115200
monitor_filters = direct
build_flags = 
	${esp32_base.build_flags}
	${esp32s3_runtime_flags.build_flags}
	${full_flags.build_flags}
	-DFASTBEE_ENABLE_IR_REMOTE=0

[env:native]
platform = native
test_framework = unity
test_build_src = no
test_ignore = test_embedded
build_flags = 
	-std=c++17
	-I test/mocks
	-I test/helpers
	-I include
	-DUNIT_TEST
	-DARDUINOJSON_ENABLE_STD_STRING=1
	-DARDUINOJSON_ENABLE_ARDUINO_STRING=0
	-DFASTBEE_ENABLE_MQTT=1
	-DFASTBEE_ENABLE_MODBUS=1
	-DFASTBEE_ENABLE_TCP=1
	-DFASTBEE_ENABLE_HTTP=1
	-DFASTBEE_ENABLE_COAP=0
	-DFASTBEE_ENABLE_MDNS=0
	-DFASTBEE_ENABLE_DNS=0
	-DFACILITY="user"
	-DLEVEL="info"
	-DUSE_NATIVE_STDLIB=1
lib_deps = 
	bblanchon/ArduinoJson @ 7.4.2
	throwtheswitch/Unity @ ^2.6.0
build_src_flags = 
	-I include
	-I test/mocks
	-I test/helpers
