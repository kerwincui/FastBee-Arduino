<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="820" viewBox="0 0 1440 820" role="img" aria-labelledby="title desc">
  <title id="title">两阶段锁执行流程</title>
  <desc id="desc">展示外设执行中快照阶段和动作执行阶段分离的锁保护流程。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="0.56" stop-color="#f0f9ff"/>
      <stop offset="1" stop-color="#fff7ed"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-16%" width="120%" height="132%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.13"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <style>
      text { font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #172033; }
      .title { font-size: 42px; font-weight: 700; }
      .subtitle { font-size: 20px; fill: #475569; }
      .lane { fill: #ffffff; stroke: #d7dee9; stroke-width: 1.5; rx: 18; filter: url(#shadow); }
      .head { font-size: 23px; font-weight: 700; }
      .label { font-size: 17px; font-weight: 700; }
      .small { font-size: 14px; fill: #475569; }
      .line { stroke: #2563eb; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #94a3b8; stroke-width: 2.4; stroke-dasharray: 7 8; fill: none; marker-end: url(#arrow); }
      .lock { fill: #fff7ed; stroke: #fdba74; rx: 12; }
      .free { fill: #ecfdf5; stroke: #a7f3d0; rx: 12; }
      .work { fill: #eff6ff; stroke: #bfdbfe; rx: 12; }
      .danger { fill: #fff1f2; stroke: #fecdd3; rx: 12; }
      .dark { fill: #0f172a; }
    </style>
  </defs>
  <rect width="1440" height="820" fill="url(#bg)"/>
  <text x="72" y="72" class="title">两阶段锁执行流程</text>
  <text x="72" y="108" class="subtitle">先短时间加锁复制规则快照，再释放锁执行动作，避免长耗时外设操作阻塞规则管理和 Web API。</text>

  <rect x="88" y="168" width="1250" height="150" class="lane"/>
  <text x="118" y="212" class="head">阶段 A：快照与条件判断</text>
  <rect x="118" y="242" width="160" height="46" class="work"/><text x="145" y="271" class="label">触发事件到达</text>
  <rect x="338" y="242" width="160" height="46" class="lock"/><text x="370" y="271" class="label">获取规则锁</text>
  <rect x="558" y="242" width="160" height="46" class="work"/><text x="588" y="271" class="label">复制规则快照</text>
  <rect x="778" y="242" width="160" height="46" class="work"/><text x="805" y="271" class="label">评估触发条件</text>
  <rect x="998" y="242" width="160" height="46" class="free"/><text x="1030" y="271" class="label">释放规则锁</text>
  <path d="M278 265 C303 265 313 265 338 265" class="line"/>
  <path d="M498 265 C523 265 533 265 558 265" class="line"/>
  <path d="M718 265 C743 265 753 265 778 265" class="line"/>
  <path d="M938 265 C963 265 973 265 998 265" class="line"/>

  <rect x="88" y="378" width="1250" height="150" class="lane"/>
  <text x="118" y="422" class="head">阶段 B：动作执行与结果收集</text>
  <rect x="118" y="452" width="160" height="46" class="work"/><text x="142" y="481" class="label">按顺序执行</text>
  <rect x="338" y="452" width="160" height="46" class="work"/><text x="368" y="481" class="label">调用外设驱动</text>
  <rect x="558" y="452" width="160" height="46" class="work"/><text x="586" y="481" class="label">收集执行结果</text>
  <rect x="778" y="452" width="160" height="46" class="work"/><text x="808" y="481" class="label">上报或记日志</text>
  <rect x="998" y="452" width="160" height="46" class="free"/><text x="1032" y="481" class="label">返回响应</text>
  <path d="M278 475 C303 475 313 475 338 475" class="line"/>
  <path d="M498 475 C523 475 533 475 558 475" class="line"/>
  <path d="M718 475 C743 475 753 475 778 475" class="line"/>
  <path d="M938 475 C963 475 973 475 998 475" class="line"/>
  <path d="M1078 318 C1078 342 1078 354 1078 378" class="line"/>

  <rect x="130" y="596" width="520" height="84" class="free"/>
  <text x="162" y="628" class="label">为什么要分两阶段</text>
  <text x="162" y="656" class="small">外设动作可能包含串口、Modbus、显示刷新或延时；释放规则锁后执行，可减少 Web 保存、启停和列表查询被阻塞。</text>

  <rect x="790" y="596" width="520" height="84" class="danger"/>
  <text x="822" y="628" class="label">排查关注点</text>
  <text x="822" y="656" class="small">若规则保存后旧动作仍执行，检查快照时机；若并发下结果错乱，检查 targetPeriphId 和外设自身互斥锁。</text>

  <path d="M650 638 C690 638 750 638 790 638" class="dash"/>
  <rect x="120" y="724" width="1200" height="46" rx="14" class="dark" opacity="0.94"/>
  <text x="156" y="753" fill="#e2e8f0" style="font-family: 'Microsoft YaHei', 'PingFang SC', Arial, sans-serif; font-size: 16px;">调试口诀：规则锁只保护规则集合，外设锁保护硬件资源，长耗时动作必须在规则锁外执行。</text>
</svg>
