<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="760" viewBox="0 0 1440 760">
  <defs>
    <style>
      .bg{fill:#f8fafc}
      .title{font:700 34px "Microsoft YaHei",Arial,sans-serif;fill:#172033}
      .sub{font:400 18px "Microsoft YaHei",Arial,sans-serif;fill:#5a667a}
      .panel{fill:#fff;stroke:#cfd8e3;stroke-width:2}
      .stepA{fill:#eef6ff;stroke:#5d9ad5;stroke-width:2}
      .stepB{fill:#f0fbf3;stroke:#5cac75;stroke-width:2}
      .stepC{fill:#fff7e8;stroke:#d49b3d;stroke-width:2}
      .stepD{fill:#f5f0ff;stroke:#8b72c9;stroke-width:2}
      .danger{fill:#fff1f0;stroke:#d96a63;stroke-width:2}
      .h{font:700 22px "Microsoft YaHei",Arial,sans-serif;fill:#172033}
      .p{font:400 16px "Microsoft YaHei",Arial,sans-serif;fill:#445066}
      .small{font:400 14px "Microsoft YaHei",Arial,sans-serif;fill:#5a667a}
      .badge{font:700 16px "Microsoft YaHei",Arial,sans-serif;fill:#fff}
      .arrow{stroke:#69778b;stroke-width:3;fill:none;marker-end:url(#arrow)}
      .warn{stroke:#d96a63;stroke-width:3;fill:none;stroke-dasharray:8 8;marker-end:url(#arrowRed)}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#69778b"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d96a63"/>
    </marker>
  </defs>

  <rect class="bg" width="1440" height="760"/>
  <text class="title" x="72" y="70">配置文件生命周期流程图</text>
  <text class="sub" x="72" y="106">文件管理页不仅用于上传下载，更适合作为配置变更的备份、校验、回滚入口。</text>

  <rect class="stepA" x="86" y="178" width="240" height="160" rx="18"/>
  <circle cx="126" cy="226" r="24" fill="#2f7eca"/>
  <text class="badge" x="113" y="232">1</text>
  <text class="h" x="162" y="222">导出现网配置</text>
  <text class="p" x="116" y="264">下载 network.json</text>
  <text class="p" x="116" y="292">下载 mqtt.json</text>
  <text class="p" x="116" y="320">下载外设和规则文件</text>

  <rect class="stepB" x="392" y="178" width="240" height="160" rx="18"/>
  <circle cx="432" cy="226" r="24" fill="#3f9b63"/>
  <text class="badge" x="419" y="232">2</text>
  <text class="h" x="468" y="222">离线编辑</text>
  <text class="p" x="422" y="264">保留备份文件名</text>
  <text class="p" x="422" y="292">只改目标字段</text>
  <text class="p" x="422" y="320">记录变更原因</text>

  <rect class="stepC" x="698" y="178" width="240" height="160" rx="18"/>
  <circle cx="738" cy="226" r="24" fill="#c47a1d"/>
  <text class="badge" x="725" y="232">3</text>
  <text class="h" x="774" y="222">语法校验</text>
  <text class="p" x="728" y="264">确认 JSON 可解析</text>
  <text class="p" x="728" y="292">检查数组和字段类型</text>
  <text class="p" x="728" y="320">避免空配置覆盖</text>

  <rect class="stepD" x="1004" y="178" width="240" height="160" rx="18"/>
  <circle cx="1044" cy="226" r="24" fill="#7357b8"/>
  <text class="badge" x="1031" y="232">4</text>
  <text class="h" x="1080" y="222">上传并重载</text>
  <text class="p" x="1034" y="264">通过文件管理上传</text>
  <text class="p" x="1034" y="292">必要时重启设备</text>
  <text class="p" x="1034" y="320">查看日志和状态</text>

  <path class="arrow" d="M326 258 H392"/>
  <path class="arrow" d="M632 258 H698"/>
  <path class="arrow" d="M938 258 H1004"/>

  <rect class="panel" x="130" y="462" width="350" height="150" rx="18"/>
  <text class="h" x="166" y="508">正常验证</text>
  <text class="p" x="166" y="546">仪表盘确认网络、MQTT、内存状态</text>
  <text class="p" x="166" y="576">外设和执行规则页面确认配置生效</text>

  <rect class="danger" x="544" y="462" width="350" height="150" rx="18"/>
  <text class="h" x="580" y="508">异常回滚</text>
  <text class="p" x="580" y="546">页面报错或日志提示解析失败</text>
  <text class="p" x="580" y="576">立即上传上一步备份并重启验证</text>

  <rect class="panel" x="958" y="462" width="350" height="150" rx="18"/>
  <text class="h" x="994" y="508">归档交付</text>
  <text class="p" x="994" y="546">保存最终配置和截图</text>
  <text class="p" x="994" y="576">把版本、IP、端口和时间写入记录</text>

  <path class="arrow" d="M1124 338 V408 H305 V462"/>
  <path class="warn" d="M1124 338 V408 H719 V462"/>
  <path class="arrow" d="M480 537 H544"/>
  <path class="arrow" d="M894 537 H958"/>

  <text class="small" x="72" y="704">建议：每次导入前先导出，出错时优先恢复备份，再逐段合并变更；不要直接覆盖未知来源的完整配置包。</text>
</svg>
