<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="820" viewBox="0 0 1440 820" role="img" aria-labelledby="title desc">
  <title id="title">命令脚本语法速查</title>
  <desc id="desc">展示 FastBee 命令脚本的常用命令、参数形式、安全限制、执行顺序和排查路径。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="0.54" stop-color="#eef6ff"/>
      <stop offset="1" stop-color="#fff7ed"/>
    </linearGradient>
    <filter id="shadow" x="-8%" y="-12%" width="116%" height="124%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      text { font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #172033; }
      .title { font-size: 42px; font-weight: 700; }
      .subtitle { font-size: 20px; fill: #475569; }
      .panel { fill: #ffffff; stroke: #d7dee9; stroke-width: 1.5; rx: 18; filter: url(#shadow); }
      .head { font-size: 22px; font-weight: 700; }
      .small { font-size: 15px; fill: #475569; }
      .mono { font-family: Consolas, "Microsoft YaHei", monospace; font-size: 15px; fill: #334155; }
      .cmd { fill: #eff6ff; stroke: #bfdbfe; rx: 12; }
      .safe { fill: #ecfdf5; stroke: #a7f3d0; rx: 12; }
      .warn { fill: #fff7ed; stroke: #fdba74; rx: 12; }
      .bad { fill: #fff1f2; stroke: #fecdd3; rx: 12; }
    </style>
  </defs>
  <rect width="1440" height="820" fill="url(#bg)"/>
  <text x="72" y="72" class="title">命令脚本语法速查</text>
  <text x="72" y="108" class="subtitle">命令脚本适合短小、顺序、可审计的硬件动作；复杂条件判断应放在外设执行触发器或平台侧。</text>

  <rect x="82" y="160" width="390" height="480" class="panel"/>
  <text x="118" y="208" class="head">常用命令</text>
  <rect x="118" y="246" width="286" height="42" class="cmd"/><text x="142" y="273" class="mono">GPIO pin HIGH | LOW</text>
  <rect x="118" y="306" width="286" height="42" class="cmd"/><text x="142" y="333" class="mono">DELAY ms</text>
  <rect x="118" y="366" width="286" height="42" class="cmd"/><text x="142" y="393" class="mono">PWM pin duty freq</text>
  <rect x="118" y="426" width="286" height="42" class="cmd"/><text x="142" y="453" class="mono">PERIPH id action value</text>
  <rect x="118" y="486" width="286" height="42" class="cmd"/><text x="142" y="513" class="mono">MQTT key value</text>
  <rect x="118" y="546" width="286" height="42" class="cmd"/><text x="142" y="573" class="mono">LOG text</text>

  <rect x="526" y="160" width="390" height="480" class="panel"/>
  <text x="562" y="208" class="head">安全边界</text>
  <rect x="562" y="246" width="286" height="48" class="safe"/><text x="586" y="276" class="small">每行一个命令，顺序执行</text>
  <rect x="562" y="314" width="286" height="48" class="safe"/><text x="586" y="344" class="small">注释独占一行</text>
  <rect x="562" y="382" width="286" height="48" class="warn"/><text x="586" y="412" class="small">限制最大脚本长度</text>
  <rect x="562" y="450" width="286" height="48" class="warn"/><text x="586" y="480" class="small">限制延时和嵌套深度</text>
  <rect x="562" y="518" width="286" height="48" class="bad"/><text x="586" y="548" class="small">不要写无限循环或长阻塞</text>

  <rect x="970" y="160" width="390" height="480" class="panel"/>
  <text x="1006" y="208" class="head">排查路径</text>
  <rect x="1006" y="246" width="286" height="48" class="cmd"/><text x="1030" y="276" class="small">1. 保存时语法校验</text>
  <rect x="1006" y="314" width="286" height="48" class="cmd"/><text x="1030" y="344" class="small">2. 手动执行单条动作</text>
  <rect x="1006" y="382" width="286" height="48" class="cmd"/><text x="1030" y="412" class="small">3. 查看外设状态和日志</text>
  <rect x="1006" y="450" width="286" height="48" class="cmd"/><text x="1030" y="480" class="small">4. 确认目标外设启用</text>
  <rect x="1006" y="518" width="286" height="48" class="cmd"/><text x="1030" y="548" class="small">5. 再接入触发器</text>

  <rect x="120" y="714" width="1200" height="54" rx="16" fill="#0f172a" opacity="0.94"/>
  <text x="156" y="748" fill="#e2e8f0" style="font-family: 'Microsoft YaHei', 'PingFang SC', Arial, sans-serif; font-size: 17px;">推荐写法：先用 LOG 标记步骤，再逐条加入 GPIO、PERIPH、MQTT 等命令；强动作脚本默认禁用，验证后再启用。</text>
</svg>
