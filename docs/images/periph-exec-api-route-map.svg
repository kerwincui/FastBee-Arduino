<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="820" viewBox="0 0 1440 820" role="img" aria-labelledby="title desc">
  <title id="title">PeriphExec API 路由地图</title>
  <desc id="desc">展示外设执行页面、REST API、PeriphExecManager 方法、配置文件和运行时结果之间的关系。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="0.55" stop-color="#f0f9ff"/>
      <stop offset="1" stop-color="#f5f3ff"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-16%" width="120%" height="132%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <style>
      text { font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #172033; }
      .title { font-size: 42px; font-weight: 700; }
      .subtitle { font-size: 20px; fill: #475569; }
      .card { fill: #ffffff; stroke: #d7dee9; stroke-width: 1.5; rx: 18; filter: url(#shadow); }
      .label { font-size: 22px; font-weight: 700; }
      .small { font-size: 15px; fill: #475569; }
      .mono { font-family: Consolas, "Microsoft YaHei", monospace; font-size: 14px; fill: #334155; }
      .line { stroke: #2563eb; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .box { fill: #eff6ff; stroke: #bfdbfe; rx: 12; }
      .green { fill: #ecfdf5; stroke: #a7f3d0; rx: 12; }
      .orange { fill: #fff7ed; stroke: #fdba74; rx: 12; }
      .red { fill: #fff1f2; stroke: #fecdd3; rx: 12; }
    </style>
  </defs>
  <rect width="1440" height="820" fill="url(#bg)"/>
  <text x="72" y="72" class="title">PeriphExec API 路由地图</text>
  <text x="72" y="108" class="subtitle">把页面操作、REST API、Manager 方法和配置文件串起来，便于定位“页面点了按钮之后到底走到哪里”。</text>

  <rect x="72" y="176" width="250" height="430" class="card"/>
  <text x="108" y="224" class="label">Web 页面</text>
  <rect x="108" y="264" width="166" height="42" class="box"/><text x="132" y="291" class="small">规则列表</text>
  <rect x="108" y="326" width="166" height="42" class="box"/><text x="132" y="353" class="small">新增/编辑</text>
  <rect x="108" y="388" width="166" height="42" class="box"/><text x="132" y="415" class="small">启用/禁用</text>
  <rect x="108" y="450" width="166" height="42" class="box"/><text x="132" y="477" class="small">执行一次</text>

  <rect x="392" y="176" width="310" height="430" class="card"/>
  <text x="428" y="224" class="label">REST API</text>
  <rect x="428" y="264" width="220" height="36" class="green"/><text x="448" y="288" class="mono">GET /api/periph-exec</text>
  <rect x="428" y="316" width="220" height="36" class="green"/><text x="448" y="340" class="mono">POST /api/periph-exec</text>
  <rect x="428" y="368" width="220" height="36" class="green"/><text x="448" y="392" class="mono">PUT /api/periph-exec/{id}</text>
  <rect x="428" y="420" width="220" height="36" class="green"/><text x="448" y="444" class="mono">POST /run-once</text>
  <rect x="428" y="472" width="220" height="36" class="green"/><text x="448" y="496" class="mono">POST /enable</text>
  <rect x="428" y="524" width="220" height="36" class="green"/><text x="448" y="548" class="mono">DELETE /{id}</text>

  <rect x="772" y="176" width="270" height="430" class="card"/>
  <text x="808" y="224" class="label">Manager 方法</text>
  <rect x="808" y="264" width="180" height="36" class="orange"/><text x="830" y="288" class="mono">listRules()</text>
  <rect x="808" y="316" width="180" height="36" class="orange"/><text x="830" y="340" class="mono">addRule()</text>
  <rect x="808" y="368" width="180" height="36" class="orange"/><text x="830" y="392" class="mono">updateRule()</text>
  <rect x="808" y="420" width="180" height="36" class="orange"/><text x="830" y="444" class="mono">runOnce()</text>
  <rect x="808" y="472" width="180" height="36" class="orange"/><text x="830" y="496" class="mono">enableRule()</text>
  <rect x="808" y="524" width="180" height="36" class="orange"/><text x="830" y="548" class="mono">removeRule()</text>

  <rect x="1112" y="176" width="250" height="430" class="card"/>
  <text x="1148" y="224" class="label">结果落点</text>
  <rect x="1148" y="264" width="166" height="42" class="box"/><text x="1170" y="291" class="small">periph_exec.json</text>
  <rect x="1148" y="326" width="166" height="42" class="box"/><text x="1170" y="353" class="small">规则运行态</text>
  <rect x="1148" y="388" width="166" height="42" class="box"/><text x="1170" y="415" class="small">执行日志</text>
  <rect x="1148" y="450" width="166" height="42" class="box"/><text x="1170" y="477" class="small">MQTT 上报</text>
  <rect x="1148" y="512" width="166" height="42" class="red"/><text x="1170" y="539" class="small">错误响应</text>

  <path d="M322 390 C354 390 360 390 392 390" class="line"/>
  <path d="M702 390 C734 390 740 390 772 390" class="line"/>
  <path d="M1042 390 C1074 390 1080 390 1112 390" class="line"/>

  <rect x="120" y="700" width="1200" height="58" rx="16" fill="#0f172a" opacity="0.94"/>
  <text x="156" y="735" fill="#e2e8f0" style="font-family: 'Microsoft YaHei', 'PingFang SC', Arial, sans-serif; font-size: 16px;">调试建议：先在浏览器看 API 响应，再看设备日志中的 Manager 方法结果，最后检查配置文件是否真正落盘。</text>
</svg>
