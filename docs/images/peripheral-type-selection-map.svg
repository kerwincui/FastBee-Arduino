<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="820" viewBox="0 0 1440 820">
  <defs>
    <style>
      .bg{fill:#f8fafc}
      .title{font:700 34px "Microsoft YaHei",Arial,sans-serif;fill:#172033}
      .sub{font:400 18px "Microsoft YaHei",Arial,sans-serif;fill:#5a667a}
      .card{fill:#fff;stroke:#cfd8e3;stroke-width:2}
      .a{fill:#eef6ff;stroke:#5b9bd8;stroke-width:2}
      .b{fill:#f0fbf3;stroke:#5cac75;stroke-width:2}
      .c{fill:#fff6e7;stroke:#d49b3d;stroke-width:2}
      .d{fill:#f5f0ff;stroke:#8b72c9;stroke-width:2}
      .e{fill:#fff1f0;stroke:#d96a63;stroke-width:2}
      .h{font:700 21px "Microsoft YaHei",Arial,sans-serif;fill:#172033}
      .p{font:400 16px "Microsoft YaHei",Arial,sans-serif;fill:#445066}
      .small{font:400 14px "Microsoft YaHei",Arial,sans-serif;fill:#5a667a}
      .code{font:700 15px Consolas,"Microsoft YaHei",monospace;fill:#263248}
      .arrow{stroke:#69778b;stroke-width:3;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10z" fill="#69778b"/></marker>
  </defs>
  <rect class="bg" width="1440" height="820"/>
  <text class="title" x="72" y="70">外设类型选型地图</text>
  <text class="sub" x="72" y="106">先按信号形态选外设类型，再决定是否需要传感器驱动、显示、通信总线或外设执行规则。</text>

  <rect class="card" x="550" y="150" width="340" height="112" rx="18"/>
  <text class="h" x="606" y="198">我要接入什么硬件？</text>
  <text class="p" x="606" y="230">从信号形态和交互方式开始判断</text>

  <rect class="a" x="72" y="370" width="238" height="170" rx="18"/>
  <text class="h" x="110" y="418">开关量</text>
  <text class="code" x="110" y="456">GPIO 输入 / 输出</text>
  <text class="p" x="110" y="486">按键、门磁、继电器</text>
  <text class="p" x="110" y="516">先确认触发电平</text>

  <rect class="b" x="358" y="370" width="238" height="170" rx="18"/>
  <text class="h" x="396" y="418">模拟量</text>
  <text class="code" x="396" y="456">ADC / Voltage / Current</text>
  <text class="p" x="396" y="486">电压、电流、光照</text>
  <text class="p" x="396" y="516">先确认量程和校准</text>

  <rect class="c" x="644" y="370" width="238" height="170" rx="18"/>
  <text class="h" x="682" y="418">总线设备</text>
  <text class="code" x="682" y="456">I2C / SPI / UART</text>
  <text class="p" x="682" y="486">OLED、RFID、串口模块</text>
  <text class="p" x="682" y="516">先确认地址和速率</text>

  <rect class="d" x="930" y="370" width="238" height="170" rx="18"/>
  <text class="h" x="968" y="418">RS485 从站</text>
  <text class="code" x="968" y="456">Modbus Device</text>
  <text class="p" x="968" y="486">继电器、采集模块</text>
  <text class="p" x="968" y="516">先确认协议页参数</text>

  <rect class="e" x="1216" y="370" width="150" height="170" rx="18"/>
  <text class="h" x="1244" y="418">显示输出</text>
  <text class="code" x="1244" y="456">OLED</text>
  <text class="code" x="1244" y="482">TM1637</text>
  <text class="p" x="1244" y="516">先跑静态文本</text>

  <path class="arrow" d="M720 262 V316 H191 V370"/>
  <path class="arrow" d="M720 316 H477 V370"/>
  <path class="arrow" d="M720 316 H763 V370"/>
  <path class="arrow" d="M720 316 H1049 V370"/>
  <path class="arrow" d="M720 316 H1291 V370"/>

  <rect class="card" x="178" y="650" width="310" height="92" rx="18"/>
  <text class="h" x="216" y="690">保存为禁用</text>
  <text class="p" x="216" y="720">先建对象，再看日志和单项动作</text>

  <rect class="card" x="565" y="650" width="310" height="92" rx="18"/>
  <text class="h" x="603" y="690">接入规则</text>
  <text class="p" x="603" y="720">采集、判断、显示、控制分步验证</text>

  <rect class="card" x="952" y="650" width="310" height="92" rx="18"/>
  <text class="h" x="990" y="690">上报和留档</text>
  <text class="p" x="990" y="720">记录配置、截图、日志和恢复方式</text>

  <path class="arrow" d="M488 696 H565"/>
  <path class="arrow" d="M875 696 H952"/>
  <text class="small" x="72" y="792">安全默认：所有未知接线或会驱动负载的外设，先禁用保存，完成单项验证后再启用规则联动。</text>
</svg>
