<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="820" viewBox="0 0 1440 820" role="img" aria-labelledby="title desc">
  <title id="title">外设配置数据模型</title>
  <desc id="desc">从 Web 表单和 JSON 配置到运行时驱动、缓存、规则和日志消费者的外设配置链路。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="0.55" stop-color="#eef6ff"/>
      <stop offset="1" stop-color="#f7fbf4"/>
    </linearGradient>
    <filter id="shadow" x="-12%" y="-18%" width="124%" height="136%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#1f2937" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <style>
      text { font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #172033; }
      .title { font-size: 42px; font-weight: 700; }
      .subtitle { font-size: 20px; fill: #475569; }
      .section { font-size: 24px; font-weight: 700; }
      .label { font-size: 18px; font-weight: 600; }
      .small { font-size: 15px; fill: #475569; }
      .tiny { font-size: 13px; fill: #64748b; }
      .card { fill: #ffffff; stroke: #d8e0ea; stroke-width: 1.5; rx: 18; filter: url(#shadow); }
      .chip { fill: #eef2ff; stroke: #c7d2fe; stroke-width: 1; rx: 13; }
      .green { fill: #ecfdf5; stroke: #a7f3d0; }
      .orange { fill: #fff7ed; stroke: #fed7aa; }
      .red { fill: #fff1f2; stroke: #fecdd3; }
      .blue { fill: #eff6ff; stroke: #bfdbfe; }
      .line { stroke: #2563eb; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #94a3b8; stroke-width: 2.5; stroke-dasharray: 8 8; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="1440" height="820" fill="url(#bg)"/>
  <text x="72" y="72" class="title">外设配置数据模型</text>
  <text x="72" y="108" class="subtitle">把页面字段、JSON 文件、运行时对象和规则消费者放在同一张图里核对，减少“保存成功但运行不生效”的定位成本。</text>

  <rect x="70" y="160" width="285" height="430" class="card"/>
  <text x="98" y="205" class="section">1. 配置输入</text>
  <rect x="98" y="236" width="220" height="45" class="chip blue"/>
  <text x="118" y="265" class="label">Web 表单</text>
  <text x="98" y="314" class="small">外设 ID、名称、类型</text>
  <text x="98" y="344" class="small">GPIO / UART / I2C / SPI 引脚</text>
  <text x="98" y="374" class="small">category、address、interval</text>
  <text x="98" y="404" class="small">enabled、autoLoad、备注</text>
  <rect x="98" y="448" width="220" height="45" class="chip"/>
  <text x="118" y="477" class="label">JSON 导入</text>
  <text x="98" y="526" class="tiny">来源：/config/peripherals.json</text>

  <rect x="420" y="160" width="285" height="430" class="card"/>
  <text x="448" y="205" class="section">2. 保存校验</text>
  <rect x="448" y="236" width="220" height="45" class="chip green"/>
  <text x="468" y="265" class="label">字段合法性</text>
  <text x="448" y="314" class="small">type 和 config schema 匹配</text>
  <text x="448" y="344" class="small">必填引脚不为空</text>
  <text x="448" y="374" class="small">ID 唯一且规则可引用</text>
  <text x="448" y="404" class="small">版本能力开关允许该类型</text>
  <rect x="448" y="448" width="220" height="45" class="chip orange"/>
  <text x="468" y="477" class="label">安全写入</text>
  <text x="448" y="526" class="tiny">失败时保留旧配置，提示 ERR_CONFIG_INVALID</text>

  <rect x="770" y="160" width="285" height="430" class="card"/>
  <text x="798" y="205" class="section">3. 运行时对象</text>
  <rect x="798" y="236" width="220" height="45" class="chip blue"/>
  <text x="818" y="265" class="label">PeripheralConfig</text>
  <text x="798" y="314" class="small">驱动实例和初始化状态</text>
  <text x="798" y="344" class="small">任务、互斥锁、串口句柄</text>
  <text x="798" y="374" class="small">最近读数和错误码缓存</text>
  <text x="798" y="404" class="small">enable/disable 生命周期</text>
  <rect x="798" y="448" width="220" height="45" class="chip red"/>
  <text x="818" y="477" class="label">现场风险</text>
  <text x="798" y="526" class="tiny">引脚冲突、供电不足、总线地址重复</text>

  <rect x="1120" y="160" width="250" height="430" class="card"/>
  <text x="1148" y="205" class="section">4. 消费者</text>
  <rect x="1148" y="236" width="178" height="44" class="chip blue"/>
  <text x="1170" y="264" class="label">Web / API</text>
  <rect x="1148" y="302" width="178" height="44" class="chip green"/>
  <text x="1170" y="330" class="label">外设执行</text>
  <rect x="1148" y="368" width="178" height="44" class="chip orange"/>
  <text x="1170" y="396" class="label">MQTT 上报</text>
  <rect x="1148" y="434" width="178" height="44" class="chip"/>
  <text x="1170" y="462" class="label">日志诊断</text>
  <text x="1148" y="526" class="tiny">规则引用外设 ID，传感器缓存引用 dataField</text>

  <path d="M355 375 C380 375 395 375 420 375" class="line"/>
  <path d="M705 375 C730 375 745 375 770 375" class="line"/>
  <path d="M1055 375 C1080 375 1095 375 1120 375" class="line"/>
  <path d="M1245 590 C1245 675 255 675 255 595" class="dash"/>
  <text x="520" y="694" class="small">运行异常会回到配置输入端复核：ID、类型、引脚、版本能力、启用状态、规则引用。</text>

  <rect x="70" y="720" width="1300" height="54" rx="16" fill="#0f172a" opacity="0.94"/>
  <text x="102" y="754" fill="#ffffff" style="font-family: 'Microsoft YaHei', 'PingFang SC', Arial, sans-serif; font-size: 18px; font-weight: 600;">建议顺序：禁用保存 -> 单项验证 -> 启用外设 -> 手动执行规则 -> 查看日志和数据上报 -> 再进入长期运行</text>
</svg>
