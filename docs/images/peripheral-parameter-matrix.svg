<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="820" viewBox="0 0 1440 820" role="img" aria-labelledby="title desc">
  <title id="title">外设类型参数速查矩阵</title>
  <desc id="desc">按外设类型汇总必填字段、关键参数、启用前检查和常见用途。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="0.55" stop-color="#eef6ff"/>
      <stop offset="1" stop-color="#f0fdf4"/>
    </linearGradient>
    <filter id="shadow" x="-8%" y="-12%" width="116%" height="124%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.11"/>
    </filter>
    <style>
      text { font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #172033; }
      .title { font-size: 42px; font-weight: 700; }
      .subtitle { font-size: 20px; fill: #475569; }
      .panel { fill: #ffffff; stroke: #d7dee9; stroke-width: 1.5; rx: 18; filter: url(#shadow); }
      .head { fill: #0f172a; }
      .htext { fill: #ffffff; font-size: 16px; font-weight: 700; }
      .label { font-size: 16px; font-weight: 700; }
      .small { font-size: 14px; fill: #475569; }
      .cell { rx: 12; stroke-width: 1.2; }
      .blue { fill: #eff6ff; stroke: #bfdbfe; }
      .green { fill: #ecfdf5; stroke: #a7f3d0; }
      .orange { fill: #fff7ed; stroke: #fdba74; }
      .purple { fill: #f5f3ff; stroke: #ddd6fe; }
      .red { fill: #fff1f2; stroke: #fecdd3; }
    </style>
  </defs>
  <rect width="1440" height="820" fill="url(#bg)"/>
  <text x="72" y="72" class="title">外设类型参数速查矩阵</text>
  <text x="72" y="108" class="subtitle">新增外设前先看类型、必填字段和启用前检查，减少“类型选对但参数漏填”导致的初始化失败。</text>

  <rect x="70" y="155" width="1300" height="550" class="panel"/>
  <rect x="70" y="155" width="1300" height="58" rx="18" class="head"/>
  <text x="105" y="191" class="htext">外设类型</text>
  <text x="305" y="191" class="htext">必填字段</text>
  <text x="560" y="191" class="htext">关键参数</text>
  <text x="845" y="191" class="htext">启用前检查</text>
  <text x="1125" y="191" class="htext">常见用途</text>

  <g transform="translate(70 213)">
    <rect width="1300" height="62" fill="#ffffff"/>
    <text x="35" y="38" class="label">GPIO 输出</text>
    <rect x="230" y="16" width="185" height="31" class="cell blue"/><text x="258" y="38" class="small">id / type / pins[0]</text>
    <rect x="485" y="16" width="230" height="31" class="cell green"/><text x="506" y="38" class="small">initialState / invert</text>
    <rect x="775" y="16" width="230" height="31" class="cell orange"/><text x="800" y="38" class="small">负载电流与继电器电平</text>
    <text x="1060" y="38" class="small">LED、继电器、蜂鸣器</text>

    <rect y="62" width="1300" height="62" fill="#f8fafc"/>
    <text x="35" y="100" class="label">GPIO 输入</text>
    <rect x="230" y="78" width="185" height="31" class="cell blue"/><text x="258" y="100" class="small">id / type / pins[0]</text>
    <rect x="485" y="78" width="230" height="31" class="cell green"/><text x="506" y="100" class="small">pullup / debounce</text>
    <rect x="775" y="78" width="230" height="31" class="cell orange"/><text x="800" y="100" class="small">上拉下拉和防抖时间</text>
    <text x="1060" y="100" class="small">按键、PIR、开关量</text>

    <rect y="124" width="1300" height="62" fill="#ffffff"/>
    <text x="35" y="162" class="label">ADC / 模拟量</text>
    <rect x="230" y="140" width="185" height="31" class="cell blue"/><text x="258" y="162" class="small">pins[0] / category</text>
    <rect x="485" y="140" width="230" height="31" class="cell green"/><text x="506" y="162" class="small">vRef / ratio / offset</text>
    <rect x="775" y="140" width="230" height="31" class="cell orange"/><text x="800" y="162" class="small">优先 ADC1，电压不超限</text>
    <text x="1060" y="162" class="small">电压、电流、光敏、雨滴</text>

    <rect y="186" width="1300" height="62" fill="#f8fafc"/>
    <text x="35" y="224" class="label">I2C 设备</text>
    <rect x="230" y="202" width="185" height="31" class="cell blue"/><text x="258" y="224" class="small">SDA / SCL / address</text>
    <rect x="485" y="202" width="230" height="31" class="cell green"/><text x="506" y="224" class="small">bus / frequency / driver</text>
    <rect x="775" y="202" width="230" height="31" class="cell orange"/><text x="800" y="224" class="small">地址扫描和上拉电阻</text>
    <text x="1060" y="224" class="small">OLED、SHT31、BH1750</text>

    <rect y="248" width="1300" height="62" fill="#ffffff"/>
    <text x="35" y="286" class="label">UART / RS485</text>
    <rect x="230" y="264" width="185" height="31" class="cell blue"/><text x="258" y="286" class="small">TX / RX / baudrate</text>
    <rect x="485" y="264" width="230" height="31" class="cell green"/><text x="506" y="286" class="small">parity / stopBits / dePin</text>
    <rect x="775" y="264" width="230" height="31" class="cell orange"/><text x="800" y="286" class="small">A/B 接线和方向控制</text>
    <text x="1060" y="286" class="small">Modbus RTU、串口设备</text>

    <rect y="310" width="1300" height="62" fill="#f8fafc"/>
    <text x="35" y="348" class="label">显示输出</text>
    <rect x="230" y="326" width="185" height="31" class="cell blue"/><text x="258" y="348" class="small">type / pins / address</text>
    <rect x="485" y="326" width="230" height="31" class="cell green"/><text x="506" y="348" class="small">width / height / brightness</text>
    <rect x="775" y="326" width="230" height="31" class="cell orange"/><text x="800" y="348" class="small">供电、总线、显示方向</text>
    <text x="1060" y="348" class="small">OLED、TM1637、LCD</text>

    <rect y="372" width="1300" height="62" fill="#ffffff"/>
    <text x="35" y="410" class="label">运动控制</text>
    <rect x="230" y="388" width="185" height="31" class="cell blue"/><text x="258" y="410" class="small">pins / speed / limits</text>
    <rect x="485" y="388" width="230" height="31" class="cell green"/><text x="506" y="410" class="small">angle / steps / rpm</text>
    <rect x="775" y="388" width="230" height="31" class="cell red"/><text x="800" y="410" class="small">外部电源和机械限位</text>
    <text x="1060" y="410" class="small">舵机、步进、电机</text>

    <rect y="434" width="1300" height="62" fill="#f8fafc"/>
    <text x="35" y="472" class="label">虚拟外设</text>
    <rect x="230" y="450" width="185" height="31" class="cell blue"/><text x="258" y="472" class="small">id / source / mapping</text>
    <rect x="485" y="450" width="230" height="31" class="cell purple"/><text x="506" y="472" class="small">eventId / slaveId / register</text>
    <rect x="775" y="450" width="230" height="31" class="cell orange"/><text x="800" y="472" class="small">引用链和版本能力</text>
    <text x="1060" y="472" class="small">DeviceEvent、Modbus 子设备</text>
  </g>

  <rect x="120" y="732" width="1200" height="48" rx="14" fill="#0f172a" opacity="0.94"/>
  <text x="156" y="762" fill="#e2e8f0" style="font-family: 'Microsoft YaHei', 'PingFang SC', Arial, sans-serif; font-size: 16px;">启用策略：保存禁用配置 -> 单项验证硬件 -> 查看日志和状态 -> 再启用规则引用。</text>
</svg>
