<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="840" viewBox="0 0 1440 840">
  <defs>
    <style>
      .bg{fill:#f8fafc}
      .title{font:700 34px "Microsoft YaHei",Arial,sans-serif;fill:#172033}
      .sub{font:400 18px "Microsoft YaHei",Arial,sans-serif;fill:#5a667a}
      .node{fill:#fff;stroke:#cfd8e3;stroke-width:2}
      .question{fill:#eef6ff;stroke:#5b9bd8;stroke-width:2}
      .fix{fill:#f0fbf3;stroke:#5cac75;stroke-width:2}
      .warn{fill:#fff6e7;stroke:#d49b3d;stroke-width:2}
      .bad{fill:#fff1f0;stroke:#d96a63;stroke-width:2}
      .h{font:700 21px "Microsoft YaHei",Arial,sans-serif;fill:#172033}
      .p{font:400 16px "Microsoft YaHei",Arial,sans-serif;fill:#445066}
      .small{font:400 14px "Microsoft YaHei",Arial,sans-serif;fill:#5a667a}
      .yes{font:700 15px "Microsoft YaHei",Arial,sans-serif;fill:#2f7eca}
      .no{font:700 15px "Microsoft YaHei",Arial,sans-serif;fill:#c45f1d}
      .arrow{stroke:#69778b;stroke-width:3;fill:none;marker-end:url(#arrow)}
      .arrowBad{stroke:#d96a63;stroke-width:3;fill:none;marker-end:url(#arrowRed)}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#69778b"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d96a63"/>
    </marker>
  </defs>

  <rect class="bg" width="1440" height="840"/>
  <text class="title" x="72" y="70">现场故障排查决策树</text>
  <text class="sub" x="72" y="106">从能否访问 Web 控制台开始，逐步缩小到网络、协议、配置和设备资源。</text>

  <rect class="question" x="560" y="146" width="320" height="110" rx="18"/>
  <text class="h" x="602" y="190">能打开 Web 控制台吗？</text>
  <text class="p" x="602" y="222">访问设备 IP 或 mDNS 地址</text>

  <rect class="bad" x="112" y="318" width="300" height="132" rx="18"/>
  <text class="h" x="146" y="360">不能访问</text>
  <text class="p" x="146" y="398">检查串口日志、IP、WiFi、AP 模式</text>
  <text class="p" x="146" y="426">必要时重新烧录 LittleFS</text>

  <rect class="question" x="560" y="318" width="320" height="132" rx="18"/>
  <text class="h" x="602" y="360">仪表盘状态正常吗？</text>
  <text class="p" x="602" y="398">看运行时间、Heap、Flash、网络状态</text>
  <text class="p" x="602" y="426">确认没有重启循环</text>

  <rect class="warn" x="1028" y="318" width="300" height="132" rx="18"/>
  <text class="h" x="1062" y="360">页面异常或资源偏低</text>
  <text class="p" x="1062" y="398">降低版本档位或关闭非必要功能</text>
  <text class="p" x="1062" y="426">查看设备日志定位崩溃点</text>

  <path class="arrowBad" d="M560 201 H262 V318"/>
  <text class="no" x="390" y="192">否</text>
  <path class="arrow" d="M720 256 V318"/>
  <text class="yes" x="735" y="292">是</text>

  <rect class="question" x="374" y="534" width="300" height="132" rx="18"/>
  <text class="h" x="408" y="576">MQTT 或平台在线吗？</text>
  <text class="p" x="408" y="614">检查 broker、证书、clientId</text>
  <text class="p" x="408" y="642">确认网络重连策略</text>

  <rect class="question" x="766" y="534" width="300" height="132" rx="18"/>
  <text class="h" x="800" y="576">外设和规则生效吗？</text>
  <text class="p" x="800" y="614">查看外设配置、执行规则、脚本</text>
  <text class="p" x="800" y="642">确认 JSON 和引脚没有冲突</text>

  <rect class="fix" x="88" y="650" width="250" height="118" rx="18"/>
  <text class="h" x="122" y="692">网络修复</text>
  <text class="p" x="122" y="728">重新配置 WiFi 或静态 IP</text>
  <text class="p" x="122" y="756">确认网关和 DNS</text>

  <rect class="fix" x="1118" y="650" width="250" height="118" rx="18"/>
  <text class="h" x="1152" y="692">配置回滚</text>
  <text class="p" x="1152" y="728">恢复导出的 JSON 备份</text>
  <text class="p" x="1152" y="756">重启后再次验证</text>

  <path class="arrowBad" d="M688 384 H1028"/>
  <text class="no" x="906" y="374">否</text>
  <path class="arrow" d="M720 450 V494 H524 V534"/>
  <path class="arrow" d="M720 450 V494 H916 V534"/>
  <text class="yes" x="736" y="488">是</text>
  <path class="arrowBad" d="M374 600 H213 V650"/>
  <path class="arrowBad" d="M1066 600 H1243 V650"/>

  <rect class="node" x="512" y="706" width="416" height="70" rx="18"/>
  <text class="h" x="558" y="750">完成后截图仪表盘和日志，记录版本、IP、端口、时间</text>

  <path class="arrow" d="M524 666 V706"/>
  <path class="arrow" d="M916 666 V706"/>

  <text class="small" x="72" y="812">排查顺序：先确认入口可达，再确认资源健康，最后定位协议、配置和外设行为，避免一开始就修改大量配置。</text>
</svg>
