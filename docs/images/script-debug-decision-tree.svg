<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="820" viewBox="0 0 1440 820" role="img" aria-labelledby="title desc">
  <title id="title">脚本排障决策树</title>
  <desc id="desc">展示规则脚本和命令脚本从保存失败、未触发、变量未替换、外设无动作到内存不足的排查路径。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="0.56" stop-color="#eef6ff"/>
      <stop offset="1" stop-color="#fff7ed"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-16%" width="120%" height="132%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <style>
      text { font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #172033; }
      .title { font-size: 42px; font-weight: 700; }
      .subtitle { font-size: 20px; fill: #475569; }
      .node { fill: #ffffff; stroke: #d7dee9; stroke-width: 1.5; rx: 18; filter: url(#shadow); }
      .label { font-size: 20px; font-weight: 700; }
      .small { font-size: 14px; fill: #475569; }
      .line { stroke: #2563eb; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .warn { fill: #fff7ed; stroke: #fdba74; rx: 13; }
      .ok { fill: #ecfdf5; stroke: #a7f3d0; rx: 13; }
      .bad { fill: #fff1f2; stroke: #fecdd3; rx: 13; }
      .info { fill: #eff6ff; stroke: #bfdbfe; rx: 13; }
    </style>
  </defs>
  <rect width="1440" height="820" fill="url(#bg)"/>
  <text x="72" y="72" class="title">脚本排障决策树</text>
  <text x="72" y="108" class="subtitle">脚本问题先分清是保存失败、规则未触发、变量未替换、动作无效果，还是资源不足。</text>

  <rect x="520" y="155" width="400" height="86" class="node"/>
  <text x="574" y="190" class="label">脚本没有达到预期效果</text>
  <text x="574" y="218" class="small">先看页面错误，再看设备日志和目标外设状态</text>

  <rect x="85" y="305" width="250" height="118" class="warn"/>
  <text x="122" y="346" class="label">保存失败</text>
  <text x="122" y="376" class="small">检查空内容、长度、命令格式</text>
  <text x="122" y="402" class="small">删除无效注释或超长模板</text>

  <rect x="405" y="305" width="250" height="118" class="info"/>
  <text x="442" y="346" class="label">规则未触发</text>
  <text x="442" y="376" class="small">检查 enabled、触发器类型</text>
  <text x="442" y="402" class="small">确认事件名或平台消息字段</text>

  <rect x="725" y="305" width="250" height="118" class="bad"/>
  <text x="762" y="346" class="label">变量未替换</text>
  <text x="762" y="376" class="small">检查输入 JSON 和 key</text>
  <text x="762" y="402" class="small">数组格式需 id/value 字段</text>

  <rect x="1045" y="305" width="250" height="118" class="warn"/>
  <text x="1082" y="346" class="label">动作无效果</text>
  <text x="1082" y="376" class="small">确认目标外设启用</text>
  <text x="1082" y="402" class="small">先手动执行单条命令</text>

  <path d="M690 241 C560 270 370 285 210 305" class="line"/>
  <path d="M705 241 C640 270 590 285 530 305" class="line"/>
  <path d="M735 241 C780 270 820 285 850 305" class="line"/>
  <path d="M760 241 C900 270 1060 285 1170 305" class="line"/>

  <rect x="245" y="505" width="300" height="96" class="node"/>
  <text x="286" y="544" class="label">查看日志前缀</text>
  <text x="286" y="574" class="small">Template applied / CommandScript / PeriphExec</text>

  <rect x="610" y="505" width="300" height="96" class="node"/>
  <text x="651" y="544" class="label">检查资源</text>
  <text x="651" y="574" class="small">heap、maxAlloc、脚本长度、累计延时</text>

  <rect x="975" y="505" width="300" height="96" class="node"/>
  <text x="1016" y="544" class="label">缩小脚本</text>
  <text x="1016" y="574" class="small">先保留 LOG 和单个动作，再逐条加回</text>

  <path d="M530 423 C500 455 455 480 395 505" class="line"/>
  <path d="M850 423 C810 455 780 480 760 505" class="line"/>
  <path d="M1170 423 C1160 455 1140 480 1125 505" class="line"/>

  <rect x="390" y="680" width="660" height="58" rx="16" fill="#0f172a" opacity="0.94"/>
  <text x="428" y="716" fill="#e2e8f0" style="font-family: 'Microsoft YaHei', 'PingFang SC', Arial, sans-serif; font-size: 16px;">最终验证：保存成功、规则触发、变量替换、外设动作、日志和上报结果都能对应同一次执行。</text>
</svg>
