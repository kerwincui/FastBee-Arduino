<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="820" viewBox="0 0 1440 820">
  <defs>
    <style>
      .bg{fill:#f7f9fb}
      .title{font:700 34px "Microsoft YaHei",Arial,sans-serif;fill:#172033}
      .sub{font:400 18px "Microsoft YaHei",Arial,sans-serif;fill:#5a667a}
      .layerText{font:700 22px "Microsoft YaHei",Arial,sans-serif;fill:#172033}
      .p{font:400 16px "Microsoft YaHei",Arial,sans-serif;fill:#445066}
      .small{font:400 14px "Microsoft YaHei",Arial,sans-serif;fill:#5a667a}
      .panel{fill:#fff;stroke:#cfd8e3;stroke-width:2}
      .line{stroke:#d6dee9;stroke-width:2}
      .arrow{stroke:#69778b;stroke-width:3;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#69778b"/>
    </marker>
  </defs>

  <rect class="bg" width="1440" height="820"/>
  <text class="title" x="72" y="70">测试验证金字塔</text>
  <text class="sub" x="72" y="106">提交前先跑低成本检查，发布前再叠加构建矩阵、真机冒烟和长期稳定性验证。</text>

  <polygon points="720,154 1035,650 405,650" fill="#e9f2ff" stroke="#5b9bd8" stroke-width="2"/>
  <polygon points="720,256 970,650 470,650" fill="#edf9f1" stroke="#5cac75" stroke-width="2"/>
  <polygon points="720,358 905,650 535,650" fill="#fff6e7" stroke="#d49b3d" stroke-width="2"/>
  <polygon points="720,460 840,650 600,650" fill="#f5f0ff" stroke="#8b72c9" stroke-width="2"/>
  <polygon points="720,560 775,650 665,650" fill="#fff1f0" stroke="#d96a63" stroke-width="2"/>

  <line class="line" x1="456" y1="568" x2="984" y2="568"/>
  <line class="line" x1="520" y1="466" x2="920" y2="466"/>
  <line class="line" x1="584" y1="364" x2="856" y2="364"/>
  <line class="line" x1="648" y1="262" x2="792" y2="262"/>

  <text class="layerText" x="636" y="624">长期稳定性</text>
  <text class="layerText" x="620" y="522">真机 API 冒烟</text>
  <text class="layerText" x="626" y="420">多环境构建</text>
  <text class="layerText" x="620" y="318">native 单元测试</text>
  <text class="layerText" x="638" y="216">静态检查</text>

  <rect class="panel" x="84" y="176" width="330" height="138" rx="18"/>
  <text class="layerText" x="120" y="220">低成本快速反馈</text>
  <text class="p" x="120" y="258">lint、配置扫描、native 测试</text>
  <text class="p" x="120" y="286">适合每次提交前执行</text>

  <rect class="panel" x="1026" y="248" width="330" height="150" rx="18"/>
  <text class="layerText" x="1062" y="292">构建矩阵守住边界</text>
  <text class="p" x="1062" y="330">Lite、Standard、Full 都要编译</text>
  <text class="p" x="1062" y="358">重点看分区、依赖和资源开关</text>

  <rect class="panel" x="84" y="444" width="330" height="150" rx="18"/>
  <text class="layerText" x="120" y="488">真机验证看行为</text>
  <text class="p" x="120" y="526">部署后访问 Web 控制台</text>
  <text class="p" x="120" y="554">检查网络、MQTT、日志、配置生效</text>

  <rect class="panel" x="1026" y="524" width="330" height="150" rx="18"/>
  <text class="layerText" x="1062" y="568">发布前拉长时间</text>
  <text class="p" x="1062" y="606">长稳测试覆盖断网、重连、重启</text>
  <text class="p" x="1062" y="634">输出日志和资源趋势记录</text>

  <path class="arrow" d="M414 245 H590"/>
  <path class="arrow" d="M1026 322 H850"/>
  <path class="arrow" d="M414 519 H588"/>
  <path class="arrow" d="M1026 599 H842"/>

  <text class="small" x="72" y="760">判断原则：越靠上越接近真实交付，但成本越高；日常开发用底层兜底，发布验收必须覆盖上层。</text>
</svg>
