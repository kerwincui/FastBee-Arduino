<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="820" viewBox="0 0 1440 820" role="img" aria-labelledby="title desc">
  <title id="title">触发器时序对比</title>
  <desc id="desc">对比平台触发、定时触发、事件触发和轮询触发的输入来源、检查时机、适合场景和风险。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="0.52" stop-color="#eef6ff"/>
      <stop offset="1" stop-color="#fefce8"/>
    </linearGradient>
    <filter id="shadow" x="-8%" y="-12%" width="116%" height="124%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.11"/>
    </filter>
    <style>
      text { font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #172033; }
      .title { font-size: 42px; font-weight: 700; }
      .subtitle { font-size: 20px; fill: #475569; }
      .panel { fill: #ffffff; stroke: #d7dee9; stroke-width: 1.5; rx: 18; filter: url(#shadow); }
      .head { fill: #0f172a; }
      .htext { fill: #ffffff; font-size: 16px; font-weight: 700; }
      .label { font-size: 17px; font-weight: 700; }
      .small { font-size: 14px; fill: #475569; }
      .pill { rx: 13; stroke-width: 1.2; }
      .blue { fill: #eff6ff; stroke: #bfdbfe; }
      .green { fill: #ecfdf5; stroke: #a7f3d0; }
      .orange { fill: #fff7ed; stroke: #fed7aa; }
      .red { fill: #fff1f2; stroke: #fecdd3; }
      .purple { fill: #f5f3ff; stroke: #ddd6fe; }
    </style>
  </defs>
  <rect width="1440" height="820" fill="url(#bg)"/>
  <text x="72" y="72" class="title">触发器时序对比</text>
  <text x="72" y="108" class="subtitle">先选触发来源，再选动作。平台消息、固定时间、设备事件和主动轮询的排查方式完全不同。</text>

  <rect x="70" y="155" width="1300" height="538" class="panel"/>
  <rect x="70" y="155" width="1300" height="58" rx="18" class="head"/>
  <text x="105" y="191" class="htext">触发器</text>
  <text x="290" y="191" class="htext">输入来源</text>
  <text x="505" y="191" class="htext">检查时机</text>
  <text x="740" y="191" class="htext">适合场景</text>
  <text x="1010" y="191" class="htext">常见风险</text>

  <g transform="translate(70 213)">
    <rect width="1300" height="96" fill="#ffffff"/>
    <rect x="35" y="28" width="145" height="40" class="pill blue"/><text x="62" y="54" class="label">平台触发</text>
    <text x="220" y="42" class="small">MQTT / HTTP / 云端命令</text>
    <text x="435" y="42" class="small">消息到达后立即匹配字段</text>
    <text x="670" y="42" class="small">远程开关、参数下发、联动控制</text>
    <text x="940" y="42" class="small">字段名不一致、messageId 重复、权限不足</text>
    <text x="220" y="70" class="small">依赖网络和协议在线</text>

    <rect y="96" width="1300" height="96" fill="#f8fafc"/>
    <rect x="35" y="124" width="145" height="40" class="pill green"/><text x="62" y="150" class="label">定时触发</text>
    <text x="220" y="138" class="small">本地时钟 / cron / interval</text>
    <text x="435" y="138" class="small">到达时间点后执行</text>
    <text x="670" y="138" class="small">周期上报、定时开关、夜间模式</text>
    <text x="940" y="138" class="small">NTP 未同步、首次触发语义不清</text>
    <text x="220" y="166" class="small">适合不依赖输入值的动作</text>

    <rect y="192" width="1300" height="96" fill="#ffffff"/>
    <rect x="35" y="220" width="145" height="40" class="pill orange"/><text x="62" y="246" class="label">事件触发</text>
    <text x="220" y="234" class="small">按键、传感器、系统事件</text>
    <text x="435" y="234" class="small">事件发布时匹配 eventId</text>
    <text x="670" y="234" class="small">按键控制、超限报警、状态变化</text>
    <text x="940" y="234" class="small">防抖、事件名拼写、缓存值过期</text>
    <text x="220" y="262" class="small">适合低延迟响应</text>

    <rect y="288" width="1300" height="96" fill="#f8fafc"/>
    <rect x="35" y="316" width="145" height="40" class="pill purple"/><text x="62" y="342" class="label">轮询触发</text>
    <text x="220" y="330" class="small">主动读取外设或协议数据</text>
    <text x="435" y="330" class="small">每个 pollInterval 检查条件</text>
    <text x="670" y="330" class="small">Modbus 采集、模拟量阈值、距离报警</text>
    <text x="940" y="330" class="small">频率过高、串口忙、低内存降频</text>
    <text x="220" y="358" class="small">适合没有事件源的传感器</text>
  </g>

  <rect x="110" y="728" width="1220" height="48" rx="14" fill="#0f172a" opacity="0.94"/>
  <text x="148" y="758" fill="#e2e8f0" style="font-family: 'Microsoft YaHei', 'PingFang SC', Arial, sans-serif; font-size: 16px;">选择建议：能事件触发就别轮询；需要固定节拍用定时；来自平台的命令走平台触发；没有事件源的传感器才用轮询。</text>
</svg>
