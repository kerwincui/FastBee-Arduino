<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="820" viewBox="0 0 1440 820" role="img" aria-labelledby="title desc">
  <title id="title">优化改进守卫地图</title>
  <desc id="desc">展示优化改进从问题识别、修复实现、测试覆盖、真机复核到发布观察的守卫路径。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="0.55" stop-color="#f0f9ff"/>
      <stop offset="1" stop-color="#fff7ed"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-16%" width="120%" height="132%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.13"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <style>
      text { font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #172033; }
      .title { font-size: 42px; font-weight: 700; }
      .subtitle { font-size: 20px; fill: #475569; }
      .card { fill: #ffffff; stroke: #d7dee9; stroke-width: 1.5; rx: 18; filter: url(#shadow); }
      .label { font-size: 22px; font-weight: 700; }
      .small { font-size: 15px; fill: #475569; }
      .tiny { font-size: 13px; fill: #64748b; }
      .line { stroke: #2563eb; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .tag { rx: 13; stroke-width: 1.3; }
      .blue { fill: #eff6ff; stroke: #bfdbfe; }
      .green { fill: #ecfdf5; stroke: #a7f3d0; }
      .orange { fill: #fff7ed; stroke: #fed7aa; }
      .red { fill: #fff1f2; stroke: #fecdd3; }
      .dark { fill: #0f172a; }
    </style>
  </defs>
  <rect width="1440" height="820" fill="url(#bg)"/>
  <text x="72" y="72" class="title">优化改进守卫地图</text>
  <text x="72" y="108" class="subtitle">每个优化项都要经过“问题证据 -> 代码修复 -> 测试覆盖 -> 真机复核 -> 发布观察”，避免只修局部而引入现场风险。</text>

  <rect x="78" y="178" width="230" height="400" class="card"/>
  <text x="112" y="225" class="label">问题证据</text>
  <rect x="112" y="265" width="150" height="42" class="tag red"/><text x="142" y="292" class="small">内存碎片</text>
  <rect x="112" y="327" width="150" height="42" class="tag red"/><text x="142" y="354" class="small">串口竞争</text>
  <rect x="112" y="389" width="150" height="42" class="tag red"/><text x="142" y="416" class="small">输入缺口</text>
  <rect x="112" y="451" width="150" height="42" class="tag red"/><text x="142" y="478" class="small">UI 缺标</text>

  <rect x="360" y="178" width="230" height="400" class="card"/>
  <text x="394" y="225" class="label">修复实现</text>
  <rect x="394" y="265" width="150" height="42" class="tag orange"/><text x="421" y="292" class="small">守卫阈值</text>
  <rect x="394" y="327" width="150" height="42" class="tag orange"/><text x="421" y="354" class="small">锁超时日志</text>
  <rect x="394" y="389" width="150" height="42" class="tag orange"/><text x="421" y="416" class="small">白名单校验</text>
  <rect x="394" y="451" width="150" height="42" class="tag orange"/><text x="421" y="478" class="small">映射补全</text>

  <rect x="642" y="178" width="230" height="400" class="card"/>
  <text x="676" y="225" class="label">测试覆盖</text>
  <rect x="676" y="265" width="150" height="42" class="tag green"/><text x="706" y="292" class="small">边界值</text>
  <rect x="676" y="327" width="150" height="42" class="tag green"/><text x="706" y="354" class="small">并发读</text>
  <rect x="676" y="389" width="150" height="42" class="tag green"/><text x="706" y="416" class="small">异常文件</text>
  <rect x="676" y="451" width="150" height="42" class="tag green"/><text x="706" y="478" class="small">静态检查</text>

  <rect x="924" y="178" width="230" height="400" class="card"/>
  <text x="958" y="225" class="label">真机复核</text>
  <rect x="958" y="265" width="150" height="42" class="tag blue"/><text x="988" y="292" class="small">仪表盘</text>
  <rect x="958" y="327" width="150" height="42" class="tag blue"/><text x="988" y="354" class="small">外设执行</text>
  <rect x="958" y="389" width="150" height="42" class="tag blue"/><text x="988" y="416" class="small">设备日志</text>
  <rect x="958" y="451" width="150" height="42" class="tag blue"/><text x="988" y="478" class="small">smoke/soak</text>

  <rect x="1206" y="178" width="156" height="400" class="card"/>
  <text x="1232" y="225" class="label">发布观察</text>
  <text x="1232" y="282" class="small">失败率</text>
  <text x="1232" y="322" class="small">heap 趋势</text>
  <text x="1232" y="362" class="small">告警密度</text>
  <text x="1232" y="402" class="small">回滚点</text>
  <text x="1232" y="442" class="small">遗留项</text>

  <path d="M308 378 C330 378 338 378 360 378" class="line"/>
  <path d="M590 378 C612 378 620 378 642 378" class="line"/>
  <path d="M872 378 C894 378 902 378 924 378" class="line"/>
  <path d="M1154 378 C1176 378 1184 378 1206 378" class="line"/>

  <rect x="120" y="640" width="1200" height="92" rx="18" class="dark" opacity="0.94"/>
  <text x="158" y="676" fill="#ffffff" style="font-family: 'Microsoft YaHei', 'PingFang SC', Arial, sans-serif; font-size: 20px; font-weight: 700;">文档复核点</text>
  <text x="158" y="708" fill="#e2e8f0" style="font-family: 'Microsoft YaHei', 'PingFang SC', Arial, sans-serif; font-size: 16px;">优化报告应同时写清“为什么改、改了哪里、如何测、真机如何看、发布后盯什么”，方便后来者复现判断。</text>
</svg>
