<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="820" viewBox="0 0 1440 820">
  <defs>
    <style>
      .bg{fill:#f7f9fb}
      .title{font:700 34px "Microsoft YaHei",Arial,sans-serif;fill:#172033}
      .sub{font:400 18px "Microsoft YaHei",Arial,sans-serif;fill:#5a667a}
      .card{fill:#fff;stroke:#cfd8e3;stroke-width:2}
      .new{fill:#eef6ff;stroke:#5b9bd8;stroke-width:2}
      .ops{fill:#f0fbf3;stroke:#5cac75;stroke-width:2}
      .dev{fill:#fff6e7;stroke:#d49b3d;stroke-width:2}
      .rel{fill:#f5f0ff;stroke:#8b72c9;stroke-width:2}
      .h{font:700 21px "Microsoft YaHei",Arial,sans-serif;fill:#172033}
      .p{font:400 16px "Microsoft YaHei",Arial,sans-serif;fill:#445066}
      .code{font:700 15px Consolas,"Microsoft YaHei",monospace;fill:#263248}
      .small{font:400 14px "Microsoft YaHei",Arial,sans-serif;fill:#5a667a}
      .arrow{stroke:#69778b;stroke-width:3;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10z" fill="#69778b"/></marker>
  </defs>
  <rect class="bg" width="1440" height="820"/>
  <text class="title" x="72" y="70">文档学习路径地图</text>
  <text class="sub" x="72" y="106">不同角色可以从不同入口阅读：新手先跑通设备，集成者配置外设和协议，开发者看架构，发布者看测试和验收。</text>

  <rect class="new" x="88" y="174" width="280" height="176" rx="18"/>
  <text class="h" x="126" y="220">新手路径</text>
  <text class="code" x="126" y="258">README</text>
  <text class="code" x="126" y="286">quick-start</text>
  <text class="p" x="126" y="318">烧录、登录、仪表盘确认</text>

  <rect class="ops" x="418" y="174" width="280" height="176" rx="18"/>
  <text class="h" x="456" y="220">集成路径</text>
  <text class="code" x="456" y="258">peripherals</text>
  <text class="code" x="456" y="286">protocols</text>
  <text class="p" x="456" y="318">外设、规则、MQTT、Modbus</text>

  <rect class="dev" x="748" y="174" width="280" height="176" rx="18"/>
  <text class="h" x="786" y="220">开发路径</text>
  <text class="code" x="786" y="258">architecture</text>
  <text class="code" x="786" y="286">core-framework</text>
  <text class="p" x="786" y="318">模块边界、源码扩展、测试</text>

  <rect class="rel" x="1078" y="174" width="280" height="176" rx="18"/>
  <text class="h" x="1116" y="220">发布路径</text>
  <text class="code" x="1116" y="258">deployment</text>
  <text class="code" x="1116" y="286">testing</text>
  <text class="p" x="1116" y="318">构建矩阵、真机冒烟、长稳</text>

  <path class="arrow" d="M368 262 H418"/>
  <path class="arrow" d="M698 262 H748"/>
  <path class="arrow" d="M1028 262 H1078"/>

  <rect class="card" x="164" y="504" width="330" height="122" rx="18"/>
  <text class="h" x="202" y="550">看到页面问题</text>
  <text class="p" x="202" y="588">先看 Web 图文导览和系统页面说明</text>

  <rect class="card" x="555" y="504" width="330" height="122" rx="18"/>
  <text class="h" x="593" y="550">看到硬件问题</text>
  <text class="p" x="593" y="588">先看外设选型、接线校验和场景闭环</text>

  <rect class="card" x="946" y="504" width="330" height="122" rx="18"/>
  <text class="h" x="984" y="550">看到稳定性问题</text>
  <text class="p" x="984" y="588">先看测试金字塔、日志和排障决策树</text>

  <rect class="card" x="208" y="708" width="1024" height="58" rx="16"/>
  <text class="small" x="248" y="743">阅读建议：不要从参数表硬啃，先按角色路径建立全局图，再进入对应章节的截图、流程图和配置示例。</text>
</svg>
