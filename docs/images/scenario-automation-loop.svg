<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="820" viewBox="0 0 1440 820">
  <defs>
    <style>
      .bg{fill:#f8fafc}
      .title{font:700 34px "Microsoft YaHei",Arial,sans-serif;fill:#172033}
      .sub{font:400 18px "Microsoft YaHei",Arial,sans-serif;fill:#5a667a}
      .sense{fill:#eef6ff;stroke:#5b9bd8;stroke-width:2}
      .decide{fill:#fff6e7;stroke:#d49b3d;stroke-width:2}
      .act{fill:#f0fbf3;stroke:#5cac75;stroke-width:2}
      .report{fill:#f5f0ff;stroke:#8b72c9;stroke-width:2}
      .box{fill:#fff;stroke:#cfd8e3;stroke-width:2}
      .h{font:700 21px "Microsoft YaHei",Arial,sans-serif;fill:#172033}
      .p{font:400 16px "Microsoft YaHei",Arial,sans-serif;fill:#445066}
      .small{font:400 14px "Microsoft YaHei",Arial,sans-serif;fill:#5a667a}
      .arrow{stroke:#69778b;stroke-width:3;fill:none;marker-end:url(#arrow)}
      .loop{stroke:#2f7eca;stroke-width:3;fill:none;marker-end:url(#arrowBlue)}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10z" fill="#69778b"/></marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10z" fill="#2f7eca"/></marker>
  </defs>
  <rect class="bg" width="1440" height="820"/>
  <text class="title" x="72" y="70">典型场景自动化闭环</text>
  <text class="sub" x="72" y="106">温控、烟雾报警、液位监测、按钮控制等场景都可以抽象为采集、判断、执行、上报和复核的闭环。</text>

  <circle cx="720" cy="392" r="230" fill="#fff" stroke="#d5deea" stroke-width="2"/>
  <rect class="sense" x="560" y="148" width="320" height="116" rx="18"/>
  <text class="h" x="604" y="194">采集 Sense</text>
  <text class="p" x="604" y="228">传感器、按键、平台命令、Modbus 读数</text>

  <rect class="decide" x="938" y="334" width="320" height="116" rx="18"/>
  <text class="h" x="982" y="380">判断 Decide</text>
  <text class="p" x="982" y="414">阈值、事件、定时、状态条件</text>

  <rect class="act" x="560" y="520" width="320" height="116" rx="18"/>
  <text class="h" x="604" y="566">执行 Act</text>
  <text class="p" x="604" y="600">继电器、PWM、显示、Modbus 控制</text>

  <rect class="report" x="182" y="334" width="320" height="116" rx="18"/>
  <text class="h" x="226" y="380">上报 Report</text>
  <text class="p" x="226" y="414">MQTT、日志、状态、告警事件</text>

  <path class="loop" d="M720 264 C884 270 938 318 978 364"/>
  <path class="loop" d="M1098 450 C1040 560 940 596 880 592"/>
  <path class="loop" d="M560 592 C430 574 368 500 342 450"/>
  <path class="loop" d="M342 334 C380 248 470 204 560 198"/>

  <rect class="box" x="144" y="690" width="350" height="72" rx="18"/>
  <text class="h" x="182" y="734">先跑单点</text>
  <text class="small" x="308" y="734">单传感器、单规则、单动作</text>

  <rect class="box" x="545" y="690" width="350" height="72" rx="18"/>
  <text class="h" x="583" y="734">再组合</text>
  <text class="small" x="694" y="734">加入延时、显示和上报</text>

  <rect class="box" x="946" y="690" width="350" height="72" rx="18"/>
  <text class="h" x="984" y="734">最后验收</text>
  <text class="small" x="1112" y="734">截图、日志、回滚配置</text>
</svg>
