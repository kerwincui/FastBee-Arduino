<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="820" viewBox="0 0 1440 820" role="img" aria-labelledby="title desc">
  <title id="title">HC-SR04 超声波测距几何</title>
  <desc id="desc">展示 HC-SR04 的 Trig、Echo、声波往返时间、距离计算和安装注意事项。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="0.5" stop-color="#eef6ff"/>
      <stop offset="1" stop-color="#fefce8"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <style>
      text { font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #172033; }
      .title { font-size: 42px; font-weight: 700; }
      .subtitle { font-size: 20px; fill: #475569; }
      .panel { fill: #ffffff; stroke: #d7dee9; stroke-width: 1.5; rx: 18; }
      .label { font-size: 21px; font-weight: 700; }
      .small { font-size: 15px; fill: #475569; }
      .tiny { font-size: 13px; fill: #64748b; }
      .line { stroke: #2563eb; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .wave { stroke: #0284c7; stroke-width: 4; fill: none; stroke-linecap: round; }
      .echo { stroke: #f97316; stroke-width: 4; fill: none; stroke-linecap: round; marker-end: url(#arrow); }
      .pin { fill: #eff6ff; stroke: #bfdbfe; rx: 12; }
      .note { fill: #fff7ed; stroke: #fdba74; rx: 14; }
      .ok { fill: #ecfdf5; stroke: #a7f3d0; rx: 14; }
    </style>
  </defs>
  <rect width="1440" height="820" fill="url(#bg)"/>
  <text x="72" y="72" class="title">HC-SR04 超声波测距几何</text>
  <text x="72" y="108" class="subtitle">配置 Trig/Echo 引脚时，同时检查安装方向、供电电平、最小盲区和声波反射面，数据异常通常先从这些物理条件排查。</text>

  <rect x="74" y="160" width="420" height="520" class="panel"/>
  <text x="112" y="210" class="label">传感器与接线</text>
  <rect x="130" y="260" width="300" height="165" rx="22" fill="#0f172a"/>
  <circle cx="220" cy="342" r="48" fill="#1e293b" stroke="#94a3b8" stroke-width="6"/>
  <circle cx="340" cy="342" r="48" fill="#1e293b" stroke="#94a3b8" stroke-width="6"/>
  <text x="194" y="350" fill="#cbd5e1" style="font-family: 'Microsoft YaHei', 'PingFang SC', Arial, sans-serif; font-size: 18px;">Trig</text>
  <text x="315" y="350" fill="#cbd5e1" style="font-family: 'Microsoft YaHei', 'PingFang SC', Arial, sans-serif; font-size: 18px;">Echo</text>
  <rect x="116" y="462" width="120" height="42" class="pin"/><text x="146" y="489" class="small">VCC 5V</text>
  <rect x="256" y="462" width="120" height="42" class="pin"/><text x="290" y="489" class="small">GND</text>
  <rect x="116" y="522" width="120" height="42" class="pin"/><text x="145" y="549" class="small">Trig GPIO</text>
  <rect x="256" y="522" width="120" height="42" class="pin"/><text x="284" y="549" class="small">Echo GPIO</text>
  <text x="112" y="615" class="tiny">ESP32 输入通常为 3.3V，Echo 5V 模块建议加分压或电平转换。</text>

  <rect x="545" y="160" width="520" height="520" class="panel"/>
  <text x="585" y="210" class="label">声波往返路径</text>
  <rect x="610" y="305" width="115" height="92" rx="18" fill="#e2e8f0" stroke="#94a3b8"/>
  <text x="637" y="358" class="small">HC-SR04</text>
  <rect x="900" y="250" width="72" height="220" rx="20" fill="#fde68a" stroke="#f59e0b" stroke-width="2"/>
  <text x="904" y="510" class="small">目标物体</text>
  <path d="M725 332 C785 285 840 285 900 332" class="wave"/>
  <path d="M900 388 C840 435 785 435 725 388" class="echo"/>
  <line x1="725" y1="550" x2="900" y2="550" class="line"/>
  <text x="760" y="586" class="label">distance</text>
  <rect x="610" y="602" width="385" height="48" class="ok"/>
  <text x="638" y="632" class="small">距离 cm = Echo 高电平时间 us / 58</text>

  <rect x="1115" y="160" width="255" height="520" class="panel"/>
  <text x="1145" y="210" class="label">现场核对</text>
  <rect x="1145" y="250" width="188" height="58" class="note"/>
  <text x="1168" y="285" class="small">最小距离 2cm</text>
  <rect x="1145" y="328" width="188" height="58" class="note"/>
  <text x="1168" y="363" class="small">目标面尽量平整</text>
  <rect x="1145" y="406" width="188" height="58" class="note"/>
  <text x="1168" y="441" class="small">避开斜面和吸音材料</text>
  <rect x="1145" y="484" width="188" height="58" class="note"/>
  <text x="1168" y="519" class="small">采样周期别太短</text>
  <rect x="1145" y="562" width="188" height="58" class="note"/>
  <text x="1168" y="597" class="small">水位场景留余量</text>

  <rect x="120" y="720" width="1200" height="54" rx="16" fill="#0f172a" opacity="0.94"/>
  <text x="154" y="754" fill="#e2e8f0" style="font-family: 'Microsoft YaHei', 'PingFang SC', Arial, sans-serif; font-size: 17px;">排障顺序：先量供电和 Echo 电平，再换固定距离测试，最后检查 FastBee 外设 ID、category=ultrasonic、Trig/Echo 引脚。</text>
</svg>
