<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="760" viewBox="0 0 1440 760">
  <defs>
    <style>
      .bg{fill:#f8fafc}
      .title{font:700 34px "Microsoft YaHei",Arial,sans-serif;fill:#172033}
      .sub{font:400 18px "Microsoft YaHei",Arial,sans-serif;fill:#5a667a}
      .step{fill:#fff;stroke:#cad5e2;stroke-width:2;rx:18}
      .verify{fill:#ecfdf3;stroke:#65b77a;stroke-width:2;rx:18}
      .warn{fill:#fff7e6;stroke:#e0a33a;stroke-width:2;rx:18}
      .h{font:700 21px "Microsoft YaHei",Arial,sans-serif;fill:#172033}
      .p{font:400 15px "Microsoft YaHei",Arial,sans-serif;fill:#445066}
      .num{font:700 24px Arial,sans-serif;fill:#2f7eca}
      .arrow{stroke:#65758b;stroke-width:3;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#65758b"/>
    </marker>
  </defs>
  <rect class="bg" width="1440" height="760"/>
  <text class="title" x="72" y="72">部署与验收流程图</text>
  <text class="sub" x="72" y="108">保证固件环境、LittleFS Web 文件系统、目标芯片和现场配置一致</text>

  <rect class="step" x="70" y="170" width="230" height="130"/>
  <text class="num" x="95" y="208">1</text>
  <text class="h" x="130" y="208">选择环境</text>
  <text class="p" x="95" y="242">esp32 / esp32s3</text>
  <text class="p" x="95" y="270">esp32s3-full</text>

  <rect class="step" x="365" y="170" width="230" height="130"/>
  <text class="num" x="390" y="208">2</text>
  <text class="h" x="425" y="208">构建产物</text>
  <text class="p" x="390" y="242">生成固件</text>
  <text class="p" x="390" y="270">生成 LittleFS</text>

  <rect class="step" x="660" y="170" width="230" height="130"/>
  <text class="num" x="685" y="208">3</text>
  <text class="h" x="720" y="208">烧录 COM 端口</text>
  <text class="p" x="685" y="242">先 uploadfs</text>
  <text class="p" x="685" y="270">再 upload 固件</text>

  <rect class="verify" x="955" y="170" width="230" height="130"/>
  <text class="num" x="980" y="208">4</text>
  <text class="h" x="1015" y="208">登录仪表盘</text>
  <text class="p" x="980" y="242">确认 IP / WiFi</text>
  <text class="p" x="980" y="270">确认内存 / 运行时间</text>

  <rect class="verify" x="365" y="410" width="230" height="130"/>
  <text class="num" x="390" y="448">5</text>
  <text class="h" x="425" y="448">冒烟测试</text>
  <text class="p" x="390" y="482">认证与系统 API</text>
  <text class="p" x="390" y="510">外设/协议/日志</text>

  <rect class="verify" x="660" y="410" width="230" height="130"/>
  <text class="num" x="685" y="448">6</text>
  <text class="h" x="720" y="448">现场配置</text>
  <text class="p" x="685" y="482">先禁用导入</text>
  <text class="p" x="685" y="510">确认接线再启用</text>

  <rect class="warn" x="955" y="410" width="230" height="130"/>
  <text class="num" x="980" y="448">7</text>
  <text class="h" x="1015" y="448">归档备份</text>
  <text class="p" x="980" y="482">截图与版本号</text>
  <text class="p" x="980" y="510">导出配置文件</text>

  <path class="arrow" d="M300 235 H365"/>
  <path class="arrow" d="M595 235 H660"/>
  <path class="arrow" d="M890 235 H955"/>
  <path class="arrow" d="M1070 300 V360 H480 V410"/>
  <path class="arrow" d="M595 475 H660"/>
  <path class="arrow" d="M890 475 H955"/>

  <rect class="warn" x="170" y="625" width="1100" height="76"/>
  <text class="h" x="205" y="662">关键原则</text>
  <text class="p" x="205" y="690">Web 文件系统和固件必须来自同一环境；默认外设与规则保持禁用，现场确认引脚、供电和总线参数后再启用。</text>
</svg>
