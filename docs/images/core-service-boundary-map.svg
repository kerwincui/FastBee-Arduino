<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="820" viewBox="0 0 1440 820">
  <defs>
    <style>
      .bg{fill:#f8fafc}
      .title{font:700 34px "Microsoft YaHei",Arial,sans-serif;fill:#172033}
      .sub{font:400 18px "Microsoft YaHei",Arial,sans-serif;fill:#5a667a}
      .core{fill:#eef6ff;stroke:#5b9bd8;stroke-width:2}
      .svc{fill:#fff;stroke:#cfd8e3;stroke-width:2}
      .data{fill:#fff6e7;stroke:#d49b3d;stroke-width:2}
      .run{fill:#f0fbf3;stroke:#5cac75;stroke-width:2}
      .h{font:700 21px "Microsoft YaHei",Arial,sans-serif;fill:#172033}
      .p{font:400 16px "Microsoft YaHei",Arial,sans-serif;fill:#445066}
      .code{font:700 15px Consolas,"Microsoft YaHei",monospace;fill:#263248}
      .small{font:400 14px "Microsoft YaHei",Arial,sans-serif;fill:#5a667a}
      .arrow{stroke:#69778b;stroke-width:3;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10z" fill="#69778b"/></marker>
  </defs>
  <rect class="bg" width="1440" height="820"/>
  <text class="title" x="72" y="70">核心服务边界图</text>
  <text class="sub" x="72" y="106">FastBeeFramework 负责生命周期编排，外设、网络、协议、系统服务和安全模块各自保持清晰边界。</text>

  <rect class="core" x="520" y="168" width="400" height="132" rx="20"/>
  <text class="h" x="578" y="216">FastBeeFramework</text>
  <text class="p" x="578" y="254">启动顺序、主循环、健康检查、服务协调</text>

  <rect class="svc" x="92" y="410" width="230" height="130" rx="18"/>
  <text class="h" x="126" y="456">Peripheral</text>
  <text class="p" x="126" y="494">硬件抽象、驱动、缓存</text>

  <rect class="svc" x="370" y="410" width="230" height="130" rx="18"/>
  <text class="h" x="404" y="456">PeriphExec</text>
  <text class="p" x="404" y="494">触发、动作、规则引擎</text>

  <rect class="svc" x="648" y="410" width="230" height="130" rx="18"/>
  <text class="h" x="682" y="456">Network</text>
  <text class="p" x="682" y="494">WiFi、AP、IP、Web API</text>

  <rect class="svc" x="926" y="410" width="230" height="130" rx="18"/>
  <text class="h" x="960" y="456">Protocols</text>
  <text class="p" x="960" y="494">MQTT、Modbus、上报</text>

  <rect class="svc" x="1204" y="410" width="160" height="130" rx="18"/>
  <text class="h" x="1230" y="456">Security</text>
  <text class="p" x="1230" y="494">用户、角色、会话</text>

  <rect class="data" x="230" y="640" width="300" height="96" rx="18"/>
  <text class="h" x="268" y="682">ConfigStorage</text>
  <text class="code" x="268" y="714">network / mqtt / peripherals</text>

  <rect class="run" x="602" y="640" width="300" height="96" rx="18"/>
  <text class="h" x="640" y="682">HealthMonitor</text>
  <text class="p" x="640" y="714">内存、网络、MQTT、降级保护</text>

  <rect class="data" x="974" y="640" width="300" height="96" rx="18"/>
  <text class="h" x="1012" y="682">LittleFS</text>
  <text class="code" x="1012" y="714">Web 资源、配置、日志</text>

  <path class="arrow" d="M720 300 V360 H207 V410"/>
  <path class="arrow" d="M720 300 V360 H485 V410"/>
  <path class="arrow" d="M720 300 V410"/>
  <path class="arrow" d="M720 360 H1041 V410"/>
  <path class="arrow" d="M720 360 H1284 V410"/>
  <path class="arrow" d="M485 540 V640"/>
  <path class="arrow" d="M720 540 V640"/>
  <path class="arrow" d="M1041 540 V640"/>
  <text class="small" x="72" y="792">改动建议：新增能力先判断属于外设、规则、网络、协议、系统服务还是安全边界，再落到对应目录和测试。</text>
</svg>
