<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="820" viewBox="0 0 1440 820" role="img" aria-labelledby="title desc">
  <title id="title">Modbus API 与功能码映射</title>
  <desc id="desc">展示 FastBee Modbus REST API、常用功能码、数据区和典型页面动作之间的关系。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="0.55" stop-color="#eef6ff"/>
      <stop offset="1" stop-color="#fff7ed"/>
    </linearGradient>
    <filter id="shadow" x="-8%" y="-12%" width="116%" height="124%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <style>
      text { font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #172033; }
      .title { font-size: 42px; font-weight: 700; }
      .subtitle { font-size: 20px; fill: #475569; }
      .card { fill: #ffffff; stroke: #d7dee9; stroke-width: 1.5; rx: 18; filter: url(#shadow); }
      .label { font-size: 22px; font-weight: 700; }
      .small { font-size: 15px; fill: #475569; }
      .mono { font-family: Consolas, "Microsoft YaHei", monospace; font-size: 14px; fill: #334155; }
      .line { stroke: #2563eb; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .api { fill: #eff6ff; stroke: #bfdbfe; rx: 12; }
      .fc { fill: #ecfdf5; stroke: #a7f3d0; rx: 12; }
      .data { fill: #fff7ed; stroke: #fdba74; rx: 12; }
      .ui { fill: #f5f3ff; stroke: #ddd6fe; rx: 12; }
    </style>
  </defs>
  <rect width="1440" height="820" fill="url(#bg)"/>
  <text x="72" y="72" class="title">Modbus API 与功能码映射</text>
  <text x="72" y="108" class="subtitle">从页面按钮或 REST API 出发，快速定位对应功能码、数据区和排查重点。</text>

  <rect x="78" y="170" width="300" height="440" class="card"/>
  <text x="112" y="218" class="label">REST API</text>
  <rect x="112" y="258" width="220" height="42" class="api"/><text x="132" y="285" class="mono">GET /api/modbus/status</text>
  <rect x="112" y="320" width="220" height="42" class="api"/><text x="132" y="347" class="mono">POST /api/modbus/coil</text>
  <rect x="112" y="382" width="220" height="42" class="api"/><text x="132" y="409" class="mono">POST /api/modbus/write</text>
  <rect x="112" y="444" width="220" height="42" class="api"/><text x="132" y="471" class="mono">POST /api/modbus/read</text>
  <rect x="112" y="506" width="220" height="42" class="api"/><text x="132" y="533" class="mono">POST /api/modbus/native</text>

  <rect x="455" y="170" width="250" height="440" class="card"/>
  <text x="489" y="218" class="label">功能码</text>
  <rect x="489" y="258" width="166" height="42" class="fc"/><text x="530" y="285" class="small">FC01</text>
  <rect x="489" y="320" width="166" height="42" class="fc"/><text x="530" y="347" class="small">FC05 / FC0F</text>
  <rect x="489" y="382" width="166" height="42" class="fc"/><text x="530" y="409" class="small">FC03 / FC04</text>
  <rect x="489" y="444" width="166" height="42" class="fc"/><text x="530" y="471" class="small">FC06 / FC10</text>
  <rect x="489" y="506" width="166" height="42" class="fc"/><text x="530" y="533" class="small">0xB0 / 原生</text>

  <rect x="782" y="170" width="250" height="440" class="card"/>
  <text x="816" y="218" class="label">数据区</text>
  <rect x="816" y="258" width="166" height="42" class="data"/><text x="840" y="285" class="small">Coils</text>
  <rect x="816" y="320" width="166" height="42" class="data"/><text x="840" y="347" class="small">Discrete Inputs</text>
  <rect x="816" y="382" width="166" height="42" class="data"/><text x="840" y="409" class="small">Holding Registers</text>
  <rect x="816" y="444" width="166" height="42" class="data"/><text x="840" y="471" class="small">Input Registers</text>
  <rect x="816" y="506" width="166" height="42" class="data"/><text x="840" y="533" class="small">设备私有帧</text>

  <rect x="1108" y="170" width="250" height="440" class="card"/>
  <text x="1142" y="218" class="label">页面动作</text>
  <rect x="1142" y="258" width="166" height="42" class="ui"/><text x="1164" y="285" class="small">刷新状态</text>
  <rect x="1142" y="320" width="166" height="42" class="ui"/><text x="1164" y="347" class="small">开关线圈</text>
  <rect x="1142" y="382" width="166" height="42" class="ui"/><text x="1164" y="409" class="small">读寄存器</text>
  <rect x="1142" y="444" width="166" height="42" class="ui"/><text x="1164" y="471" class="small">写参数</text>
  <rect x="1142" y="506" width="166" height="42" class="ui"/><text x="1164" y="533" class="small">设置地址/波特率</text>

  <path d="M378 341 C410 341 423 341 455 341" class="line"/>
  <path d="M705 341 C738 341 749 341 782 341" class="line"/>
  <path d="M1032 341 C1065 341 1075 341 1108 341" class="line"/>
  <path d="M378 424 C410 424 423 424 455 424" class="line"/>
  <path d="M705 424 C738 424 749 424 782 424" class="line"/>
  <path d="M1032 424 C1065 424 1075 424 1108 424" class="line"/>

  <rect x="120" y="690" width="1200" height="72" rx="16" fill="#0f172a" opacity="0.94"/>
  <text x="156" y="723" fill="#ffffff" style="font-family: 'Microsoft YaHei', 'PingFang SC', Arial, sans-serif; font-size: 18px; font-weight: 700;">排查顺序</text>
  <text x="156" y="750" fill="#e2e8f0" style="font-family: 'Microsoft YaHei', 'PingFang SC', Arial, sans-serif; font-size: 15px;">先看 API 参数和功能码是否匹配，再看地址是否需要减 1，最后看串口参数、RS485 方向控制和从站响应。</text>
</svg>
