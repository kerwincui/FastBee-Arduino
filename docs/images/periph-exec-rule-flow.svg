<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="760" viewBox="0 0 1440 760">
  <defs>
    <style>
      .bg{fill:#f8fafc}
      .title{font:700 34px "Microsoft YaHei",Arial,sans-serif;fill:#172033}
      .sub{font:400 18px "Microsoft YaHei",Arial,sans-serif;fill:#5a667a}
      .box{fill:#fff;stroke:#cfd8e3;stroke-width:2;rx:18}
      .core{fill:#eef7ff;stroke:#3e88d7;stroke-width:2;rx:18}
      .ok{fill:#eefbf2;stroke:#65b77a;stroke-width:2;rx:18}
      .warn{fill:#fff7e6;stroke:#e0a33a;stroke-width:2;rx:18}
      .h{font:700 21px "Microsoft YaHei",Arial,sans-serif;fill:#172033}
      .p{font:400 15px "Microsoft YaHei",Arial,sans-serif;fill:#445066}
      .arrow{stroke:#66758a;stroke-width:3;fill:none;marker-end:url(#arrow)}
      .arrow2{stroke:#2f7eca;stroke-width:3;fill:none;marker-end:url(#arrowBlue)}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#66758a"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f7eca"/>
    </marker>
  </defs>
  <rect class="bg" width="1440" height="760"/>
  <text class="title" x="72" y="72">外设执行规则链路图</text>
  <text class="sub" x="72" y="108">一条规则从触发到动作执行、日志记录和协议上报的完整路径</text>

  <rect class="box" x="70" y="175" width="245" height="140"/>
  <text class="h" x="100" y="220">触发来源</text>
  <text class="p" x="100" y="252">定时 / 事件 / 平台</text>
  <text class="p" x="100" y="280">轮询 / 数据源阈值</text>

  <rect class="core" x="385" y="175" width="245" height="140"/>
  <text class="h" x="415" y="220">规则匹配</text>
  <text class="p" x="415" y="252">启用状态</text>
  <text class="p" x="415" y="280">触发器与条件判断</text>

  <rect class="core" x="700" y="175" width="245" height="140"/>
  <text class="h" x="730" y="220">动作队列</text>
  <text class="p" x="730" y="252">顺序 / 并行</text>
  <text class="p" x="730" y="280">同步延时与参数展开</text>

  <rect class="ok" x="1015" y="175" width="245" height="140"/>
  <text class="h" x="1045" y="220">动作执行</text>
  <text class="p" x="1045" y="252">GPIO / PWM / Sensor</text>
  <text class="p" x="1045" y="280">Display / Modbus / Script</text>

  <rect class="box" x="230" y="455" width="245" height="140"/>
  <text class="h" x="260" y="500">外设状态</text>
  <text class="p" x="260" y="532">读数、输出状态</text>
  <text class="p" x="260" y="560">错误码与超时</text>

  <rect class="warn" x="595" y="455" width="245" height="140"/>
  <text class="h" x="625" y="500">设备日志</text>
  <text class="p" x="625" y="532">规则执行结果</text>
  <text class="p" x="625" y="560">参数错误 / 内存告警</text>

  <rect class="ok" x="960" y="455" width="245" height="140"/>
  <text class="h" x="990" y="500">协议上报</text>
  <text class="p" x="990" y="532">MQTT 数据/事件</text>
  <text class="p" x="990" y="560">Modbus 读写结果</text>

  <path class="arrow2" d="M315 245 H385"/>
  <path class="arrow2" d="M630 245 H700"/>
  <path class="arrow2" d="M945 245 H1015"/>
  <path class="arrow" d="M1138 315 V385 H352 V455"/>
  <path class="arrow" d="M1138 315 V385 H718 V455"/>
  <path class="arrow" d="M1138 315 V385 H1082 V455"/>

  <rect class="warn" x="90" y="650" width="1260" height="62"/>
  <text class="p" x="125" y="687">上线建议：新增规则先保持禁用，手动执行一次并观察日志；确认动作链和外设状态正确后，再启用定时、事件、平台或轮询触发。</text>
</svg>
