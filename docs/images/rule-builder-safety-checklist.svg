<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="820" viewBox="0 0 1440 820" role="img" aria-labelledby="title desc">
  <title id="title">外设执行规则表单安全检查</title>
  <desc id="desc">展示创建或启用外设执行规则前应检查的触发器、动作、目标外设、上报和回滚项。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="0.55" stop-color="#f0f9ff"/>
      <stop offset="1" stop-color="#f0fdf4"/>
    </linearGradient>
    <filter id="shadow" x="-8%" y="-12%" width="116%" height="124%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      text { font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #172033; }
      .title { font-size: 42px; font-weight: 700; }
      .subtitle { font-size: 20px; fill: #475569; }
      .panel { fill: #ffffff; stroke: #d7dee9; stroke-width: 1.5; rx: 18; filter: url(#shadow); }
      .label { font-size: 21px; font-weight: 700; }
      .small { font-size: 15px; fill: #475569; }
      .item { fill: #f8fafc; stroke: #cbd5e1; rx: 13; }
      .ok { fill: #ecfdf5; stroke: #a7f3d0; rx: 13; }
      .warn { fill: #fff7ed; stroke: #fdba74; rx: 13; }
      .danger { fill: #fff1f2; stroke: #fecdd3; rx: 13; }
    </style>
  </defs>
  <rect width="1440" height="820" fill="url(#bg)"/>
  <text x="72" y="72" class="title">外设执行规则表单安全检查</text>
  <text x="72" y="108" class="subtitle">规则启用前先按五列检查，避免继电器、电机、Modbus 写入等动作在现场误触发。</text>

  <rect x="82" y="160" width="244" height="470" class="panel"/>
  <text x="118" y="208" class="label">基础信息</text>
  <rect x="118" y="252" width="170" height="42" class="ok"/><text x="142" y="279" class="small">名称可识别</text>
  <rect x="118" y="314" width="170" height="42" class="ok"/><text x="142" y="341" class="small">ID 不重复</text>
  <rect x="118" y="376" width="170" height="42" class="warn"/><text x="142" y="403" class="small">先禁用保存</text>
  <rect x="118" y="438" width="170" height="42" class="item"/><text x="142" y="465" class="small">备注写现场</text>
  <text x="118" y="540" class="small">先让规则成为可审计对象，</text>
  <text x="118" y="568" class="small">再进入单项验证。</text>

  <rect x="348" y="160" width="244" height="470" class="panel"/>
  <text x="384" y="208" class="label">触发器</text>
  <rect x="384" y="252" width="170" height="42" class="ok"/><text x="408" y="279" class="small">来源明确</text>
  <rect x="384" y="314" width="170" height="42" class="ok"/><text x="408" y="341" class="small">条件可复现</text>
  <rect x="384" y="376" width="170" height="42" class="warn"/><text x="408" y="403" class="small">轮询间隔合理</text>
  <rect x="384" y="438" width="170" height="42" class="item"/><text x="408" y="465" class="small">事件名准确</text>
  <text x="384" y="540" class="small">平台、定时、事件、轮询</text>
  <text x="384" y="568" class="small">不要混淆排查路径。</text>

  <rect x="614" y="160" width="244" height="470" class="panel"/>
  <text x="650" y="208" class="label">动作</text>
  <rect x="650" y="252" width="170" height="42" class="ok"/><text x="674" y="279" class="small">目标外设存在</text>
  <rect x="650" y="314" width="170" height="42" class="ok"/><text x="674" y="341" class="small">actionType 正确</text>
  <rect x="650" y="376" width="170" height="42" class="warn"/><text x="674" y="403" class="small">actionValue 合法</text>
  <rect x="650" y="438" width="170" height="42" class="danger"/><text x="674" y="465" class="small">强动作需确认</text>
  <text x="650" y="540" class="small">继电器、电机、写寄存器</text>
  <text x="650" y="568" class="small">先手动执行一次。</text>

  <rect x="880" y="160" width="244" height="470" class="panel"/>
  <text x="916" y="208" class="label">结果与上报</text>
  <rect x="916" y="252" width="170" height="42" class="ok"/><text x="940" y="279" class="small">日志可定位</text>
  <rect x="916" y="314" width="170" height="42" class="ok"/><text x="940" y="341" class="small">上报字段正确</text>
  <rect x="916" y="376" width="170" height="42" class="warn"/><text x="940" y="403" class="small">失败有响应</text>
  <rect x="916" y="438" width="170" height="42" class="item"/><text x="940" y="465" class="small">可截图留证</text>
  <text x="916" y="540" class="small">不要只看设备动作，</text>
  <text x="916" y="568" class="small">也要看平台收到什么。</text>

  <rect x="1146" y="160" width="212" height="470" class="panel"/>
  <text x="1182" y="208" class="label">回滚</text>
  <rect x="1182" y="252" width="140" height="42" class="ok"/><text x="1204" y="279" class="small">可禁用</text>
  <rect x="1182" y="314" width="140" height="42" class="ok"/><text x="1204" y="341" class="small">有备份</text>
  <rect x="1182" y="376" width="140" height="42" class="warn"/><text x="1204" y="403" class="small">知道恢复口</text>
  <rect x="1182" y="438" width="140" height="42" class="danger"/><text x="1204" y="465" class="small">现场断电点</text>
  <text x="1182" y="540" class="small">危险动作要留</text>
  <text x="1182" y="568" class="small">物理急停方案。</text>

  <rect x="120" y="714" width="1200" height="54" rx="16" fill="#0f172a" opacity="0.94"/>
  <text x="156" y="748" fill="#e2e8f0" style="font-family: 'Microsoft YaHei', 'PingFang SC', Arial, sans-serif; font-size: 17px;">推荐启用顺序：禁用保存 -> 手动执行 -> 查看日志 -> 确认上报 -> 小范围启用 -> 备份配置。</text>
</svg>
