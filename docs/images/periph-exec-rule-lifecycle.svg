<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="820" viewBox="0 0 1440 820">
  <defs>
    <style>
      .bg{fill:#f8fafc}
      .title{font:700 34px "Microsoft YaHei",Arial,sans-serif;fill:#172033}
      .sub{font:400 18px "Microsoft YaHei",Arial,sans-serif;fill:#5a667a}
      .node{fill:#fff;stroke:#cfd8e3;stroke-width:2}
      .draft{fill:#eef6ff;stroke:#5b9bd8;stroke-width:2}
      .safe{fill:#f0fbf3;stroke:#5cac75;stroke-width:2}
      .run{fill:#f5f0ff;stroke:#8b72c9;stroke-width:2}
      .warn{fill:#fff6e7;stroke:#d49b3d;stroke-width:2}
      .bad{fill:#fff1f0;stroke:#d96a63;stroke-width:2}
      .h{font:700 21px "Microsoft YaHei",Arial,sans-serif;fill:#172033}
      .p{font:400 16px "Microsoft YaHei",Arial,sans-serif;fill:#445066}
      .small{font:400 14px "Microsoft YaHei",Arial,sans-serif;fill:#5a667a}
      .num{font:700 15px "Microsoft YaHei",Arial,sans-serif;fill:#fff}
      .arrow{stroke:#69778b;stroke-width:3;fill:none;marker-end:url(#arrow)}
      .guard{stroke:#d96a63;stroke-width:3;fill:none;stroke-dasharray:8 8;marker-end:url(#arrowRed)}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#69778b"/></marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#d96a63"/></marker>
  </defs>

  <rect class="bg" width="1440" height="820"/>
  <text class="title" x="72" y="70">外设执行规则生命周期</text>
  <text class="sub" x="72" y="106">规则从草稿到启用再到触发执行，中间要经过配置校验、手动验证、运行守卫和异常回滚。</text>

  <rect class="draft" x="86" y="170" width="238" height="150" rx="18"/>
  <circle cx="126" cy="216" r="24" fill="#2f7eca"/>
  <text class="num" x="113" y="222">1</text>
  <text class="h" x="162" y="212">新建草稿</text>
  <text class="p" x="116" y="254">填写规则名称</text>
  <text class="p" x="116" y="282">先保存为 disabled</text>

  <rect class="safe" x="386" y="170" width="238" height="150" rx="18"/>
  <circle cx="426" cy="216" r="24" fill="#3f9b63"/>
  <text class="num" x="413" y="222">2</text>
  <text class="h" x="462" y="212">配置校验</text>
  <text class="p" x="416" y="254">触发器数量和类型</text>
  <text class="p" x="416" y="282">动作目标和参数</text>

  <rect class="warn" x="686" y="170" width="238" height="150" rx="18"/>
  <circle cx="726" cy="216" r="24" fill="#c47a1d"/>
  <text class="num" x="713" y="222">3</text>
  <text class="h" x="762" y="212">手动执行</text>
  <text class="p" x="716" y="254">观察日志和外设状态</text>
  <text class="p" x="716" y="282">确认动作可回滚</text>

  <rect class="run" x="986" y="170" width="238" height="150" rx="18"/>
  <circle cx="1026" cy="216" r="24" fill="#7357b8"/>
  <text class="num" x="1013" y="222">4</text>
  <text class="h" x="1062" y="212">启用运行</text>
  <text class="p" x="1016" y="254">调度器监听触发器</text>
  <text class="p" x="1016" y="282">命中后进入动作队列</text>

  <path class="arrow" d="M324 245 H386"/>
  <path class="arrow" d="M624 245 H686"/>
  <path class="arrow" d="M924 245 H986"/>

  <rect class="node" x="164" y="470" width="270" height="140" rx="18"/>
  <text class="h" x="202" y="516">异步执行守卫</text>
  <text class="p" x="202" y="552">堆内存阈值</text>
  <text class="p" x="202" y="580">并发任务上限</text>

  <rect class="node" x="520" y="470" width="270" height="140" rx="18"/>
  <text class="h" x="558" y="516">结果反馈</text>
  <text class="p" x="558" y="552">日志、状态、事件缓存</text>
  <text class="p" x="558" y="580">可选 MQTT 上报</text>

  <rect class="bad" x="876" y="470" width="270" height="140" rx="18"/>
  <text class="h" x="914" y="516">异常回滚</text>
  <text class="p" x="914" y="552">禁用规则或动作</text>
  <text class="p" x="914" y="580">恢复 periph_exec.json</text>

  <path class="arrow" d="M1105 320 V390 H299 V470"/>
  <path class="arrow" d="M434 540 H520"/>
  <path class="guard" d="M790 540 H876"/>
  <path class="arrow" d="M655 470 V390 H1105 V320"/>

  <rect class="node" x="204" y="690" width="1032" height="58" rx="16"/>
  <text class="small" x="244" y="725">现场原则：所有会驱动继电器、电机、蜂鸣器或 Modbus 控制的规则，都先禁用保存，再手动执行验证，最后启用自动触发。</text>
</svg>
