<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="820" viewBox="0 0 1440 820" role="img" aria-labelledby="title desc">
  <title id="title">真实设备 API 冒烟测试流程</title>
  <desc id="desc">展示从设备准备、认证、核心接口、版本能力、负向检查到报告归档的冒烟测试流程。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="0.55" stop-color="#f0f9ff"/>
      <stop offset="1" stop-color="#f0fdf4"/>
    </linearGradient>
    <filter id="shadow" x="-12%" y="-18%" width="124%" height="136%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <style>
      text { font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #172033; }
      .title { font-size: 42px; font-weight: 700; }
      .subtitle { font-size: 20px; fill: #475569; }
      .step { fill: #ffffff; stroke: #d7dee9; stroke-width: 1.5; rx: 18; filter: url(#shadow); }
      .section { font-size: 22px; font-weight: 700; }
      .small { font-size: 15px; fill: #475569; }
      .tiny { font-size: 13px; fill: #64748b; }
      .line { stroke: #2563eb; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .fail { stroke: #e11d48; stroke-width: 2.5; stroke-dasharray: 7 8; fill: none; marker-end: url(#arrow); }
      .pill { rx: 13; stroke-width: 1.3; }
      .blue { fill: #eff6ff; stroke: #bfdbfe; }
      .green { fill: #ecfdf5; stroke: #a7f3d0; }
      .orange { fill: #fff7ed; stroke: #fed7aa; }
      .red { fill: #fff1f2; stroke: #fecdd3; }
    </style>
  </defs>
  <rect width="1440" height="820" fill="url(#bg)"/>
  <text x="72" y="72" class="title">真实设备 API 冒烟测试流程</text>
  <text x="72" y="108" class="subtitle">适用于 `scripts\smoke-test-device.ps1`：用最短路径判断固件是否具备继续功能测试和长稳测试的条件。</text>

  <rect x="74" y="175" width="250" height="135" class="step"/>
  <text x="104" y="220" class="section">1. 设备准备</text>
  <text x="104" y="252" class="small">烧录目标版本</text>
  <text x="104" y="280" class="small">确认 IP 和 Profile</text>

  <rect x="392" y="175" width="250" height="135" class="step"/>
  <text x="422" y="220" class="section">2. 登录认证</text>
  <text x="422" y="252" class="small">Cookie 与 Bearer Token</text>
  <text x="422" y="280" class="small">多会话边界</text>

  <rect x="710" y="175" width="250" height="135" class="step"/>
  <text x="740" y="220" class="section">3. 系统健康</text>
  <text x="740" y="252" class="small">health、info、metrics</text>
  <text x="740" y="280" class="small">heap / maxAlloc / PSRAM</text>

  <rect x="1028" y="175" width="250" height="135" class="step"/>
  <text x="1058" y="220" class="section">4. 网络协议</text>
  <text x="1058" y="252" class="small">Network / MQTT</text>
  <text x="1058" y="280" class="small">Modbus 能力开关</text>

  <path d="M324 242 C354 242 362 242 392 242" class="line"/>
  <path d="M642 242 C672 242 680 242 710 242" class="line"/>
  <path d="M960 242 C990 242 998 242 1028 242" class="line"/>

  <rect x="196" y="400" width="250" height="145" class="step"/>
  <text x="226" y="445" class="section">5. 业务接口</text>
  <text x="226" y="477" class="small">设备、外设、规则</text>
  <text x="226" y="505" class="small">文件、日志、OTA</text>

  <rect x="514" y="400" width="250" height="145" class="step"/>
  <text x="544" y="445" class="section">6. 版本边界</text>
  <text x="544" y="477" class="small">Lite / Standard / Full</text>
  <text x="544" y="505" class="small">不可用接口返回合理状态</text>

  <rect x="832" y="400" width="250" height="145" class="step"/>
  <text x="862" y="445" class="section">7. 结果归档</text>
  <text x="862" y="477" class="small">HTTP 状态和失败原因</text>
  <text x="862" y="505" class="small">截图、日志、版本信息</text>

  <path d="M1153 310 C1153 362 321 350 321 400" class="line"/>
  <path d="M446 472 C476 472 484 472 514 472" class="line"/>
  <path d="M764 472 C794 472 802 472 832 472" class="line"/>

  <rect x="1115" y="405" width="225" height="134" class="red pill"/>
  <text x="1142" y="445" class="section">失败即停</text>
  <text x="1142" y="477" class="small">记录首个失败接口</text>
  <text x="1142" y="505" class="small">转入现场排查树</text>
  <path d="M965 545 C1005 620 1160 615 1200 540" class="fail"/>

  <rect x="130" y="640" width="1180" height="92" rx="18" fill="#0f172a" opacity="0.94"/>
  <text x="168" y="676" fill="#ffffff" style="font-family: 'Microsoft YaHei', 'PingFang SC', Arial, sans-serif; font-size: 20px; font-weight: 700;">通过标准</text>
  <text x="168" y="708" fill="#e2e8f0" style="font-family: 'Microsoft YaHei', 'PingFang SC', Arial, sans-serif; font-size: 16px;">目标 Profile 的必测接口全部通过，版本裁剪接口没有误暴露，设备资源指标没有进入低内存保护或异常重启状态。</text>
</svg>
