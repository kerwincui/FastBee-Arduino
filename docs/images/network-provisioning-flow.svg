<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="780" viewBox="0 0 1440 780">
  <defs>
    <style>
      .bg{fill:#f7f9fb}
      .title{font:700 34px "Microsoft YaHei",Arial,sans-serif;fill:#172033}
      .sub{font:400 18px "Microsoft YaHei",Arial,sans-serif;fill:#5a667a}
      .card{fill:#fff;stroke:#ccd6e2;stroke-width:2}
      .blue{fill:#eef6ff;stroke:#5b9bd8;stroke-width:2}
      .green{fill:#f0fbf3;stroke:#5cac75;stroke-width:2}
      .orange{fill:#fff6e7;stroke:#d49b3d;stroke-width:2}
      .purple{fill:#f5f0ff;stroke:#8b72c9;stroke-width:2}
      .red{fill:#fff1f0;stroke:#d96a63;stroke-width:2}
      .h{font:700 21px "Microsoft YaHei",Arial,sans-serif;fill:#172033}
      .p{font:400 16px "Microsoft YaHei",Arial,sans-serif;fill:#445066}
      .small{font:400 14px "Microsoft YaHei",Arial,sans-serif;fill:#5a667a}
      .num{font:700 15px "Microsoft YaHei",Arial,sans-serif;fill:#fff}
      .arrow{stroke:#69778b;stroke-width:3;fill:none;marker-end:url(#arrow)}
      .fail{stroke:#d96a63;stroke-width:3;fill:none;stroke-dasharray:8 8;marker-end:url(#arrowRed)}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#69778b"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d96a63"/>
    </marker>
  </defs>

  <rect class="bg" width="1440" height="780"/>
  <text class="title" x="72" y="70">网络配置与 AP 回退流程</text>
  <text class="sub" x="72" y="106">设备启动后优先使用已保存的联网配置；连接失败时保留本地 AP 管理入口，便于现场重新配网。</text>

  <rect class="blue" x="86" y="174" width="230" height="146" rx="18"/>
  <circle cx="126" cy="220" r="24" fill="#2f7eca"/>
  <text class="num" x="113" y="226">1</text>
  <text class="h" x="162" y="216">设备启动</text>
  <text class="p" x="116" y="258">加载 network.json</text>
  <text class="p" x="116" y="286">初始化 WiFi 和 mDNS</text>

  <rect class="orange" x="382" y="174" width="230" height="146" rx="18"/>
  <circle cx="422" cy="220" r="24" fill="#c47a1d"/>
  <text class="num" x="409" y="226">2</text>
  <text class="h" x="458" y="216">尝试 STA 联网</text>
  <text class="p" x="412" y="258">连接目标 SSID</text>
  <text class="p" x="412" y="286">等待 DHCP 或静态 IP</text>

  <rect class="green" x="678" y="174" width="230" height="146" rx="18"/>
  <circle cx="718" cy="220" r="24" fill="#3f9b63"/>
  <text class="num" x="705" y="226">3</text>
  <text class="h" x="754" y="216">联网成功</text>
  <text class="p" x="708" y="258">仪表盘显示 IP</text>
  <text class="p" x="708" y="286">Web 和 API 可访问</text>

  <rect class="purple" x="974" y="174" width="230" height="146" rx="18"/>
  <circle cx="1014" cy="220" r="24" fill="#7357b8"/>
  <text class="num" x="1001" y="226">4</text>
  <text class="h" x="1050" y="216">协议上线</text>
  <text class="p" x="1004" y="258">MQTT 连接平台</text>
  <text class="p" x="1004" y="286">Modbus 或外设开始工作</text>

  <path class="arrow" d="M316 247 H382"/>
  <path class="arrow" d="M612 247 H678"/>
  <path class="arrow" d="M908 247 H974"/>

  <rect class="red" x="382" y="456" width="330" height="154" rx="18"/>
  <text class="h" x="420" y="502">连接失败或 IP 不可达</text>
  <text class="p" x="420" y="540">启用设备 AP，保留本地配置入口</text>
  <text class="p" x="420" y="568">检查 SSID、密码、网关、DNS、静态 IP</text>

  <rect class="card" x="790" y="456" width="330" height="154" rx="18"/>
  <text class="h" x="828" y="502">重新提交配置</text>
  <text class="p" x="828" y="540">保存后重启或等待网络服务重载</text>
  <text class="p" x="828" y="568">回到仪表盘确认 IP 和在线状态</text>

  <path class="fail" d="M497 320 V456"/>
  <path class="arrow" d="M712 533 H790"/>
  <path class="arrow" d="M955 456 V376 H793 V320"/>

  <rect class="card" x="146" y="654" width="1148" height="58" rx="16"/>
  <text class="small" x="184" y="689">现场建议：先截图保存仪表盘 IP，再改网络；静态 IP 改动后先确认网关和 DNS，避免 MQTT 能力被误判为协议故障。</text>
</svg>
