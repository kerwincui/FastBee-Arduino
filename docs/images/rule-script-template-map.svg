<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="820" viewBox="0 0 1440 820" role="img" aria-labelledby="title desc">
  <title id="title">规则脚本模板映射</title>
  <desc id="desc">展示规则脚本中输入 JSON、占位符、模板输出、协议方向和调试日志之间的关系。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="0.56" stop-color="#eef6ff"/>
      <stop offset="1" stop-color="#f5f3ff"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-16%" width="120%" height="132%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.13"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <style>
      text { font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #172033; }
      .title { font-size: 42px; font-weight: 700; }
      .subtitle { font-size: 20px; fill: #475569; }
      .card { fill: #ffffff; stroke: #d7dee9; stroke-width: 1.5; rx: 18; filter: url(#shadow); }
      .label { font-size: 22px; font-weight: 700; }
      .small { font-size: 15px; fill: #475569; }
      .mono { font-family: Consolas, "Microsoft YaHei", monospace; font-size: 15px; fill: #334155; }
      .line { stroke: #2563eb; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .box { fill: #eff6ff; stroke: #bfdbfe; rx: 12; }
      .green { fill: #ecfdf5; stroke: #a7f3d0; rx: 12; }
      .orange { fill: #fff7ed; stroke: #fdba74; rx: 12; }
      .red { fill: #fff1f2; stroke: #fecdd3; rx: 12; }
    </style>
  </defs>
  <rect width="1440" height="820" fill="url(#bg)"/>
  <text x="72" y="72" class="title">规则脚本模板映射</text>
  <text x="72" y="108" class="subtitle">规则脚本不是通用编程语言，而是“从输入 JSON 取值，填入输出模板”的轻量转换器。</text>

  <rect x="82" y="178" width="300" height="360" class="card"/>
  <text x="118" y="225" class="label">输入数据</text>
  <rect x="118" y="264" width="220" height="160" class="box"/>
  <text x="140" y="300" class="mono">{</text>
  <text x="156" y="328" class="mono">"temp": 26.5,</text>
  <text x="156" y="356" class="mono">"hum": 63,</text>
  <text x="156" y="384" class="mono">"device": "s3"</text>
  <text x="140" y="412" class="mono">}</text>
  <text x="118" y="480" class="small">来源：MQTT、HTTP、Modbus、采集缓存</text>

  <rect x="470" y="178" width="300" height="360" class="card"/>
  <text x="506" y="225" class="label">占位符解析</text>
  <rect x="506" y="264" width="220" height="56" class="green"/>
  <text x="532" y="300" class="mono">${temp}</text>
  <rect x="506" y="344" width="220" height="56" class="green"/>
  <text x="532" y="380" class="mono">${hum}</text>
  <rect x="506" y="424" width="220" height="56" class="red"/>
  <text x="532" y="460" class="mono">${missing}</text>
  <text x="506" y="512" class="small">缺失键不会自动推断，先用示例数据验证。</text>

  <rect x="858" y="178" width="300" height="360" class="card"/>
  <text x="894" y="225" class="label">输出模板</text>
  <rect x="894" y="264" width="220" height="160" class="orange"/>
  <text x="916" y="300" class="mono">{</text>
  <text x="932" y="328" class="mono">"temperature": "${temp}",</text>
  <text x="932" y="356" class="mono">"humidity": "${hum}"</text>
  <text x="916" y="384" class="mono">}</text>
  <text x="894" y="480" class="small">输出可用于上报、转发或协议适配。</text>

  <rect x="1220" y="248" width="140" height="220" class="card"/>
  <text x="1248" y="295" class="label">调试</text>
  <text x="1248" y="350" class="small">方向</text>
  <text x="1248" y="386" class="small">优先级</text>
  <text x="1248" y="422" class="small">日志</text>

  <path d="M382 356 C416 356 436 356 470 356" class="line"/>
  <path d="M770 356 C804 356 824 356 858 356" class="line"/>
  <path d="M1158 356 C1184 356 1194 356 1220 356" class="line"/>

  <rect x="130" y="635" width="1180" height="86" rx="18" fill="#0f172a" opacity="0.94"/>
  <text x="168" y="670" fill="#ffffff" style="font-family: 'Microsoft YaHei', 'PingFang SC', Arial, sans-serif; font-size: 20px; font-weight: 700;">常见失败点</text>
  <text x="168" y="702" fill="#e2e8f0" style="font-family: 'Microsoft YaHei', 'PingFang SC', Arial, sans-serif; font-size: 16px;">输入不是合法 JSON、数组和对象结构不一致、占位符拼写错误、同一协议方向多条规则优先级冲突。</text>
</svg>
