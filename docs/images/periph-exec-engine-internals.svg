<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="820" viewBox="0 0 1440 820">
  <defs>
    <style>
      .bg{fill:#f8fafc}
      .title{font:700 34px "Microsoft YaHei",Arial,sans-serif;fill:#172033}
      .sub{font:400 18px "Microsoft YaHei",Arial,sans-serif;fill:#5a667a}
      .box{fill:#fff;stroke:#cfd8e3;stroke-width:2}
      .mgr{fill:#eef6ff;stroke:#5b9bd8;stroke-width:2}
      .sch{fill:#fff6e7;stroke:#d49b3d;stroke-width:2}
      .exe{fill:#f5f0ff;stroke:#8b72c9;stroke-width:2}
      .wrk{fill:#f0fbf3;stroke:#5cac75;stroke-width:2}
      .guard{fill:#fff1f0;stroke:#d96a63;stroke-width:2}
      .h{font:700 21px "Microsoft YaHei",Arial,sans-serif;fill:#172033}
      .p{font:400 16px "Microsoft YaHei",Arial,sans-serif;fill:#445066}
      .code{font:700 15px Consolas,"Microsoft YaHei",monospace;fill:#263248}
      .small{font:400 14px "Microsoft YaHei",Arial,sans-serif;fill:#5a667a}
      .arrow{stroke:#69778b;stroke-width:3;fill:none;marker-end:url(#arrow)}
      .data{stroke:#2f7eca;stroke-width:3;fill:none;marker-end:url(#arrowBlue)}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10z" fill="#69778b"/></marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10z" fill="#2f7eca"/></marker>
  </defs>
  <rect class="bg" width="1440" height="820"/>
  <text class="title" x="72" y="70">外设执行引擎内部结构</text>
  <text class="sub" x="72" y="106">PeriphExec 由规则管理、触发调度、动作执行和异步工作池组成，周围由配置、事件、日志和资源守卫支撑。</text>

  <rect class="mgr" x="90" y="188" width="260" height="158" rx="18"/>
  <text class="h" x="128" y="236">Manager</text>
  <text class="p" x="128" y="272">规则 CRUD</text>
  <text class="p" x="128" y="300">配置加载和迁移</text>
  <text class="code" x="128" y="328">periph_exec.json</text>

  <rect class="sch" x="430" y="188" width="260" height="158" rx="18"/>
  <text class="h" x="468" y="236">Scheduler</text>
  <text class="p" x="468" y="272">定时、事件、轮询</text>
  <text class="p" x="468" y="300">触发器匹配</text>
  <text class="code" x="468" y="328">timer / event / poll</text>

  <rect class="exe" x="770" y="188" width="260" height="158" rx="18"/>
  <text class="h" x="808" y="236">Executor</text>
  <text class="p" x="808" y="272">动作分发</text>
  <text class="p" x="808" y="300">同步和异步执行</text>
  <text class="code" x="808" y="328">GPIO / MQTT / Modbus</text>

  <rect class="wrk" x="1110" y="188" width="260" height="158" rx="18"/>
  <text class="h" x="1148" y="236">WorkerPool</text>
  <text class="p" x="1148" y="272">队列任务</text>
  <text class="p" x="1148" y="300">脚本和慢动作</text>
  <text class="code" x="1148" y="328">2 workers</text>

  <path class="arrow" d="M350 267 H430"/>
  <path class="arrow" d="M690 267 H770"/>
  <path class="arrow" d="M1030 267 H1110"/>

  <rect class="box" x="132" y="506" width="300" height="128" rx="18"/>
  <text class="h" x="170" y="552">事件总线</text>
  <text class="p" x="170" y="590">sensor_cache、按钮、系统事件</text>

  <rect class="guard" x="570" y="506" width="300" height="128" rx="18"/>
  <text class="h" x="608" y="552">资源守卫</text>
  <text class="p" x="608" y="590">堆内存、队列限容、批次超时</text>

  <rect class="box" x="1008" y="506" width="300" height="128" rx="18"/>
  <text class="h" x="1046" y="552">结果出口</text>
  <text class="p" x="1046" y="590">日志、状态、MQTT、显示屏</text>

  <path class="data" d="M282 506 V410 H560 V346"/>
  <path class="data" d="M720 506 V410 H900 V346"/>
  <path class="data" d="M1158 506 V410 H900 V346"/>
  <rect class="box" x="200" y="714" width="1040" height="58" rx="16"/>
  <text class="small" x="240" y="749">排查顺序：先看规则是否加载，再看触发器是否命中，然后看动作是否进入执行队列，最后看资源守卫和结果出口。</text>
</svg>
