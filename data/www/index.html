<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastBee设备配置管理</title>
    <link rel="icon" href="./assets/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="./css/pure-min.css">
    <link rel="stylesheet" href="./css/main.css">
    <!-- Preload critical resources -->
    <link rel="preload" href="/js/state.js" as="script">
    <link rel="preload" href="/js/modules/i18n-engine.js" as="script">
    <link rel="preload" href="/css/main.css" as="style">
</head>

<body>
    <!-- 消息通知容器 -->
    <div id="notification-container" class="notification-container"></div>

    <!-- 登录页面 -->
    <div id="login-page" class="login-page">
        <div class="login-card">
            <div class="login-lang-switch">
                <select id="login-language-select" class="pure-input-1">
                    <option value="zh-CN">中文</option>
                    <option value="en">English</option>
                </select>
            </div>
            <div class="login-header">
                <div><img src="/assets/logo.png" alt="FastBee Logo"></div>
                <h1 class="fb-m-0 fb-text-xl fb-text-primary" id="login-title">设备配置管理</h1>
            </div>

            <div class="login-body">
                <form id="login-form" class="pure-form pure-form-stacked">
                    <fieldset>
                        <label for="username" id="username-label">用户名</label>
                        <input type="text" id="username" class="pure-input-1" placeholder="请输入用户名"
                            data-i18n-placeholder="username-placeholder" required>

                        <label for="password" class="fb-mt-3" id="password-label">密码</label>
                        <input type="password" id="password" class="pure-input-1" placeholder="请输入密码"
                            data-i18n-placeholder="password-placeholder" required>

                        <label class="pure-checkbox fb-my-3">
                            <input type="checkbox" id="remember" checked>
                            <span id="remember-label">记住密码</span>
                        </label>

                        <button type="submit" class="fb-btn fb-btn-primary pure-u-1" id="login-button">
                            登录系统
                        </button>
                    </fieldset>
                </form>
            </div>
        </div>
    </div>

    <!-- 主应用 -->
    <div id="app-container" class="app-container">
        <div class="app-wrapper">
            <!-- 侧边栏 -->
            <div class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <img src="/assets/logo.png" alt="FastBee Logo">
                    <h3 id="app-title">设备管理系统</h3>
                </div>
                <div class="sidebar-menu">
                    <a href="#" class="menu-item active" data-page="dashboard">
                        <span class="menu-icon">📊</span> <span id="menu-dashboard">设备监控</span>
                    </a>
                    <a href="#" class="menu-item" data-page="device">
                        <span class="menu-icon">🛠️</span> <span id="menu-device" data-i18n="menu-device">设备配置</span>
                    </a>
                    <a href="#" class="menu-item" data-page="network">
                        <span class="menu-icon">🌐</span> <span id="menu-network">网络设置</span>
                    </a>
                    <a href="#" class="menu-item" data-page="peripheral">
                        <span class="menu-icon">🔧</span> <span id="menu-peripheral"
                            data-i18n="menu-peripheral">外设配置</span>
                    </a>
                    <a href="#" class="menu-item" data-page="periph-exec">
                        <span class="menu-icon">⚡</span> <span id="menu-periph-exec"
                            data-i18n="menu-periph-exec">外设执行</span>
                    </a>
                    <a href="#" class="menu-item" data-page="device-control">
                        <span class="menu-icon">📺</span> <span id="menu-device-control" data-i18n="menu-device-control">设备控制</span>
                    </a>
                    <a href="#" class="menu-item" data-page="protocol">
                        <span class="menu-icon">🔌</span> <span id="menu-protocol">通信协议</span>
                    </a>
                    <a href="#" class="menu-item" data-page="rule-script">
                        <span class="menu-icon">📜</span> <span id="menu-rule-script"
                            data-i18n="menu-rule-script">规则脚本</span>
                    </a>
                    <a href="#" class="menu-item" data-page="data">
                        <span class="menu-icon">📁</span> <span id="menu-data">文件管理</span>
                    </a>
                    <a href="#" class="menu-item" data-page="logs">
                        <span class="menu-icon">📊</span> <span id="menu-logs">设备日志</span>
                    </a>
                    <a href="#" class="menu-item" data-page="users">
                        <span class="menu-icon">👥</span> <span id="menu-users">用户管理</span>
                    </a>
                    <a href="#" class="menu-item" data-page="roles">
                        <span class="menu-icon">🛡️</span> <span id="menu-roles" data-i18n="menu-roles">角色管理</span>
                    </a>
                </div>

            </div>

            <!-- 主内容区 -->
            <div class="main-content">
                <!-- 头部 -->
                <div class="header">
                    <div class="header-left">
                        <button id="sidebar-toggle" class="sidebar-toggle">☰</button>
                        <h1 class="page-title" id="page-title">设备监控仪表盘</h1>
                    </div>
                    <div class="header-actions">
                        <!-- 语言切换 -->
                        <select id="language-select" class="pure-input-1 fb-w-auto">
                            <option value="zh-CN">中文</option>
                            <option value="en">English</option>
                        </select>
                        <!-- 用户下拉菜单 -->
                        <div class="user-dropdown">
                            <button class="user-dropdown-toggle" id="user-dropdown-btn">
                                <span class="user-avatar">👤</span>
                                <span class="user-name-text" id="user-name">管理员</span>
                                <span class="dropdown-arrow">▼</span>
                            </button>
                            <div class="user-dropdown-menu" id="user-dropdown-menu">
                                <button class="dropdown-item" id="theme-toggle-item">
                                    <span class="item-icon">🌙</span>
                                    <span data-i18n="theme-toggle">切换主题</span>
                                </button>
                                <button class="dropdown-item" id="change-password-btn">
                                    <span class="item-icon">🔑</span>
                                    <span data-i18n="change-password-btn">修改密码</span>
                                </button>
                                <div class="dropdown-divider"></div>
                                <button class="dropdown-item dropdown-item-danger" id="logout-btn">
                                    <span class="item-icon">🚪</span>
                                    <span data-i18n="logout-btn">退出登录</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 内容区域 - 动态加载页面模块 -->
                <div class="content" id="content-area">
                    <!-- 骨架屏加载提示 -->
                    <div id="skeleton-screen" class="skeleton">
                        <div class="skeleton-content">
                            <div class="skeleton-header"></div>
                            <div class="skeleton-card"></div>
                            <div class="skeleton-card"></div>
                            <div class="skeleton-card short"></div>
                        </div>
                    </div>
                </div>

                <!-- 主应用页脚 -->
                <div class="app-footer">
                    <div id="footer-copyright">© 2026 FastBee物联网平台 官网: www.fastbee.cn</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 仅加载入口脚本，其余依赖由 main.js 链式动态加载（避免 ESP32 并发连接过多） -->
    <script defer src="./js/main.js"></script>
    <!-- Service Worker 注册 -->
    <script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
            navigator.serviceWorker.register('/sw.js').catch(function(e) {
                console.log('SW registration failed:', e);
            });
        });
    }
    </script>
</body>

</html>
